services:

  # V-Ninja (ninja-mihomo) 运行在宿主机上，不在 Docker 内
  # Docker 容器通过 host.docker.internal 访问宿主机代理
  # 设置方法见 clash/setup-vninja-host.sh

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_DB: genpano
      POSTGRES_USER: genpano
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genpano"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    image: ${ACR_REGISTRY}/genpano:backend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 512m
    env_file: .env
    volumes:
      - email_previews_data:/data/email-previews
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 生产事故 2026-04-27 缓解配置:
  #   - mem_limit/cpus: 防止单容器吃满整机 (上次到 143% CPU + 2.22GB)
  #   - --max-tasks-per-child=10: worker 进程跑 10 个任务后自杀重启,
  #     周期性回收 OS 级孤儿 Chromium 进程, 配合代码层 timeout 闭环
  #   - --max-memory-per-child=300000 KB ≈ 300MB: 内存触发的双保险
  worker:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    shm_size: '2gb'
    mem_limit: 2.5g
    memswap_limit: 3g
    cpus: 2.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Browser automation launches Firefox/Chromium subprocesses that are not
    # covered by Celery's per-child memory check; block heavy assets in code.
    command: >
      celery -A geo_tracker.tasks.celery_tasks worker
      --loglevel=info
      --concurrency=5
      --prefetch-multiplier=1
      --max-tasks-per-child=10
      --max-memory-per-child=300000
      -Q celery,llm_chatgpt,llm_gemini,llm_doubao,llm_deepseek,account_login
    env_file: .env
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analysis:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      celery -A geo_tracker.tasks.celery_tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=50
      -Q analysis
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A geo_tracker.tasks.celery_tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  nginx:
    image: ${ACR_REGISTRY}/genpano:frontend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin-console

  admin-console:
    image: ${ACR_REGISTRY}/genpano:admin-console-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://genpano:${POSTGRES_PASSWORD}@postgres:5432/genpano
      - SCREENSHOT_DIR=/data/screenshots
      - ARK_API_KEY=${ARK_API_KEY}
      - ARK_BASE_URL=${ARK_BASE_URL}
      - ARK_MODEL=${ARK_MODEL}
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  screenshots_data:
  email_previews_data:
