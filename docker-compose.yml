services:

  # V-Ninja (ninja-mihomo) 运行在宿主机上，不在 Docker 内
  # Docker 容器通过 host.docker.internal 访问宿主机代理
  # 设置方法见 clash/setup-vninja-host.sh

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: genpano
      POSTGRES_USER: genpano
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genpano"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    image: ${ACR_REGISTRY}/genpano:backend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    shm_size: '2gb'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      celery -A geo_tracker.tasks.celery_tasks worker
      --loglevel=info
      --concurrency=5
      -Q celery,llm_chatgpt,llm_gemini,llm_doubao,llm_deepseek,account_login
    env_file: .env
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analysis:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A geo_tracker.tasks.celery_tasks worker
      --loglevel=info
      --concurrency=4
      -Q analysis
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A geo_tracker.tasks.celery_tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  nginx:
    image: ${ACR_REGISTRY}/genpano:frontend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - query-tool

  query-tool:
    image: ${ACR_REGISTRY}/genpano:query-tool-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://genpano:${POSTGRES_PASSWORD}@postgres:5432/genpano
      - SCREENSHOT_DIR=/data/screenshots
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  screenshots_data:
