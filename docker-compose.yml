services:

  clash:
    image: ghcr.io/metacubex/mihomo:latest
    restart: unless-stopped
    volumes:
      - ./clash:/root/.config/mihomo
    ports:
      - "7890:7890"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: genpano
      POSTGRES_USER: genpano
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genpano"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    image: ${ACR_REGISTRY}/genpano:backend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    shm_size: '2gb'
    command: >
      celery -A geo_tracker.tasks.celery_tasks worker
      --loglevel=info
      --concurrency=5
      -Q celery,llm_chatgpt,llm_gemini,llm_claude,llm_perplexity,llm_kimi,llm_doubao,llm_zhipu,llm_grok
    env_file: .env
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clash:
        condition: service_started

  beat:
    image: ${ACR_REGISTRY}/genpano:worker-${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A geo_tracker.tasks.celery_tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - clash

  nginx:
    image: ${ACR_REGISTRY}/genpano:frontend-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - query-tool

  query-tool:
    image: ${ACR_REGISTRY}/genpano:query-tool-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://genpano:${POSTGRES_PASSWORD}@postgres:5432/genpano
      - SCREENSHOT_DIR=/data/screenshots
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy

  minimax-test:
    build: ./minimax-test
    restart: unless-stopped
    volumes:
      - minimax_cookies:/app/cookies_store
      - minimax_screenshots:/app/screenshots

volumes:
  postgres_data:
  screenshots_data:
  minimax_cookies:
  minimax_screenshots:
