# VM-per-account Doubao Chrome containers on a single host.
#
# Each `doubao-NN` service is an isolated Chrome instance with its own
# persistent profile (login state survives container restart).
#
# Host port mapping:
#   doubao-01:   noVNC :6080  + CDP :9222
#   doubao-02:   noVNC :6081  + CDP :9223
#   doubao-03:   noVNC :6082  + CDP :9224
#   ...add more by copying + incrementing
#
# Operator connects:   http://<host-tailscale-ip>:6080/vnc.html
# Celery worker drives: playwright.chromium.connect_over_cdp("http://<host>:9222")
#
# ⚠️ R1.6 risk: all containers share the host's public IP. Multiple Doubao
# accounts on the same IP MAY trigger Doubao's cross-account correlation
# detection. Test in PoC before scaling beyond 2-3 accounts. Mitigation if
# needed: add `--proxy-server=http://qg_ip:port` to each container's Chrome
# args (one residential IP per container).

# Pin Compose project name so resources (containers, networks, volumes)
# stay namespaced regardless of which host directory the compose file
# lives in. Without this, moving the compose file between paths (e.g.
# ECS_REPO_PATH → VM_DEPLOY_PATH) would create a new project + conflict
# with the existing fixed container_names.
name: vm-per-account

services:
  doubao-01:
    build:
      context: .
      dockerfile: Dockerfile
    image: vm-per-account/doubao-chrome:latest
    container_name: doubao-01
    restart: unless-stopped
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD_01:?must set VNC_PASSWORD_01 in .env}
      CDP_PORT: 9222
      NOVNC_PORT: 6080
      CHROME_TARGET_URL: https://www.doubao.com/chat
    ports:
      # Bind to host LOOPBACK only — operator reaches noVNC via SSH tunnel
      # (`ssh -L 6080:127.0.0.1:6080 user@ECS`). Loopback binding is robust
      # against Docker's well-known iptables-bypasses-ufw issue: even if a
      # firewall rule is wrong, Docker physically cannot expose the port
      # publicly when bound to 127.0.0.1.
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:9222:9222"
    volumes:
      - ./data/profile-doubao-01:/profile
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  doubao-02:
    build:
      context: .
      dockerfile: Dockerfile
    image: vm-per-account/doubao-chrome:latest
    container_name: doubao-02
    restart: unless-stopped
    environment:
      VNC_PASSWORD: ${VNC_PASSWORD_02:?must set VNC_PASSWORD_02 in .env}
      CDP_PORT: 9222
      NOVNC_PORT: 6080
      CHROME_TARGET_URL: https://www.doubao.com/chat
    ports:
      - "127.0.0.1:6081:6080"
      - "127.0.0.1:9223:9222"
    volumes:
      - ./data/profile-doubao-02:/profile
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

