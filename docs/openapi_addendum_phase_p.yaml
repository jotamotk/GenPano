components:
  responses:
    Unauthorized:
      description: Bearer required
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              type: {type: string}
              title: {type: string}
              status: {type: integer, example: 401}
              detail: {type: string}
              code: {type: string, example: 'unauthorized'}
    Forbidden:
      description: Cross-tenant or scope mismatch
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetails'}
    NotFound:
      description: Not found (also for cross-tenant deny)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetails'}
    ValidationError:
      description: 422 Unprocessable Entity
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetails'}
    RateLimitExceeded:
      description: 429 with Retry-After header
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetails'}
    MCPAuthRequired:
      description: 401 MCP_AUTH_REQUIRED
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetails'}

  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status, code]
      properties:
        type: {type: string, default: 'about:blank'}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        code: {type: string, description: "Stable error code for FE i18n lookup"}

