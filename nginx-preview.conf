# Preview environment routes — included into prod nginx server block.
# Mounted at /etc/nginx/preview/routes.conf on the preview deploy only.
# On prod, /etc/nginx/preview/ is empty and the include silently matches nothing.

# Admin page (served by query-tool Flask app)
location = /preview/admin {
    proxy_pass http://query-tool-preview:5000/admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /preview;
}

# Admin sub-paths (if any)
location /preview/admin/ {
    proxy_pass http://query-tool-preview:5000/admin/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /preview;
}

# Product auth API for the preview frontend.
location = /preview/api/auth {
    proxy_pass http://backend-preview:4000/api/auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /preview;
}

location /preview/api/auth/ {
    proxy_pass http://backend-preview:4000/api/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /preview;
}

# Query-tool API endpoints consumed by the merged admin page
location /preview/api/ {
    proxy_pass http://query-tool-preview:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Query-tool static assets (screenshots, debug HTML, etc.)
location /preview/static/ {
    proxy_pass http://query-tool-preview:5000/static/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Preview frontend SPA (everything else under /preview/)
# Trailing slash on proxy_pass strips the /preview/ prefix before forwarding.
location /preview/ {
    proxy_pass http://frontend-preview:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
