name: VM Topic Debug

on:
  workflow_dispatch:
    inputs:
      topic_substr:
        description: 'Topic text substring (single, ILIKE %substr%)'
        required: true
        default: '投融资尽职调查'
        type: string

jobs:
  debug:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Debug
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          SUBSTR: ${{ inputs.topic_substr }}
        run: |
          set -euo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          echo "=== matching topics ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"SELECT id, substring(text from 1 for 80) AS topic_text FROM topics WHERE text ILIKE '%${SUBSTR}%' ORDER BY id LIMIT 20;\""
          echo
          echo "=== queries on those topics: status breakdown (target_llm=doubao, bestCoffer) ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"SELECT q.status, count(*) FROM queries q JOIN prompts p ON p.id = q.prompt_id JOIN topics t ON t.id = p.topic_id WHERE t.text ILIKE '%${SUBSTR}%' AND q.target_llm = 'doubao' AND q.query_text ILIKE '%bestCoffer%' GROUP BY q.status ORDER BY count(*) DESC;\""
          echo
          echo "=== sample 5 queries (any status) ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"SELECT q.id, q.status, substring(q.query_text from 1 for 60) FROM queries q JOIN prompts p ON p.id = q.prompt_id JOIN topics t ON t.id = p.topic_id WHERE t.text ILIKE '%${SUBSTR}%' AND q.target_llm = 'doubao' AND q.query_text ILIKE '%bestCoffer%' ORDER BY q.id DESC LIMIT 5;\""
