name: VM Bulk Retry via VM (BestCoffer Doubao)

# One-off workflow to trigger retry-via-VM on N failed BestCoffer Doubao
# queries, half to doubao-01 and half to doubao-02. SCPs the bulk script
# to ECS and runs it inside the backend container, which has DB access
# and the geo_tracker module on its sys.path.
#
# Requires:
#   - PR #1145 merged + deployed (the run_quick_retry helper live in prod).
#   - doubao-01 + doubao-02 both logged in (manually via noVNC, see
#     experiments/vm_per_account/docker/scripts/open-vnc-tunnel.ps1).
#
# Exit codes (from scripts/vm_bulk_retry.py):
#   0 all selected retries succeeded
#   2 DATABASE_URL not set
#   3 no candidates matched the filter
#   4 run_quick_retry cannot be imported
#   5 one or more retries failed (success < total)

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many queries to retry (split evenly across 2 VMs)'
        required: true
        default: '20'
        type: string
      query_text_filter:
        description: 'SQL ILIKE pattern for queries.query_text'
        required: true
        default: '%bestCoffer%'
        type: string
      target_llm:
        description: 'Target LLM (doubao only for now)'
        required: true
        default: 'doubao'
        type: string
      dry_run:
        description: 'Dry run: just list the query IDs without retrying'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  bulk-retry:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ssh -p "$PORT" \
            -o BatchMode=yes -o ConnectTimeout=10 \
            "${SERVER_USER}@${SERVER_HOST}" 'echo ssh-ok'

      - name: SCP bulk script to ECS + docker exec inside backend container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          COUNT: ${{ inputs.count }}
          QUERY_FILTER: ${{ inputs.query_text_filter }}
          TARGET_LLM: ${{ inputs.target_llm }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"

          # 1. SCP the script onto ECS host /tmp.
          scp -i ~/.ssh/id_ssh -P "$PORT" \
            scripts/vm_bulk_retry.py \
            "${REMOTE}:/tmp/vm_bulk_retry.py"

          # 1b. Start socat sidecars on the ECS host bridging the docker
          # bridge gateway (172.17.0.1, which is what `host.docker.internal`
          # resolves to from inside worker) -> 127.0.0.1:9222/9223 (where
          # doubao-NN containers expose CDP). Without this, worker can't
          # reach the loopback-bound CDP ports. Idempotent: kill any
          # previous socat first, then re-start in background.
          # Bind socat to 0.0.0.0 (not 172.17.0.1) so it's reachable from
          # ALL docker networks' gateways — the genpano_default network
          # has its own bridge IP (172.18+) different from the default
          # bridge. ufw rules deny public 9222-9232, so 0.0.0.0 binding
          # is safe: container traffic comes via the docker bridges,
          # not the public interface.
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo pkill -f 'socat TCP-LISTEN:9222' || true; \
             sudo pkill -f 'socat TCP-LISTEN:9223' || true; \
             sleep 0.5; \
             sudo nohup socat TCP-LISTEN:9222,reuseaddr,fork TCP:127.0.0.1:9222 > /tmp/host-socat-9222.log 2>&1 < /dev/null & \
             sudo nohup socat TCP-LISTEN:9223,reuseaddr,fork TCP:127.0.0.1:9223 > /tmp/host-socat-9223.log 2>&1 < /dev/null & \
             sleep 1; \
             echo '=== socat status ==='; \
             sudo ss -tlnp 2>/dev/null | grep -E '\\*:(9222|9223)|0\\.0\\.0\\.0:(9222|9223)' || echo 'WARN socat not visible'"

          # 2. Identify the worker image (geo_tracker + playwright only ship
          #    in worker), its docker network, and the .env file path on
          #    the host. Used to run a FRESH short-lived container off the
          #    same image — `docker exec` into the running worker OOM-kills
          #    celery because the cgroup memory limit (2.5g default) is
          #    already half-consumed by the celery worker pool.
          WORKER_IMAGE=$(ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker inspect --format '{{.Config.Image}}' genpano-worker-1 2>/dev/null")
          NETWORK=$(ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker inspect --format '{{range \$k,\$v := .NetworkSettings.Networks}}{{\$k}}{{end}}' genpano-worker-1")
          ENV_PATH=$(ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "for d in /opt/genpano /opt/trash_test /root/trash_test /root/genpano; do [ -f \"\$d/.env\" ] && echo \"\$d/.env\" && break; done")
          if [ -z "$WORKER_IMAGE" ] || [ -z "$NETWORK" ] || [ -z "$ENV_PATH" ]; then
            echo "FATAL: image=$WORKER_IMAGE network=$NETWORK env=$ENV_PATH (missing one)" >&2
            ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" "sudo docker ps" >&2 || true
            exit 5
          fi
          echo "image=$WORKER_IMAGE network=$NETWORK env=$ENV_PATH"

          # 3. docker run a FRESH container with same image + network + env,
          #    mounting the script. Adds host.docker.internal so the script
          #    reaches the host's socat sidecars (started in step 1b).
          #    --rm cleans up afterwards. Memory cap kept generous since
          #    this one-off doesn't compete with celery in the same cgroup.
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker run --rm \
                --name vm-bulk-retry-oneoff \
                --network '$NETWORK' \
                --add-host host.docker.internal:host-gateway \
                --env-file '$ENV_PATH' \
                -e BULK_COUNT='${COUNT}' \
                -e BULK_FILTER='${QUERY_FILTER}' \
                -e BULK_LLM='${TARGET_LLM}' \
                -e BULK_DRY_RUN='${DRY_RUN}' \
                -v /tmp/vm_bulk_retry.py:/tmp/vm_bulk_retry.py:ro \
                --memory 3g --memory-swap 4g \
                '$WORKER_IMAGE' \
                python -u /tmp/vm_bulk_retry.py"
