name: Build & Deploy (Preview)

# Builds and deploys the preview environment alongside prod on the same host.
# Shares postgres/redis/worker with prod, but runs preview frontend/backend/query-tool images.
# Reachable at http://<host>/preview/.
#
# Triggers (gated per job):
#   build-and-push / deploy:
#     push to preview/**
#     (docker preview lane targeting the Alibaba Cloud host)
#   backend-preview:
#     pull_request OR push to feature/**
#     (Step 10 / Session 0' Python backend gate; runs lint + types + migration
#     only, no docker push, no SSH deploy)
#
# Images:   genpano:backend-preview-<sha>, genpano:query-tool-preview-<sha>,
#           genpano:frontend-preview-<sha>
# Tag var:  PREVIEW_IMAGE_TAG (written into .env on the host, merged with prod .env)

on:
  push:
    branches:
      - "preview/**"
      - "feature/**"
  pull_request:

# Minimum scopes for the backend-preview job's PR-comment step
# (actions/github-script -> issues.createComment). contents:read keeps
# checkout working without granting write to the tree.
permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  PREVIEW_IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Preview Images
    runs-on: ubuntu-latest
    # Defensive lock: only fire on preview branches.
    # Without this, the feature/** push trigger added for backend-preview would
    # also kick off an ACR image build, which is not what we want.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/preview/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-vklfeye8td1r1mei.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend-preview
        run: |
          docker build \
            --build-arg VITE_BASE_PATH=/preview/ \
            --build-arg VITE_API_BASE=/preview/api \
            -t ${{ secrets.ACR_REGISTRY }}/genpano:frontend-preview-${{ env.PREVIEW_IMAGE_TAG }} \
            ./frontend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:frontend-preview-${{ env.PREVIEW_IMAGE_TAG }}

      - name: Build & push backend-preview
        run: |
          docker build \
            -t ${{ secrets.ACR_REGISTRY }}/genpano:backend-preview-${{ env.PREVIEW_IMAGE_TAG }} \
            ./backend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:backend-preview-${{ env.PREVIEW_IMAGE_TAG }}

      - name: Build & push query-tool-preview
        run: |
          docker build \
            -t ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-preview-${{ env.PREVIEW_IMAGE_TAG }} \
            ./query_tool
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-preview-${{ env.PREVIEW_IMAGE_TAG }}

  deploy:
    name: Deploy Preview to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy preview files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.preview.yml,nginx-preview.conf,frontend/nginx.conf"
          target: /opt/genpano

      - name: Deploy preview overlay
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/genpano

            touch .env
            for key in \
              PREVIEW_IMAGE_TAG USER_JWT_SECRET ADMIN_JWT_SECRET ADMIN_SESSION_SECRET \
              PREVIEW_USER_BASE_URL PREVIEW_FRONTEND_URL PREVIEW_GOOGLE_CALLBACK_URL \
              PREVIEW_USER_EMAIL_PROVIDER PREVIEW_USER_EMAIL_FROM PREVIEW_USER_EMAIL_REPLY_TO \
              EMAIL_PROVIDER USER_EMAIL_PROVIDER USER_EMAIL_FROM EMAIL_FROM \
              USER_EMAIL_REPLY_TO EMAIL_REPLY_TO RESEND_API_KEY \
              ALIYUN_DM_SMTP_USER ALIYUN_DM_SMTP_PASSWORD ALIYUN_DM_SMTP_HOST \
              ALIYUN_DM_SMTP_PORT ALIYUN_DM_SMTP_SSL ALIYUN_DM_SMTP_STARTTLS \
              GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET
            do
              grep -v "^${key}=" .env > .env.tmp || true
              mv .env.tmp .env
            done
            cat >> .env <<'ENVEOF'
            PREVIEW_IMAGE_TAG=${{ env.PREVIEW_IMAGE_TAG }}
            USER_JWT_SECRET=${{ secrets.USER_JWT_SECRET || secrets.JWT_SECRET || secrets.ADMIN_JWT_SECRET }}
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET || secrets.JWT_SECRET }}
            ADMIN_SESSION_SECRET=${{ secrets.ADMIN_SESSION_SECRET || secrets.ADMIN_JWT_SECRET || secrets.JWT_SECRET }}
            PREVIEW_USER_BASE_URL=${{ secrets.PREVIEW_USER_BASE_URL || format('http://{0}/preview', secrets.SERVER_HOST) }}
            PREVIEW_FRONTEND_URL=${{ secrets.PREVIEW_FRONTEND_URL || secrets.PREVIEW_USER_BASE_URL || format('http://{0}/preview', secrets.SERVER_HOST) }}
            PREVIEW_GOOGLE_CALLBACK_URL=${{ secrets.PREVIEW_GOOGLE_CALLBACK_URL || format('http://{0}/preview/api/auth/google/callback', secrets.SERVER_HOST) }}
            PREVIEW_USER_EMAIL_PROVIDER=${{ secrets.PREVIEW_USER_EMAIL_PROVIDER || secrets.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'aliyun_dm' }}
            PREVIEW_USER_EMAIL_FROM=${{ secrets.PREVIEW_USER_EMAIL_FROM || secrets.USER_EMAIL_FROM || secrets.EMAIL_FROM }}
            PREVIEW_USER_EMAIL_REPLY_TO=${{ secrets.PREVIEW_USER_EMAIL_REPLY_TO || secrets.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO }}
            EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'aliyun_dm' }}
            USER_EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'aliyun_dm' }}
            USER_EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || secrets.EMAIL_FROM }}
            EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || secrets.EMAIL_FROM }}
            USER_EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO }}
            EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            ALIYUN_DM_SMTP_USER=${{ secrets.ALIYUN_DM_SMTP_USER }}
            ALIYUN_DM_SMTP_PASSWORD=${{ secrets.ALIYUN_DM_SMTP_PASSWORD }}
            ALIYUN_DM_SMTP_HOST=${{ secrets.ALIYUN_DM_SMTP_HOST || 'smtpdm.aliyun.com' }}
            ALIYUN_DM_SMTP_PORT=${{ secrets.ALIYUN_DM_SMTP_PORT || '465' }}
            ALIYUN_DM_SMTP_SSL=${{ secrets.ALIYUN_DM_SMTP_SSL || 'true' }}
            ALIYUN_DM_SMTP_STARTTLS=${{ secrets.ALIYUN_DM_SMTP_STARTTLS || 'false' }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # Pull new preview images and apply the overlay without touching prod services.
            # --no-recreate for unchanged services keeps prod containers running as-is.
            docker compose -f docker-compose.yml -f docker-compose.preview.yml pull \
              backend-preview query-tool-preview frontend-preview

            docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d postgres redis

            docker compose -f docker-compose.yml -f docker-compose.preview.yml run --rm \
              backend-preview alembic upgrade head

            docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d \
              --no-deps \
              backend-preview query-tool-preview frontend-preview

            # nginx needs the extra volume mount (routes.conf) — recreate only nginx.
            docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d \
              --no-deps --force-recreate \
              nginx

            # Light cleanup — don't touch volumes or aggressive prunes that could hit prod
            docker image prune -af --filter "until=72h" --filter "label=preview=true" || true

  backend-preview:
    name: Backend Preview Gate (Python 3.12)
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    # Sibling lane to build-and-push / deploy. This job is the Step 10 / Session 0'
    # backend gate: PR or feature/** push runs lint + types + migration smoke,
    # no docker image build, no SSH deploy, no ACR push. Production deploys still
    # live in deploy.yml; the docker preview lane still owns ACR images.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/'))
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (pinned)
        run: pip install uv==0.11.4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: mypy strict
        run: uv run mypy app

      - name: Alembic upgrade head (Supabase preview if configured, sqlite fallback)
        shell: bash
        env:
          SUPABASE_PREVIEW_DB_URL: ${{ secrets.SUPABASE_PREVIEW_DB_URL }}
        run: |
          if [ -n "$SUPABASE_PREVIEW_DB_URL" ]; then
            export GENPANO_DATABASE_URL="$SUPABASE_PREVIEW_DB_URL"
            echo "Using Supabase preview DB"
          else
            export GENPANO_DATABASE_URL="sqlite+aiosqlite:///./preview.db"
            echo "Using sqlite fallback (Supabase secret unset; expected pre-Step 11)"
          fi
          uv run alembic upgrade head

      - name: pytest smoke (exit 5 = no tests collected, treat as PASS)
        shell: bash
        run: |
          set +e
          uv run pytest -v
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" = "0" ] || [ "$EXIT_CODE" = "5" ]; then
            exit 0
          fi
          exit "$EXIT_CODE"

      - name: Comment preview gate result on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const label = status === 'success' ? 'PASS' : 'FAIL';
            const sha = context.sha.substring(0, 7);
            const body = [
              `**Backend Preview Gate: ${label}** (\`${sha}\`)`,
              ``,
              `Ruff · mypy · Alembic · pytest — status: \`${status}\``,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
