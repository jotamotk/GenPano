name: Topics #1029 Readback

# Investigation-only read-only DB readback for issue #1029.
# Purpose: capture the actual per-topic state of BestCoffer topics so the
# user-facing-list vs admin-count gap (4 of 13) has hard evidence, instead
# of code-inference hypotheses (see reverts in #1065).
#
# This workflow only runs SELECTs inside a READ ONLY transaction. No writes.
#
# Poll iteration marker (forces fresh push): 2026-05-16T15:35:00Z iter=4c
# Deep failure diagnostic for stuck topics 162..170: dump retry_reason,
# sample failed query rows, system-wide 24h failure pattern, llm_accounts
# state, llm_responses success rate.
# 4c: collapse all SQL into ONE psql heredoc with ON_ERROR_STOP=off so
# individual SQL errors don't kill the diagnostic. Nested heredocs over
# SSH stdin were truncating after first inner heredoc.

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "BestCoffer canonical brand id"
        required: true
        default: "24"
  push:
    branches:
      - claude/investigate-issue-1029-readback-Ny8TZ
    paths:
      - '.github/workflows/topics-1029-readback.yml'

concurrency:
  group: topics-1029-readback
  cancel-in-progress: false

jobs:
  readback:
    name: Capture per-topic readback for BestCoffer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      BRAND_ID: ${{ github.event.inputs.brand_id || '24' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate brand_id
        shell: bash
        run: |
          set -euo pipefail
          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || { echo "brand_id must be a positive integer, got '${BRAND_ID}'"; exit 1; }
          echo "brand_id=${BRAND_ID}"

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run readback SQL on live test environment
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "BRAND_ID='${BRAND_ID}' bash -s" <<'REMOTE' | tee /tmp/topics_1029_readback.txt
          # NOTE: deliberately not using 'set -euo pipefail' here — earlier iter4
          # aborted at the first '| head -60' pipe (SIGPIPE -> pipefail kill).
          # Each step uses '|| true' instead so a single failure doesn't truncate
          # the diagnostic.
          set +e
          cd /opt/genpano

          echo "=== Captured at ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"

          echo "=== ALL SQL via single -c flag (iter4c) ==="
          # Iter4b nested-heredoc-over-SSH-stdin failed (truncation after
          # \d queries). Iter4c pipes the SQL via printf and runs it through
          # one non-stop psql -f invocation. No inner heredoc -> no truncation.
          printf '%s\n' "\\pset pager off" \
            "\\set ON_ERROR_STOP off" \
            "BEGIN TRANSACTION READ ONLY;" \
            "\\echo '=== schema: queries ==='" \
            "\\d queries" \
            "\\echo '=== schema: llm_accounts ==='" \
            "\\d llm_accounts" \
            "\\echo '=== 1. retry_reason distribution (failed queries on stuck topics 162..170) ==='" \
            "SELECT q.target_llm, q.retry_reason, COUNT(*) AS n FROM queries q JOIN prompts p ON p.id = q.prompt_id WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170) AND q.status = 'failed' GROUP BY q.target_llm, q.retry_reason ORDER BY n DESC;" \
            "\\echo '=== 2. Sample failed queries (20 most recent on stuck topics) ==='" \
            "SELECT q.id, q.target_llm, q.status, q.retry_count, q.retry_reason, q.scheduled_at, q.queued_at, q.started_at, q.finished_at, q.account_id, q.profile_id, q.latency_ms FROM queries q JOIN prompts p ON p.id = q.prompt_id WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170) AND q.status = 'failed' ORDER BY q.finished_at DESC NULLS LAST LIMIT 20;" \
            "\\echo '=== 3. System-wide 24h failure pattern (all brands, top 30) ==='" \
            "SELECT target_llm, retry_reason, COUNT(*) AS n FROM queries WHERE status = 'failed' AND finished_at >= NOW() - INTERVAL '24 hours' GROUP BY target_llm, retry_reason ORDER BY n DESC LIMIT 30;" \
            "\\echo '=== 4a. llm_accounts state (id, target_llm, status, last_used_at, updated_at) ==='" \
            "SELECT id, target_llm, status, last_used_at, updated_at FROM llm_accounts ORDER BY target_llm, id LIMIT 60;" \
            "\\echo '=== 4b. llm_accounts SELECT * sample ==='" \
            "SELECT * FROM llm_accounts LIMIT 3;" \
            "\\echo '=== 4c. llm_accounts target_llm + status counts ==='" \
            "SELECT target_llm, status, COUNT(*) AS n FROM llm_accounts GROUP BY target_llm, status ORDER BY target_llm, status;" \
            "\\echo '=== 5. Recent llm_responses success rate per LLM (1h + 24h) ==='" \
            "SELECT q.target_llm, COUNT(*) FILTER (WHERE r.collected_at >= NOW() - INTERVAL '1 hour') AS responses_1h, COUNT(*) FILTER (WHERE r.collected_at >= NOW() - INTERVAL '24 hours') AS responses_24h, COUNT(*) FILTER (WHERE r.analysis_status='done' AND r.collected_at >= NOW() - INTERVAL '24 hours') AS analyzed_24h FROM llm_responses r JOIN queries q ON r.query_id = q.id GROUP BY q.target_llm ORDER BY q.target_llm;" \
            "\\echo '=== 6. Updated per-topic pipeline state ==='" \
            "SELECT p.topic_id, COUNT(q.id) AS queries_total, COUNT(q.id) FILTER (WHERE q.status = 'pending') AS pending, COUNT(q.id) FILTER (WHERE q.status = 'running') AS running, COUNT(q.id) FILTER (WHERE q.status = 'done') AS done, COUNT(q.id) FILTER (WHERE q.status = 'failed') AS failed, COUNT(r.id) AS llm_responses FROM prompts p JOIN queries q ON q.prompt_id = p.id LEFT JOIN llm_responses r ON r.query_id = q.id WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170) GROUP BY p.topic_id ORDER BY p.topic_id;" \
            "\\echo '=== 7. Top-6 failed query IDs ==='" \
            "SELECT q.id, q.target_llm, q.retry_reason FROM queries q JOIN prompts p ON p.id = q.prompt_id WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170) AND q.status='failed' ORDER BY q.finished_at DESC NULLS LAST LIMIT 6;" \
            "ROLLBACK;" \
            > /tmp/diag_1029.sql
          docker cp /tmp/diag_1029.sql genpano-postgres-1:/tmp/diag_1029.sql 2>&1 || true
          docker compose exec -T postgres psql -U genpano -d genpano -X -f /tmp/diag_1029.sql 2>&1 || true

          echo
          echo "=== Top-3 failed query IDs (extracted for log grep) ==="
          IDS=$(docker compose exec -T postgres psql -U genpano -d genpano -tA -X -c "SELECT q.id FROM queries q JOIN prompts p ON p.id = q.prompt_id WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170) AND q.status='failed' ORDER BY q.finished_at DESC NULLS LAST LIMIT 3;" 2>/dev/null | tr -d '\r' | head -3)
          echo "IDS=$IDS"

          echo
          echo "=== Worker logs (last 30m) — error/fail/auth/cookie/exception keywords ==="
          docker compose logs worker --since 30m 2>&1 | grep -iE 'execute_query|error|fail|warn|trace|exception|account|cookie|auth|401|429|captcha|quota|rate.limit' | tail -200 || true

          echo
          echo "=== Worker logs per failed query_id ==="
          for qid in $IDS; do
            echo "--- query_id=$qid ---"
            docker compose logs worker --since 30m 2>&1 | grep -E "(\\b|_)$qid(\\b|_|[^0-9])" | tail -40 || echo "(no log lines for $qid)"
          done

          echo "=== Readback complete ==="
          REMOTE

      - name: Upload readback log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topics-1029-readback
          path: /tmp/topics_1029_readback.txt
          if-no-files-found: warn

      - name: Post readback to PR #1077 as comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: 1077
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/topics_1029_readback.txt ]; then
            echo "readback file missing or empty; skipping PR comment"
            exit 0
          fi
          {
            echo "## Worker failure diagnostic readback (issue #1029, iter 4)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Branch**: \`${{ github.ref_name }}\`"
            echo ""
            echo "<details><summary>Raw SQL + worker log output (click)</summary>"
            echo ""
            echo '```'
            # Strip ANSI; cap to ~55KB to stay under GitHub's 64KB comment limit.
            sed 's/\x1b\[[0-9;]*m//g' /tmp/topics_1029_readback.txt | head -c 55000
            echo ''
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/readback-comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/readback-comment.md
