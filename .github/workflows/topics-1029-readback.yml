name: Topics #1029 Readback

# Investigation-only read-only DB readback for issue #1029.
# Purpose: capture the actual per-topic state of BestCoffer topics so the
# user-facing-list vs admin-count gap (4 of 13) has hard evidence, instead
# of code-inference hypotheses (see reverts in #1065).
#
# This workflow only runs SELECTs inside a READ ONLY transaction. No writes.
#
# Poll iteration marker (forces fresh push): 2026-05-16T15:01:30Z iter=2
# Polling pipeline progress for stuck topics 162..170 at 3-minute intervals.

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "BestCoffer canonical brand id"
        required: true
        default: "24"
  push:
    branches:
      - claude/investigate-issue-1029-readback-Ny8TZ
    paths:
      - '.github/workflows/topics-1029-readback.yml'

concurrency:
  group: topics-1029-readback
  cancel-in-progress: false

jobs:
  readback:
    name: Capture per-topic readback for BestCoffer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      BRAND_ID: ${{ github.event.inputs.brand_id || '24' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate brand_id
        shell: bash
        run: |
          set -euo pipefail
          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || { echo "brand_id must be a positive integer, got '${BRAND_ID}'"; exit 1; }
          echo "brand_id=${BRAND_ID}"

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run readback SQL on live test environment
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "BRAND_ID='${BRAND_ID}' bash -s" <<'REMOTE' | tee /tmp/topics_1029_readback.txt
          set -euo pipefail
          cd /opt/genpano

          echo "=== Captured at ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"

          echo "=== Pipeline progress poll (iteration 2) for stuck topics 162..170 ==="
          docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -X <<SQL
          \set ON_ERROR_STOP on
          BEGIN TRANSACTION READ ONLY;

          \echo '--- Per-topic metrics ---'
          WITH topic_metrics AS (
            SELECT
              p.topic_id,
              COUNT(q.id) AS queries_total,
              COUNT(q.id) FILTER (WHERE q.status = 'pending') AS queries_pending,
              COUNT(q.id) FILTER (WHERE q.status = 'running') AS queries_running,
              COUNT(q.id) FILTER (WHERE q.status = 'done') AS queries_done,
              COUNT(q.id) FILTER (WHERE q.status = 'failed') AS queries_failed,
              COUNT(r.id) AS llm_responses,
              COUNT(r.id) FILTER (WHERE r.analysis_status = 'done') AS successful_response_count
            FROM prompts p
            JOIN queries q ON q.prompt_id = p.id
            LEFT JOIN llm_responses r ON r.query_id = q.id
            WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
            GROUP BY p.topic_id
          )
          SELECT * FROM topic_metrics ORDER BY topic_id;

          \echo '--- Aggregate totals ---'
          WITH topic_metrics AS (
            SELECT
              p.topic_id,
              COUNT(q.id) AS queries_total,
              COUNT(q.id) FILTER (WHERE q.status = 'pending') AS queries_pending,
              COUNT(q.id) FILTER (WHERE q.status = 'running') AS queries_running,
              COUNT(q.id) FILTER (WHERE q.status = 'done') AS queries_done,
              COUNT(q.id) FILTER (WHERE q.status = 'failed') AS queries_failed,
              COUNT(r.id) AS llm_responses,
              COUNT(r.id) FILTER (WHERE r.analysis_status = 'done') AS successful_response_count
            FROM prompts p
            JOIN queries q ON q.prompt_id = p.id
            LEFT JOIN llm_responses r ON r.query_id = q.id
            WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
            GROUP BY p.topic_id
          )
          SELECT
            SUM(queries_pending) AS total_pending,
            SUM(queries_running) AS total_running,
            SUM(queries_done) AS total_done,
            SUM(queries_failed) AS total_failed,
            SUM(llm_responses) AS total_llm_responses,
            SUM(successful_response_count) AS total_successful
          FROM topic_metrics;

          ROLLBACK;
          SQL

          echo "=== Readback complete ==="
          REMOTE

      - name: Upload readback log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topics-1029-readback
          path: /tmp/topics_1029_readback.txt
          if-no-files-found: warn

      - name: Post readback to PR #1077 as comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: 1077
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/topics_1029_readback.txt ]; then
            echo "readback file missing or empty; skipping PR comment"
            exit 0
          fi
          {
            echo "## DB readback result (issue #1029)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat /tmp/topics_1029_readback.txt
            echo '```'
          } > /tmp/readback-comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/readback-comment.md
