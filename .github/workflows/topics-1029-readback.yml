name: Topics #1029 Readback

# Investigation-only read-only DB readback for issue #1029.
# Purpose: capture the actual per-topic state of BestCoffer topics so the
# user-facing-list vs admin-count gap (4 of 13) has hard evidence, instead
# of code-inference hypotheses (see reverts in #1065).
#
# This workflow only runs SELECTs inside a READ ONLY transaction. No writes.
#
# Re-trigger (post manual dispatch): scheduler_runs 21+22 created 72 pending
# queries across the 9 stuck topics (162-170). This iteration verifies the
# worker pipeline progress: query.status -> llm_responses -> analysis_status
# -> user-visible successful_response_count > 0.

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "BestCoffer canonical brand id"
        required: true
        default: "24"
  push:
    branches:
      - claude/investigate-issue-1029-readback-Ny8TZ
    paths:
      - '.github/workflows/topics-1029-readback.yml'

concurrency:
  group: topics-1029-readback
  cancel-in-progress: false

jobs:
  readback:
    name: Capture per-topic readback for BestCoffer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      BRAND_ID: ${{ github.event.inputs.brand_id || '24' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate brand_id
        shell: bash
        run: |
          set -euo pipefail
          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || { echo "brand_id must be a positive integer, got '${BRAND_ID}'"; exit 1; }
          echo "brand_id=${BRAND_ID}"

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run readback SQL on live test environment
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "BRAND_ID='${BRAND_ID}' bash -s" <<'REMOTE' | tee /tmp/topics_1029_readback.txt
          set -euo pipefail
          cd /opt/genpano

          echo "=== Captured at ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"

          echo "=== Step 1 (worker-stall): tightened pending/done totals + earliest pending + scheduler_config ==="
          docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -X <<SQL
          \set ON_ERROR_STOP on
          BEGIN TRANSACTION READ ONLY;

          \echo '--- T1: aggregate totals across the 9 stuck topics (162..170) ---'
          SELECT COUNT(*)                                              AS queries_total,
                 COUNT(*) FILTER (WHERE q.status='pending')            AS queries_pending,
                 COUNT(*) FILTER (WHERE q.status='running')            AS queries_running,
                 COUNT(*) FILTER (WHERE q.status='done')               AS queries_done,
                 COUNT(*) FILTER (WHERE q.status='failed')             AS queries_failed,
                 MIN(q.queued_at)   FILTER (WHERE q.status='pending')  AS earliest_pending_queued_at,
                 MAX(q.queued_at)   FILTER (WHERE q.status='pending')  AS latest_pending_queued_at,
                 MIN(q.started_at)                                     AS earliest_started_at,
                 MAX(q.finished_at)                                    AS latest_finished_at,
                 NOW()                                                 AS now_utc
          FROM queries q
          JOIN prompts p ON p.id = q.prompt_id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170);

          \echo '--- T2: scheduler_config (mode/paused_engines/temp_global_cap/engine_caps) ---'
          SELECT id, mode, daily_time, timezone, temp_global_cap, engine_caps,
                 retry_max, paused_engines, updated_at
          FROM scheduler_config
          ORDER BY id
          LIMIT 5;

          \echo '--- T3: pending queries breakdown by target_llm across all topics (not just 162..170) ---'
          SELECT q.target_llm,
                 COUNT(*) FILTER (WHERE q.status='pending')   AS pending,
                 COUNT(*) FILTER (WHERE q.status='running')   AS running,
                 COUNT(*) FILTER (WHERE q.status='done' AND q.finished_at > NOW() - INTERVAL '24 hours') AS done_24h,
                 COUNT(*) FILTER (WHERE q.status='failed' AND q.finished_at > NOW() - INTERVAL '24 hours') AS failed_24h
          FROM queries q
          GROUP BY q.target_llm
          ORDER BY q.target_llm;

          ROLLBACK;
          SQL

          echo "=== Readback complete ==="
          REMOTE

      - name: Upload readback log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topics-1029-readback
          path: /tmp/topics_1029_readback.txt
          if-no-files-found: warn

      - name: Post readback to PR #1077 as comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: 1077
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/topics_1029_readback.txt ]; then
            echo "readback file missing or empty; skipping PR comment"
            exit 0
          fi
          {
            echo "## DB readback result (issue #1029)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat /tmp/topics_1029_readback.txt
            echo '```'
          } > /tmp/readback-comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/readback-comment.md
