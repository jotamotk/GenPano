name: Topics #1029 Readback

# Investigation-only read-only DB readback for issue #1029.
# Purpose: capture the actual per-topic state of BestCoffer topics so the
# user-facing-list vs admin-count gap (4 of 13) has hard evidence, instead
# of code-inference hypotheses (see reverts in #1065).
#
# This workflow only runs SELECTs inside a READ ONLY transaction. No writes.
#
# Re-trigger: PR #1080 backfilled 108 query_schedules rows for the 9 stuck
# topics. This re-run confirms Q3/Q3b now shows schedules > 0 per topic
# and surfaces any queries (Q5/Q5b) the scheduler has begun dispatching
# since the backfill landed.

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "BestCoffer canonical brand id"
        required: true
        default: "24"
  push:
    branches:
      - claude/investigate-issue-1029-readback-Ny8TZ
    paths:
      - '.github/workflows/topics-1029-readback.yml'

concurrency:
  group: topics-1029-readback
  cancel-in-progress: false

jobs:
  readback:
    name: Capture per-topic readback for BestCoffer
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      BRAND_ID: ${{ github.event.inputs.brand_id || '24' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate brand_id
        shell: bash
        run: |
          set -euo pipefail
          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || { echo "brand_id must be a positive integer, got '${BRAND_ID}'"; exit 1; }
          echo "brand_id=${BRAND_ID}"

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run readback SQL on live test environment
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "BRAND_ID='${BRAND_ID}' bash -s" <<'REMOTE' | tee /tmp/topics_1029_readback.txt
          set -euo pipefail
          cd /opt/genpano

          echo "=== Captured at ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"

          echo "=== Step 2 readback: prompts/schedules/queries for 9 stuck topics vs 4 working topics ==="
          docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -X <<SQL
          \set ON_ERROR_STOP on
          BEGIN TRANSACTION READ ONLY;

          \echo '--- S0a: prompts table schema (\\d prompts) ---'
          \d prompts

          \echo '--- S0b: query_schedules table schema (\\d query_schedules) ---'
          \d query_schedules

          \echo '--- S0c: queries table schema (\\d queries) ---'
          \d queries

          \echo '--- Q1: prompts for the 9 stuck topics (162..170) ---'
          SELECT id AS prompt_id,
                 topic_id,
                 COALESCE(status, '-')        AS status,
                 COALESCE(intent, '-')        AS intent,
                 COALESCE(generated_by, '-')  AS generated_by,
                 COALESCE(template_strategy, '-') AS template_strategy,
                 created_at
          FROM prompts
          WHERE topic_id IN (162,163,164,165,166,167,168,169,170)
          ORDER BY topic_id, id;

          \echo '--- Q1b: prompts.status counts for 9 stuck topics ---'
          SELECT topic_id,
                 COUNT(*)                                                 AS prompts,
                 COUNT(*) FILTER (WHERE status IS NULL)                   AS status_null,
                 COUNT(*) FILTER (WHERE status = 'active')                AS status_active,
                 COUNT(*) FILTER (WHERE status = 'approved')              AS status_approved,
                 COUNT(*) FILTER (WHERE status = 'pending')               AS status_pending,
                 COUNT(*) FILTER (WHERE status = 'rejected')              AS status_rejected,
                 COUNT(*) FILTER (WHERE status NOT IN ('active','approved','pending','rejected')
                                  AND status IS NOT NULL)                 AS status_other
          FROM prompts
          WHERE topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY topic_id
          ORDER BY topic_id;

          \echo '--- Q2: prompts for the 4 working control topics (153,154,158,159) ---'
          SELECT id AS prompt_id,
                 topic_id,
                 COALESCE(status, '-')        AS status,
                 COALESCE(intent, '-')        AS intent,
                 COALESCE(generated_by, '-')  AS generated_by,
                 COALESCE(template_strategy, '-') AS template_strategy,
                 created_at
          FROM prompts
          WHERE topic_id IN (153,154,158,159)
          ORDER BY topic_id, id
          LIMIT 60;

          \echo '--- Q2b: prompts.status counts for 4 working topics ---'
          SELECT topic_id,
                 COUNT(*)                                                 AS prompts,
                 COUNT(*) FILTER (WHERE status IS NULL)                   AS status_null,
                 COUNT(*) FILTER (WHERE status = 'active')                AS status_active,
                 COUNT(*) FILTER (WHERE status = 'approved')              AS status_approved,
                 COUNT(*) FILTER (WHERE status = 'pending')               AS status_pending,
                 COUNT(*) FILTER (WHERE status = 'rejected')              AS status_rejected
          FROM prompts
          WHERE topic_id IN (153,154,158,159)
          GROUP BY topic_id
          ORDER BY topic_id;

          \echo '--- Q3: query_schedules for the 9 stuck topics prompts ---'
          SELECT qs.id          AS schedule_id,
                 qs.prompt_id,
                 p.topic_id,
                 qs.enabled,
                 qs.target_llm,
                 qs.cadence_days,
                 qs.next_run_at,
                 qs.last_run_at,
                 qs.created_at,
                 qs.updated_at
          FROM query_schedules qs
          JOIN prompts p ON p.id = qs.prompt_id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          ORDER BY p.topic_id, qs.prompt_id, qs.id;

          \echo '--- Q3b: schedule count summary for 9 stuck topics (by topic) ---'
          SELECT p.topic_id,
                 COUNT(qs.id)                                AS schedules,
                 COUNT(qs.id) FILTER (WHERE qs.enabled)      AS schedules_enabled,
                 COUNT(qs.id) FILTER (WHERE NOT qs.enabled)  AS schedules_disabled,
                 COUNT(qs.id) FILTER (WHERE qs.last_run_at IS NOT NULL) AS schedules_ever_run
          FROM prompts p
          LEFT JOIN query_schedules qs ON qs.prompt_id = p.id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY p.topic_id
          ORDER BY p.topic_id;

          \echo '--- Q4: query_schedules for the 4 working topics prompts (control) ---'
          SELECT qs.id          AS schedule_id,
                 qs.prompt_id,
                 p.topic_id,
                 qs.enabled,
                 qs.target_llm,
                 qs.cadence_days,
                 qs.next_run_at,
                 qs.last_run_at,
                 qs.created_at,
                 qs.updated_at
          FROM query_schedules qs
          JOIN prompts p ON p.id = qs.prompt_id
          WHERE p.topic_id IN (153,154,158,159)
          ORDER BY p.topic_id, qs.prompt_id, qs.id
          LIMIT 60;

          \echo '--- Q4b: schedule count summary for 4 working topics (by topic) ---'
          SELECT p.topic_id,
                 COUNT(qs.id)                                AS schedules,
                 COUNT(qs.id) FILTER (WHERE qs.enabled)      AS schedules_enabled,
                 COUNT(qs.id) FILTER (WHERE NOT qs.enabled)  AS schedules_disabled,
                 COUNT(qs.id) FILTER (WHERE qs.last_run_at IS NOT NULL) AS schedules_ever_run
          FROM prompts p
          LEFT JOIN query_schedules qs ON qs.prompt_id = p.id
          WHERE p.topic_id IN (153,154,158,159)
          GROUP BY p.topic_id
          ORDER BY p.topic_id;

          \echo '--- Q5: any queries (even failed) for the 9 stuck topics prompts ---'
          SELECT q.id                                AS query_id,
                 q.prompt_id,
                 p.topic_id,
                 q.status,
                 q.target_llm,
                 q.retry_count,
                 q.retry_reason,
                 q.scheduled_at,
                 q.created_at,
                 q.started_at,
                 q.finished_at
          FROM queries q
          JOIN prompts p ON p.id = q.prompt_id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          ORDER BY p.topic_id, q.prompt_id, q.id
          LIMIT 100;

          \echo '--- Q5b: queries count summary by status for 9 stuck topics ---'
          SELECT q.status, COUNT(*) AS n
          FROM queries q
          JOIN prompts p ON p.id = q.prompt_id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY q.status
          ORDER BY n DESC;

          \echo '--- Q6: prompt_candidates for 9 stuck topics (if table exists) ---'
          SELECT id, topic_id, status, COALESCE(approved_prompt_id::text, '-') AS approved_prompt_id,
                 COALESCE(reviewed_by, '-') AS reviewed_by, reviewed_at, created_at
          FROM prompt_candidates
          WHERE topic_id IN (162,163,164,165,166,167,168,169,170)
          ORDER BY topic_id, id
          LIMIT 60;

          \echo '--- Q6b: prompt_candidates status counts for 9 stuck topics ---'
          SELECT topic_id,
                 COUNT(*)                                              AS candidates,
                 COUNT(*) FILTER (WHERE status = 'pending')            AS pending,
                 COUNT(*) FILTER (WHERE status = 'approved')           AS approved,
                 COUNT(*) FILTER (WHERE status = 'rejected')           AS rejected,
                 COUNT(*) FILTER (WHERE approved_prompt_id IS NOT NULL) AS linked_to_prompt
          FROM prompt_candidates
          WHERE topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY topic_id
          ORDER BY topic_id;

          \echo '--- Q6c: prompt_candidates status counts for 4 working topics ---'
          SELECT topic_id,
                 COUNT(*)                                              AS candidates,
                 COUNT(*) FILTER (WHERE status = 'pending')            AS pending,
                 COUNT(*) FILTER (WHERE status = 'approved')           AS approved,
                 COUNT(*) FILTER (WHERE status = 'rejected')           AS rejected,
                 COUNT(*) FILTER (WHERE approved_prompt_id IS NOT NULL) AS linked_to_prompt
          FROM prompt_candidates
          WHERE topic_id IN (153,154,158,159)
          GROUP BY topic_id
          ORDER BY topic_id;

          ROLLBACK;
          SQL

          echo "=== Readback complete ==="
          REMOTE

      - name: Upload readback log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topics-1029-readback
          path: /tmp/topics_1029_readback.txt
          if-no-files-found: warn

      - name: Post readback to PR #1077 as comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: 1077
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/topics_1029_readback.txt ]; then
            echo "readback file missing or empty; skipping PR comment"
            exit 0
          fi
          {
            echo "## DB readback result (issue #1029)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat /tmp/topics_1029_readback.txt
            echo '```'
          } > /tmp/readback-comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/readback-comment.md
