name: VM Final Tally

on:
  workflow_dispatch:

jobs:
  tally:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Tally
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          SQL="WITH recent AS (
                 SELECT r.id AS resp_id, r.query_id, r.collected_at, length(r.raw_text) AS chars
                 FROM llm_responses r
                 JOIN queries q ON q.id = r.query_id
                 WHERE q.query_text ILIKE '%bestCoffer%' AND q.target_llm='doubao'
                   AND r.collected_at >= NOW() - INTERVAL '12 hours'
                   AND r.raw_text IS NOT NULL AND length(r.raw_text) >= 200
               )
               SELECT
                 'last_12h_total_VM_responses' AS k, count(*)::text AS v FROM recent
               UNION ALL
               SELECT 'analyzed',
                 (SELECT count(*) FROM recent r JOIN response_analyses a ON a.response_id = r.resp_id)::text
               UNION ALL
               SELECT 'pending_analysis',
                 (SELECT count(*) FROM recent r LEFT JOIN response_analyses a ON a.response_id = r.resp_id WHERE a.id IS NULL)::text
               UNION ALL
               SELECT 'distinct_queries', (SELECT count(DISTINCT query_id) FROM recent)::text;"
          echo "=== bestCoffer Doubao VM tally (last 12h) ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"${SQL}\""
          echo
          echo "=== sample analyzer outputs (last 12h, 10 rows) ==="
          SQL2="SELECT r.id AS resp, r.query_id AS q, length(r.raw_text) AS chars, a.total_brands_mentioned AS brands, a.target_brand_mentioned AS hit, a.target_brand_sentiment AS sent FROM llm_responses r JOIN queries q ON q.id=r.query_id LEFT JOIN response_analyses a ON a.response_id=r.id WHERE q.query_text ILIKE '%bestCoffer%' AND q.target_llm='doubao' AND r.collected_at >= NOW() - INTERVAL '12 hours' ORDER BY a.id DESC NULLS LAST LIMIT 10;"
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"${SQL2}\""
