name: CI

on:
  pull_request:

jobs:
  backend-lint-test:
    name: Backend Lint + Test (Python 3.12)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Ruff lint (uv run ruff check)
        run: uv run ruff check .

      - name: Ruff format check (uv run ruff format --check)
        run: uv run ruff format --check .

      - name: mypy strict (uv run mypy app/)
        run: uv run mypy app/

      - name: Harness L1 ci_check (uv run python scripts/ci_check.py)
        run: uv run python scripts/ci_check.py

      - name: Harness L1 selftest (uv run python scripts/ci_harness_selftest.py)
        run: uv run python scripts/ci_harness_selftest.py

      - name: Alembic upgrade head (default SQLite, Step 6 regression guard)
        run: uv run alembic upgrade head

      - name: pytest (uv run pytest -- exit 5 = no tests collected, treat as PASS)
        shell: bash
        run: |
          set +e
          uv run pytest -v
          EXIT_CODE=$?
          set -e
          # pytest exit 5 = "no tests were collected"; per Step 8 spec
          # ("即使现在 0 testcase 也要保留 step"), this is expected pre-Step 9.
          # Step 9 introduces Harness tests; exit 5 path goes cold.
          if [ "$EXIT_CODE" = "0" ] || [ "$EXIT_CODE" = "5" ]; then
            exit 0
          fi
          exit "$EXIT_CODE"

  frontend-admin-e2e:
    name: Admin Fake E2E (Playwright)
    runs-on: ubuntu-22.04
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Admin fake E2E release gate
        env:
          E2E_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: npm run test:e2e:admin -- --reporter=github

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --port 4173 --host 127.0.0.1 &
          # Wait until preview is reachable; abort after 30s.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ > /dev/null; then
              echo "preview ready"; exit 0
            fi
            sleep 1
          done
          echo "preview server failed to start"; exit 1

      - name: Playwright tests
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e -- onboarding-flow.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
