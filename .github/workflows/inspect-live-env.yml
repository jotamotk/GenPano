name: Inspect Live .env

# One-shot diagnostic: SSH to deploy server and print which keys in
# /opt/genpano/.env are set vs empty. NEVER prints values. Used to
# determine which "missing" GitHub secrets are actually load-bearing
# on the live deploy at http://116.62.36.173/.

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: SSH and grep keys (no values)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ ! -r /opt/genpano/.env ]; then
              echo "FATAL: /opt/genpano/.env not readable" >&2
              exit 1
            fi
            echo "=== /opt/genpano/.env key presence ==="
            awk -F= '
              /^[A-Z_][A-Z0-9_]*=/ {
                key = $1
                # value is everything after first =
                value = substr($0, index($0, "=") + 1)
                if (length(value) == 0) {
                  print key "=<EMPTY>"
                } else {
                  print key "=<set,len=" length(value) ">"
                }
              }
            ' /opt/genpano/.env | sort
            echo "=== EOF ==="
