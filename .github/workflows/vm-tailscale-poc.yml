name: VM Tailscale PoC (Phase 0 M1 — temporary runner-as-VM)

# Spins up a GitHub Actions runner with Xfce + Chrome + x11vnc + noVNC
# joined to the user's Tailscale tailnet. Lets the operator open the
# runner's desktop from any phone/laptop (Tailscale required), manually
# log into doubao.com via QR code, and verify the VM-per-account
# architecture works end-to-end before committing to real cloud VMs.
#
# Limitations vs production Aliyun ECS:
#   - Runner is EPHEMERAL (4h default, max 6h GitHub limit). No persistent
#     profile across reruns — purely a smoke test.
#   - Datacenter IP (GitHub Actions runner), not Beijing residential.
#     Doubao MAY trip risk-control more easily; acceptable for one-off
#     login smoke test, not for sustained ramp.
#   - Single concurrent VM per workflow run.

on:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: 'How long to keep VM alive (default 30 = 一次性, max 350)'
        required: false
        default: '30'
        type: string

jobs:
  vm-poc:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - name: Install Xfce + Chrome + VNC stack
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xfce4-session xfce4-panel xfwm4 xfce4-terminal \
            x11vnc novnc websockify \
            xvfb xdotool dbus-x11 \
            curl ca-certificates gnupg apt-transport-https \
            fonts-wqy-microhei fonts-noto-cjk
          # Google Chrome stable
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install + start Tailscale (via official install.sh)
        # Bypass tailscale/github-action@v2 — its sha256 check breaks on
        # current `latest` Tailscale release. install.sh is upstream-maintained
        # and Just Works.
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          set -euxo pipefail
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          # tailscaled is installed as a systemd unit; start it
          sudo systemctl enable --now tailscaled
          # join the tailnet (kernel tun mode, runner has sudo)
          sudo tailscale up \
            --authkey="${TAILSCALE_AUTH_KEY}" \
            --hostname="vm-doubao-poc-${{ github.run_id }}" \
            --accept-routes \
            --accept-dns=false
          # wait a beat for state to settle
          sleep 3

      - name: Show Tailscale status
        run: |
          set -euxo pipefail
          tailscale status || true
          tailscale ip --4 || true
          tailscale ip --6 || true

      - name: Start desktop + Chrome + noVNC, print summary, keep alive
        # CRITICAL: every long-running service (Xvfb, Xfce, Chrome, x11vnc,
        # websockify) MUST run inside ONE shell with a tail `sleep` so it
        # survives the whole job. Earlier split-step layout had each service
        # backgrounded with `&` then the step shell exited — SIGHUP killed
        # those children, so by the time the operator tried to connect, the
        # 6080 → 5900 chain was dead (websockify alone happened to survive
        # because it was started last, so noVNC returned 502 Bad Gateway).
        # Single-shell + final sleep keeps all PIDs as live children.
        run: |
          set -euxo pipefail

          # ---- 1. VNC password ----
          VNC_PW=$(openssl rand -hex 4)
          printf '%s' "$VNC_PW" > /tmp/.vncpw.plain
          chmod 0600 /tmp/.vncpw.plain
          x11vnc -storepasswd "$VNC_PW" /tmp/.vncpasswd

          # ---- 2. Xvfb on :0 ----
          Xvfb :0 -screen 0 1920x1080x24 -nolisten tcp \
            >/tmp/xvfb.log 2>&1 &
          # Wait for display to be ready (xdpyinfo polls until socket up)
          for i in {1..20}; do
            if DISPLAY=:0 xdpyinfo >/dev/null 2>&1; then break; fi
            sleep 0.5
          done
          DISPLAY=:0 xdpyinfo | head -2

          # ---- 3. Xfce ----
          DISPLAY=:0 dbus-launch --exit-with-session startxfce4 \
            >/tmp/xfce.log 2>&1 &
          sleep 5

          # ---- 4. Chrome (doubao profile) ----
          mkdir -p "$HOME/profile-doubao"
          DISPLAY=:0 google-chrome \
            --user-data-dir="$HOME/profile-doubao" \
            --remote-debugging-port=9222 \
            --remote-debugging-address=127.0.0.1 \
            --no-sandbox --no-first-run --no-default-browser-check \
            --disable-blink-features=AutomationControlled \
            --disable-dev-shm-usage \
            --window-size=1920,1080 \
            'https://www.doubao.com/chat' \
            >/tmp/chrome-doubao.log 2>&1 &
          # Wait until CDP listens on 9222
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9222/json/version >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:9222/json/version | head -3 || echo "WARN: CDP not yet ready, but proceeding"

          # ---- 5. x11vnc ----
          x11vnc -display :0 -forever -shared -rfbauth /tmp/.vncpasswd \
            >/tmp/x11vnc.log 2>&1 &
          # Wait until 5900 listens
          for i in {1..20}; do
            if ss -tln | grep -q ':5900 '; then break; fi
            sleep 0.5
          done
          ss -tln | grep ':5900 ' || { echo "ERROR: x11vnc not listening on 5900"; cat /tmp/x11vnc.log; exit 1; }

          # ---- 6. websockify (noVNC) ----
          websockify --web /usr/share/novnc 6080 localhost:5900 \
            >/tmp/websockify.log 2>&1 &
          # Wait until 6080 listens
          for i in {1..20}; do
            if ss -tln | grep -q ':6080 '; then break; fi
            sleep 0.5
          done
          ss -tln | grep ':6080 ' || { echo "ERROR: websockify not listening on 6080"; cat /tmp/websockify.log; exit 1; }

          # ---- 7. Print connection info ----
          TAILSCALE_IP=$(tailscale ip --4 | head -1)
          TAILSCALE_HOST="vm-doubao-poc-${{ github.run_id }}"
          {
            echo "## 🚀 VM Test Environment Ready"
            echo ""
            echo "### Connection (open from your device with Tailscale running)"
            echo ""
            echo "**Option A — by Tailscale hostname** (requires MagicDNS enabled):"
            echo "\`\`\`"
            echo "http://${TAILSCALE_HOST}:6080/vnc.html"
            echo "\`\`\`"
            echo ""
            echo "**Option B — by Tailscale IP** (always works):"
            echo "\`\`\`"
            echo "http://${TAILSCALE_IP}:6080/vnc.html"
            echo "\`\`\`"
            echo ""
            echo "### VNC password"
            echo ""
            echo "\`${VNC_PW}\`"
            echo ""
            echo "### Auto-shutdown"
            echo "Runner exits in ${{ inputs.keep_alive_minutes }} minutes."
          } >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "=================================================="
          echo "noVNC: http://${TAILSCALE_IP}:6080/vnc.html"
          echo "VNC password: $VNC_PW"
          echo "=================================================="

          # ---- 8. Keep alive (single shell, all bg processes are children) ----
          MINS="${{ inputs.keep_alive_minutes }}"
          if [ "$MINS" -gt 350 ]; then MINS=350; fi
          echo "Sleeping $MINS minutes; bg services are children of this shell."
          for ((i=1; i<=MINS; i++)); do
            sleep 60
            if [ $((i % 5)) -eq 0 ]; then
              # Heartbeat: confirm services still alive
              alive=""
              pgrep -f Xvfb >/dev/null 2>&1 && alive+="Xvfb "
              pgrep -f x11vnc >/dev/null 2>&1 && alive+="x11vnc "
              pgrep -f websockify >/dev/null 2>&1 && alive+="websockify "
              pgrep -f google-chrome >/dev/null 2>&1 && alive+="chrome "
              echo "[$i / $MINS min] alive: $alive"
            fi
          done

      - name: Cleanup
        if: always()
        run: |
          # Tailscale logout so the ephemeral node disappears from your tailnet
          tailscale logout || true
          pkill -f x11vnc || true
          pkill -f websockify || true
          pkill -f google-chrome || true
          pkill -f startxfce4 || true
          pkill -f Xvfb || true
