name: Topics #1029 Trigger Dispatch

# WRITABLE one-shot ops follow-up for issue #1029.
#
# Prior PR #1080 backfilled 108 query_schedules rows for the 9 stuck
# BestCoffer topics (162..170; prompts 252..291). Re-readback at
# https://github.com/jotamotk/trash_test/pull/1077#issuecomment-4467069814
# confirmed all 108 rows exist, are enabled, and have next_run_at in the
# past — yet last_run_at=NULL for all of them, and the 4 working topics'
# schedules also show stale last_run_at (max 2026-05-11). The Celery beat
# task list in `geo_tracker/tasks/celery_tasks.py::_beat_schedule` does
# NOT include `run_daily_dispatch`, so the scheduler is not actively
# dispatching on its own — it requires a manual trigger.
#
# This workflow SSHes to the live test env, runs
# `app.admin.scheduler.manual_dispatch.run_manual_dispatch` inside the
# backend container scoped to brand_id=24 (BestCoffer only), then runs a
# SQL count to verify queries appeared for the 9 stuck topics.
#
# Dispatch IS NOT idempotent in the same way the schedule backfill was —
# every successful trigger inserts queries up to schedule_limit. The
# brand_id=24 filter constrains scope to BestCoffer; do NOT remove it.
#
# Second run header: the first auto-trigger ran before PR #1082 existed
# and therefore skipped the comment step. This re-trigger gets the
# dispatch result + verification numbers posted to PR #1082.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to trigger dispatch. Anything else dry-runs SQL counts only."
        required: true
        default: "DRYRUN"
  push:
    branches:
      - claude/fix-issue-1029-trigger-dispatch-Ny8TZ
    paths:
      - '.github/workflows/topics-1029-trigger-dispatch.yml'

concurrency:
  group: topics-1029-trigger-dispatch
  cancel-in-progress: false

jobs:
  trigger-dispatch:
    name: Trigger scheduler dispatch for BestCoffer brand_id=24
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      # push trigger has no inputs object; default to APPLY so the
      # auto-trigger does the real dispatch. workflow_dispatch overrides.
      CONFIRM: ${{ github.event.inputs.confirm || 'APPLY' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

    steps:
      - name: Validate confirm input
        shell: bash
        run: |
          set -euo pipefail
          case "${CONFIRM}" in
            APPLY|DRYRUN) ;;
            *) echo "confirm must be APPLY or DRYRUN, got '${CONFIRM}'"; exit 1 ;;
          esac
          echo "confirm=${CONFIRM}"

      - name: Set up SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Trigger run_manual_dispatch + verify queries
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            "CONFIRM='${CONFIRM}' bash -s" <<'REMOTE' | tee /tmp/topics_1029_trigger.txt
          set -euo pipefail
          cd /opt/genpano

          echo "=== Captured at ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== Trigger mode: ${CONFIRM} ==="

          echo "=== Docker compose status ==="
          docker compose ps

          echo ""
          echo "=== Pre-trigger SQL state (brand_id=24, topics 162..170) ==="
          docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -X <<'SQL'
          \set ON_ERROR_STOP on
          BEGIN TRANSACTION READ ONLY;

          \echo '--- pre-trigger: queries count for the 9 stuck topics ---'
          SELECT COUNT(*) AS pre_queries_for_stuck_topics
          FROM queries q
          JOIN prompts p ON q.prompt_id = p.id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170);

          \echo '--- pre-trigger: schedules ever dispatched for the 36 stuck-topic prompts ---'
          SELECT COUNT(*) AS pre_schedules_dispatched
          FROM query_schedules
          WHERE prompt_id IN (252,253,254,255,256,257,258,259,260,261,
                              262,263,264,265,266,267,268,269,270,271,
                              272,273,274,275,276,277,278,279,280,281,
                              282,283,288,289,290,291)
            AND last_run_at IS NOT NULL;

          \echo '--- pre-trigger: enabled+due BestCoffer schedules ---'
          SELECT COUNT(*) AS pre_brand24_enabled,
                 COUNT(*) FILTER (WHERE next_run_at <= NOW()) AS pre_brand24_due
          FROM query_schedules
          WHERE brand_id = 24
            AND enabled = TRUE;

          ROLLBACK;
          SQL

          if [ "${CONFIRM}" = "APPLY" ]; then
            echo ""
            echo "=== APPLY: invoking run_manual_dispatch(brand_id=24, schedule_limit=200) ==="
            # run_manual_dispatch is async; wrap in asyncio.run inside the
            # backend container which has app/ on PYTHONPATH and
            # AsyncSessionLocal configured against the live DATABASE_URL.
            docker compose exec -T backend python <<'PYTHON'
          import asyncio
          import json
          from app.admin.scheduler.manual_dispatch import run_manual_dispatch
          from app.db.session import AsyncSessionLocal


          async def _main() -> None:
              async with AsyncSessionLocal() as session:
                  # brand_id=24 limits dispatch to BestCoffer only; do NOT
                  # remove this filter. schedule_limit=200 covers the 108
                  # backfilled stuck-topic schedules + working-topic
                  # schedules with headroom (max allowed is 5000).
                  result = await run_manual_dispatch(
                      session,
                      brand_id=24,
                      schedule_limit=200,
                      note="ops: trigger dispatch for #1029 stuck topics",
                  )
              # Drop non-serializable / heavy fields before printing.
              for k in ("query_dispatches",):
                  result.pop(k, None)
              # query_ids can be long; cap to first 50 for log clarity.
              if isinstance(result.get("query_ids"), list) and len(result["query_ids"]) > 50:
                  result["query_ids_truncated"] = True
                  result["query_ids_count"] = len(result["query_ids"])
                  result["query_ids"] = result["query_ids"][:50]
              print("=== run_manual_dispatch result ===")
              print(json.dumps(result, indent=2, default=str))


          asyncio.run(_main())
          PYTHON
          else
            echo ""
            echo "=== DRYRUN: would have called run_manual_dispatch(brand_id=24, schedule_limit=200) ==="
            echo "Skipped Python call. Counting eligible schedules below instead."
          fi

          echo ""
          echo "=== Post-trigger SQL verification (brand_id=24, topics 162..170) ==="
          docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -X <<'SQL'
          \set ON_ERROR_STOP on
          BEGIN TRANSACTION READ ONLY;

          \echo '--- post-trigger: aggregated verification numbers ---'
          SELECT
            (SELECT COUNT(*)
             FROM queries q
             JOIN prompts p ON q.prompt_id = p.id
             WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170))
              AS new_queries_for_stuck_topics,
            (SELECT COUNT(*)
             FROM query_schedules
             WHERE prompt_id IN (252,253,254,255,256,257,258,259,260,261,
                                 262,263,264,265,266,267,268,269,270,271,
                                 272,273,274,275,276,277,278,279,280,281,
                                 282,283,288,289,290,291)
               AND last_run_at IS NOT NULL)
              AS schedules_now_dispatched;

          \echo '--- post-trigger: per-topic query count for the 9 stuck topics ---'
          SELECT p.topic_id,
                 COUNT(q.id) AS queries
          FROM prompts p
          LEFT JOIN queries q ON q.prompt_id = p.id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY p.topic_id
          ORDER BY p.topic_id;

          \echo '--- post-trigger: status breakdown of any new queries for stuck topics ---'
          SELECT q.status,
                 q.target_llm,
                 COUNT(*) AS n
          FROM queries q
          JOIN prompts p ON q.prompt_id = p.id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY q.status, q.target_llm
          ORDER BY q.status, q.target_llm;

          \echo '--- post-trigger: per-topic schedule dispatch state for stuck topics ---'
          SELECT p.topic_id,
                 COUNT(qs.id)                                   AS schedules,
                 COUNT(qs.id) FILTER (WHERE qs.last_run_at IS NOT NULL) AS dispatched,
                 MAX(qs.last_run_at)                            AS most_recent_dispatch
          FROM prompts p
          JOIN query_schedules qs ON qs.prompt_id = p.id
          WHERE p.topic_id IN (162,163,164,165,166,167,168,169,170)
          GROUP BY p.topic_id
          ORDER BY p.topic_id;

          \echo '--- post-trigger: latest scheduler_runs row(s) ---'
          SELECT id, mode, target_total, queries_created, note, finished_at
          FROM scheduler_runs
          ORDER BY id DESC
          LIMIT 5;

          ROLLBACK;
          SQL

          echo ""
          echo "=== Trigger complete (mode=${CONFIRM}) ==="
          REMOTE

      - name: Upload trigger log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topics-1029-trigger-dispatch
          path: /tmp/topics_1029_trigger.txt
          if-no-files-found: warn

      - name: Post trigger result to fix PR as comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/topics_1029_trigger.txt ]; then
            echo "trigger log missing or empty; skipping PR comment"
            exit 0
          fi
          # Look up the open PR for this branch. If none exists yet (workflow
          # ran on push before PR was opened), skip the comment — orchestrator
          # will trigger again after PR open.
          PR_NUMBER="$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch ${BRANCH}; skipping PR comment."
            exit 0
          fi
          {
            echo "## Dispatch trigger result (issue #1029)"
            echo ""
            echo "**Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Mode**: ${CONFIRM}"
            echo ""
            echo '```'
            cat /tmp/topics_1029_trigger.txt
            echo '```'
          } > /tmp/trigger-comment.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/trigger-comment.md
