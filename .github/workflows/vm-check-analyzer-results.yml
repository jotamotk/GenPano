name: Check Analyzer Results

on:
  workflow_dispatch:
    inputs:
      query_text_filter:
        description: 'SQL ILIKE pattern'
        required: true
        default: '%bestCoffer%'
        type: string

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Query response_analyses via postgres container
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          QUERY_FILTER: ${{ inputs.query_text_filter }}
        run: |
          set -euo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          SQL_COUNT="SELECT count(*) AS total_responses, count(a.id) AS analyzed FROM llm_responses r LEFT JOIN response_analyses a ON a.response_id=r.id JOIN queries q ON q.id=r.query_id WHERE q.query_text ILIKE '${QUERY_FILTER}' AND r.collected_at >= NOW() - INTERVAL '2 hours';"
          SQL_DETAIL="SELECT r.id AS resp, r.query_id AS q, length(r.raw_text) AS chars, a.id IS NOT NULL AS analyzed, a.target_brand_mentioned AS hit, a.total_brands_mentioned AS brands, a.target_brand_sentiment AS sent FROM llm_responses r LEFT JOIN response_analyses a ON a.response_id=r.id JOIN queries q ON q.id=r.query_id WHERE q.query_text ILIKE '${QUERY_FILTER}' AND r.collected_at >= NOW() - INTERVAL '2 hours' ORDER BY r.id DESC LIMIT 30;"
          echo "=== summary ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"${SQL_COUNT}\""
          echo
          echo "=== detail ==="
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo docker exec genpano-postgres-1 psql -U genpano -d genpano -c \"${SQL_DETAIL}\""
