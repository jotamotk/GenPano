name: VM Docker Deploy (SSH to ECS)

# CI/CD-driven deployment of the VM-per-account Docker containers on the
# user's existing ECS. SCPs experiments/vm_per_account/docker/scripts/deploy.sh
# to the host and runs it with the requested ACTION env var.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: status / inspect / up / down / restart / logs / pull / bootstrap / destroy'
        required: true
        type: choice
        options:
          - status
          - inspect
          - up
          - down
          - restart
          - logs
          - pull
          - bootstrap
          - destroy
        default: 'status'
      container:
        description: 'Container (for restart/logs). Empty = all'
        required: false
        default: ''
        type: string
      tail_lines:
        description: 'Log tail lines (logs action)'
        required: false
        default: '200'
        type: string

jobs:
  ssh-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repo (to scp deploy.sh)
        uses: actions/checkout@v4

      - name: Setup SSH key + known_hosts + test reachability
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ssh -p "$PORT" \
            -o BatchMode=yes -o ConnectTimeout=10 \
            "${SERVER_USER}@${SERVER_HOST}" 'echo ok; id; uname -a'

      - name: SCP docker dir + run deploy.sh with ACTION
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          VM_DEPLOY_PATH: ${{ secrets.ECS_REPO_PATH != '' && format('{0}-vm-deploy', secrets.ECS_REPO_PATH) || '/opt/vm-per-account-deploy' }}
          VNC_PASSWORD_01: ${{ secrets.VNC_PASSWORD_01 }}
          VNC_PASSWORD_02: ${{ secrets.VNC_PASSWORD_02 }}
          ACTION: ${{ inputs.action }}
          CONTAINER: ${{ inputs.container }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          set -euxo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          # 1. Ensure VM_DEPLOY_PATH exists on ECS (needs sudo for /opt/...)
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo mkdir -p '$VM_DEPLOY_PATH' && sudo chown -R \$(whoami):\$(whoami) '$VM_DEPLOY_PATH'"
          # 2. Transfer the entire experiments/vm_per_account/docker/ tree
          #    to $VM_DEPLOY_PATH on ECS. Uses tar over ssh (NOT scp) — the
          #    OpenSSH 9.x scp client used by ubuntu-22.04 runners rejects
          #    the legacy `scp -r dir/. dest/` pattern with
          #    `scp: error: unexpected filename: .`. tar pipe works on every
          #    Linux with no edge cases.
          tar czf - -C experiments/vm_per_account/docker . \
            | ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
                "tar xzf - -C '$VM_DEPLOY_PATH'"
          # 3. Run the deploy script with env piped through
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "ACTION='$ACTION' CONTAINER='$CONTAINER' TAIL_LINES='$TAIL_LINES' \
             VM_DEPLOY_PATH='$VM_DEPLOY_PATH' \
             VNC_PASSWORD_01='$VNC_PASSWORD_01' VNC_PASSWORD_02='$VNC_PASSWORD_02' \
             SSH_PORT='$PORT' \
             bash '${VM_DEPLOY_PATH}/scripts/deploy.sh'"

      - name: Print operator next-step (SSH tunnel for noVNC)
        if: ${{ inputs.action == 'up' || inputs.action == 'bootstrap' }}
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          PORT="${SERVER_SSH_PORT:-22}"
          {
            echo "## 🚀 Containers ready — open noVNC via SSH tunnel"
            echo ""
            echo "On your local machine (Windows PowerShell / Mac / Linux), run:"
            echo ""
            echo '```bash'
            echo "ssh -N -p $PORT \\"
            echo "  -L 6080:127.0.0.1:6080 -L 6081:127.0.0.1:6081 \\"
            echo "  -L 9222:127.0.0.1:9222 -L 9223:127.0.0.1:9223 \\"
            echo "  $SERVER_USER@$SERVER_HOST"
            echo '```'
            echo ""
            echo "Keep the terminal open. Then in your local browser:"
            echo "- http://localhost:6080/vnc.html  (doubao-01)"
            echo "- http://localhost:6081/vnc.html  (doubao-02)"
            echo ""
            echo "VNC password = VNC_PASSWORD_01 / 02 secret value."
          } >> "$GITHUB_STEP_SUMMARY"
