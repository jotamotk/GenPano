name: VM Docker Deploy (ACR build + SSH to ECS)

# Pipeline:
#   1. GH Actions runner: build image, push to user's Aliyun Container
#      Registry (ACR_REGISTRY / ACR_USERNAME / ACR_PASSWORD secrets).
#      This happens for bootstrap + up + restart (so latest code rolls out).
#   2. SSH to ECS: docker login ACR → docker pull → docker compose up -d.
#      ECS never builds locally — pulls from ACR (intra-Aliyun network,
#      fast), so Chrome image install time on ECS is sub-30s.
#
# Action 'bootstrap' = install docker + ufw on ECS + first image pull.
# Action 'up'        = pull latest image + docker compose up -d.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: status / inspect / up / down / restart / logs / bootstrap / destroy'
        required: true
        type: choice
        options:
          - status
          - inspect
          - up
          - down
          - restart
          - logs
          - bootstrap
          - destroy
        default: 'status'
      container:
        description: 'Container (for restart/logs). Empty = all'
        required: false
        default: ''
        type: string
      tail_lines:
        description: 'Log tail lines (logs action)'
        required: false
        default: '200'
        type: string

env:
  IMAGE_REPO: vm-per-account/doubao-chrome
  IMAGE_TAG: latest

jobs:
  ssh-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build + push image (only for bootstrap/up/restart)
        # Build on GH Actions runner (海外网, fast) + push to ACR
        # (Aliyun China region). ECS will pull from ACR — much faster
        # than building from scratch on a 中国 ECS that has to fetch
        # google chrome over the wall.
        if: ${{ inputs.action == 'bootstrap' || inputs.action == 'up' || inputs.action == 'restart' }}
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          set -euxo pipefail
          # docker login to ACR
          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" \
            -u "$ACR_USERNAME" --password-stdin
          # build
          docker build \
            -t "${ACR_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG}" \
            -t "${ACR_REGISTRY}/${IMAGE_REPO}:${{ github.sha }}" \
            -f experiments/vm_per_account/docker/Dockerfile \
            experiments/vm_per_account/docker
          # push both tags
          docker push "${ACR_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${ACR_REGISTRY}/${IMAGE_REPO}:${{ github.sha }}"

      - name: Setup SSH key + known_hosts + test reachability
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ssh
          chmod 0600 ~/.ssh/id_ssh
          PORT="${SERVER_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ssh -p "$PORT" \
            -o BatchMode=yes -o ConnectTimeout=10 \
            "${SERVER_USER}@${SERVER_HOST}" 'echo ok; id; uname -a'

      - name: Send compose files + run deploy.sh on ECS
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          VM_DEPLOY_PATH: ${{ secrets.ECS_REPO_PATH != '' && format('{0}-vm-deploy', secrets.ECS_REPO_PATH) || '/opt/vm-per-account-deploy' }}
          VNC_PASSWORD_01: ${{ secrets.VNC_PASSWORD_01 }}
          VNC_PASSWORD_02: ${{ secrets.VNC_PASSWORD_02 }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACTION: ${{ inputs.action }}
          CONTAINER: ${{ inputs.container }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          set -euxo pipefail
          PORT="${SERVER_SSH_PORT:-22}"
          REMOTE="${SERVER_USER}@${SERVER_HOST}"
          VM_IMAGE="${ACR_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG}"
          # 1. Ensure VM_DEPLOY_PATH exists on ECS
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "sudo mkdir -p '$VM_DEPLOY_PATH' && sudo chown -R \$(whoami):\$(whoami) '$VM_DEPLOY_PATH'"
          # 2. Transfer compose files via tar (Dockerfile no longer needed
          #    on ECS since image is pulled, but docker-compose.yml +
          #    deploy.sh + entrypoint are still needed)
          tar czf - -C experiments/vm_per_account/docker . \
            | ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
                "tar xzf - -C '$VM_DEPLOY_PATH'"
          # 3. Run the deploy script with env piped through
          ssh -i ~/.ssh/id_ssh -p "$PORT" "$REMOTE" \
            "ACTION='$ACTION' CONTAINER='$CONTAINER' TAIL_LINES='$TAIL_LINES' \
             VM_DEPLOY_PATH='$VM_DEPLOY_PATH' \
             VNC_PASSWORD_01='$VNC_PASSWORD_01' VNC_PASSWORD_02='$VNC_PASSWORD_02' \
             VM_IMAGE='$VM_IMAGE' \
             ACR_REGISTRY='$ACR_REGISTRY' \
             ACR_USERNAME='$ACR_USERNAME' \
             ACR_PASSWORD='$ACR_PASSWORD' \
             SSH_PORT='$PORT' \
             bash '${VM_DEPLOY_PATH}/scripts/deploy.sh'"

      - name: Print operator next-step (SSH tunnel for noVNC)
        if: ${{ inputs.action == 'up' || inputs.action == 'bootstrap' }}
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          PORT="${SERVER_SSH_PORT:-22}"
          {
            echo "## 🚀 Containers ready — open noVNC via SSH tunnel"
            echo ""
            echo "On your local machine (Windows PowerShell / Mac / Linux), run:"
            echo ""
            echo '```bash'
            echo "ssh -N -p $PORT \\"
            echo "  -L 6080:127.0.0.1:6080 -L 6081:127.0.0.1:6081 \\"
            echo "  -L 9222:127.0.0.1:9222 -L 9223:127.0.0.1:9223 \\"
            echo "  $SERVER_USER@$SERVER_HOST"
            echo '```'
            echo ""
            echo "Keep the terminal open. Then in your local browser:"
            echo "- http://localhost:6080/vnc.html  (doubao-01)"
            echo "- http://localhost:6081/vnc.html  (doubao-02)"
            echo ""
            echo "VNC password = VNC_PASSWORD_01 / 02 secret value."
          } >> "$GITHUB_STEP_SUMMARY"
