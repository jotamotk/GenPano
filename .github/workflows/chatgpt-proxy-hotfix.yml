name: ChatGPT proxy_api_unreachable hotfix (manual)

# Refs PR #1209 / branch claude/fix-chatgpt-error-fjyfb.
# Applies the host-side fix for `retry_reason=proxy_api_unreachable`:
#   1. Add idempotent UFW allow rule  172.16.0.0/12 -> :9098/tcp
#   2. Sync repo clash/vninja-allow-lan.sh -> /usr/local/bin/ on host
#   3. Verify by curling host.docker.internal:9098/proxies from
#      genpano-worker-1 (expect http_code=401, not 000/timeout)
#
# Manual trigger only — host mutation requires explicit confirmation.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to apply UFW rule + sync script to production host'
        required: true
        default: 'no'

permissions:
  contents: read
  pull-requests: write

jobs:
  hotfix:
    name: Apply ChatGPT proxy UFW hotfix
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Guard
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "::error::Refusing to mutate production host: input 'confirm' must be literal 'yes' (got '${{ inputs.confirm }}')."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply hotfix on host
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s' "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # 1. Sync the updated script onto the host.
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            clash/vninja-allow-lan.sh \
            "$SERVER_USER@$SERVER_HOST:/usr/local/bin/vninja-allow-lan.sh.new"

          # 2. Apply UFW rule + replace the script atomically, then re-run it
          # so the new socat + UFW rule take effect immediately.
          output=$(ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -uo pipefail

          echo "=== Pre-fix UFW state (9098 + 6789) ==="
          ufw status 2>&1 | grep -E '9098|6789|To' || echo "(no 9098/6789 rule present)"

          echo ""
          echo "=== Apply UFW allow rules (idempotent, both ports) ==="
          # 9098: socat forwarder for ninja-mihomo external-controller API
          # 6789: ninja-mihomo proxy port (the actual HTTP/SOCKS proxy)
          # 172.16.0.0/12 covers every default docker bridge (172.17-172.31).
          for port in 9098 6789; do
            if ufw status 2>/dev/null | grep -qE "${port}/tcp\s+ALLOW IN\s+172\.16\.0\.0/12"; then
              echo "ufw: 172.16.0.0/12 -> :${port}/tcp already allowed (no change)"
            else
              ufw allow proto tcp from 172.16.0.0/12 to any port "${port}"
            fi
          done

          echo ""
          echo "=== Replace /usr/local/bin/vninja-allow-lan.sh ==="
          if [ -f /usr/local/bin/vninja-allow-lan.sh ]; then
            cp -p /usr/local/bin/vninja-allow-lan.sh /usr/local/bin/vninja-allow-lan.sh.bak.$(date +%s)
          fi
          chmod +x /usr/local/bin/vninja-allow-lan.sh.new
          mv /usr/local/bin/vninja-allow-lan.sh.new /usr/local/bin/vninja-allow-lan.sh
          echo "installed:"
          ls -la /usr/local/bin/vninja-allow-lan.sh*

          echo ""
          echo "=== Post-fix UFW state (9098 + 6789) ==="
          ufw status 2>&1 | grep -E '9098|6789|To' || echo "(unexpected: no 9098/6789 rule)"

          echo ""
          echo "=== Verify worker -> host.docker.internal:9098 (Clash API) ==="
          cd /opt/genpano
          docker compose exec -T worker sh -lc '
            curl -sS --max-time 5 -o /dev/null \
              -w "api_no_auth: http_code=%{http_code} time=%{time_total}s\n" \
              http://host.docker.internal:9098/proxies || echo "curl_exit=$?"
            if [ -n "${CLASH_API_SECRET:-}" ]; then
              curl -sS --max-time 5 -o /dev/null \
                -H "Authorization: Bearer ${CLASH_API_SECRET}" \
                -w "api_auth:    http_code=%{http_code} time=%{time_total}s\n" \
                http://host.docker.internal:9098/proxies || echo "curl_exit=$?"
            fi
          ' </dev/null 2>&1 || true

          echo ""
          echo "=== Verify worker -> host.docker.internal:6789 (proxy port) ==="
          # 6789 is the actual HTTP proxy port. A working proxy to chatgpt.com
          # returns 403 (Cloudflare JS challenge) — that means the TCP path
          # to the proxy is OPEN. 000/timeout means UFW still blocking.
          docker compose exec -T worker sh -lc '
            curl -sS --max-time 12 -o /dev/null \
              --proxy http://host.docker.internal:6789 \
              -w "proxy:       http_code=%{http_code} time=%{time_total}s\n" \
              https://chatgpt.com/ || echo "curl_exit=$?"
          ' </dev/null 2>&1 || true

          echo ""
          echo "=== End of hotfix ==="
          REMOTE
          )

          echo "$output"
          {
            echo "## ChatGPT proxy_api_unreachable hotfix"
            echo ""
            echo '```'
            echo "$output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$output" > /tmp/hotfix-output.txt

          # PASS gate: both ports must respond with a non-000 http_code.
          # :9098 -> 200/401 (API up or auth required). :6789 -> any non-000
          # (typically 403 from Cloudflare JS-challenge, but proxy CONNECT
          # working is what matters here, not chatgpt.com's response).
          api_ok=$(echo "$output" | grep -E '^api_(no_auth|auth):' | grep -cE 'http_code=(200|401)')
          proxy_ok=$(echo "$output" | grep -E '^proxy:' | grep -cvE 'http_code=000')
          echo "api_ok_lines=${api_ok} proxy_ok_lines=${proxy_ok}"
          if [ "${api_ok}" -ge 1 ] && [ "${proxy_ok}" -ge 1 ]; then
            echo "::notice::Hotfix verification PASSED: worker can now reach :9098 AND :6789"
          else
            echo "::error::Hotfix verification FAILED: worker cannot reach :9098 or :6789 post-fix. See step summary."
            exit 1
          fi

      - name: Post hotfix output as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## ChatGPT proxy_api_unreachable hotfix\n\n';
            try {
              const out = fs.readFileSync('/tmp/hotfix-output.txt', 'utf-8');
              const max = 40000;
              const trimmed = out.length > max ? out.slice(0, max) + '\n…[truncated]' : out;
              body += '```\n' + trimmed + '\n```';
            } catch (e) {
              body += 'failed to read output: ' + String(e);
            }
            const sha = context.sha;
            const prs = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open ${sha}`,
            });
            if (prs.data.items.length > 0) {
              await github.rest.issues.createComment({
                issue_number: prs.data.items[0].number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
              core.notice(`Posted hotfix dump to PR #${prs.data.items[0].number}`);
            } else {
              core.notice('No PR context; hotfix dump available in step summary only.');
            }
