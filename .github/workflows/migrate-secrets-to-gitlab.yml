name: Migrate Secrets to GitLab

# One-shot migration: reads GitHub secrets/vars in this repo and writes
# them as GitLab CI/CD project variables on ai-lab/genpano (project 8141).
# Re-runnable: PUT updates an existing variable, POST creates new ones.
# Empty inputs are SKIPped, so secrets that don't exist on GitHub are
# just ignored (no broken variables on GitLab).

on:
  workflow_dispatch:
    inputs:
      gitlab_project_id:
        description: GitLab project ID
        required: true
        default: "8141"
      gitlab_host:
        description: GitLab host (no protocol)
        required: true
        default: gitlabcode.lianwei.com.cn
      dry_run:
        description: Print only, do not POST
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  migrate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Push secrets and variables to GitLab
        env:
          GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
          GITLAB_HOST: ${{ inputs.gitlab_host }}
          GITLAB_PROJECT_ID: ${{ inputs.gitlab_project_id }}
          DRY_RUN: ${{ inputs.dry_run }}

          # ----- Existing GitHub secrets (deploy.yml + Phase 1 E2E) -----
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ALIYUN_DM_SMTP_PASSWORD: ${{ secrets.ALIYUN_DM_SMTP_PASSWORD }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          CLASH_API_SECRET: ${{ secrets.CLASH_API_SECRET }}
          GEMINI_COOKIES_JSON: ${{ secrets.GEMINI_COOKIES_JSON }}
          HERO_SMS_API_KEY: ${{ secrets.HERO_SMS_API_KEY }}
          LUBANSMS_PROJECT_DOUBAO: ${{ secrets.LUBANSMS_PROJECT_DOUBAO }}
          LUBANSMS_TOKEN: ${{ secrets.LUBANSMS_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          QG_PROXY_AUTH_KEY: ${{ secrets.QG_PROXY_AUTH_KEY }}
          QG_PROXY_AUTH_PASSWORD: ${{ secrets.QG_PROXY_AUTH_PASSWORD }}
          QG_PROXY_EXTRACT_URL: ${{ secrets.QG_PROXY_EXTRACT_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          USER_JWT_SECRET: ${{ secrets.USER_JWT_SECRET }}
          ADMIN_E2E_EMAIL: ${{ secrets.ADMIN_E2E_EMAIL }}
          ADMIN_E2E_PASSWORD: ${{ secrets.ADMIN_E2E_PASSWORD }}

          # ----- Ops / infrastructure secrets (mirror, runner setup,
          # provisioning). Not used by the app deploy, but migrated so
          # GitLab is the single source of truth if those workflows are
          # ported later. GITLAB_API_TOKEN deliberately excluded — that
          # token is the migration credential itself. -----
          CLASH_SUBSCRIPTION_URL: ${{ secrets.CLASH_SUBSCRIPTION_URL }}
          CLASH_SUB_URL: ${{ secrets.CLASH_SUB_URL }}
          ECS_REPO_PATH: ${{ secrets.ECS_REPO_PATH }}
          GITLAB_RUNNER_TOKEN: ${{ secrets.GITLAB_RUNNER_TOKEN }}
          NINJA_RELAY_IP: ${{ secrets.NINJA_RELAY_IP }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          VNC_PASSWORD_01: ${{ secrets.VNC_PASSWORD_01 }}
          VNC_PASSWORD_02: ${{ secrets.VNC_PASSWORD_02 }}

          # ----- Optional GitHub secrets referenced by deploy.yml but
          # not currently set on jotamotk/trash_test. Listed here so the
          # workflow remains a single source of truth. push_var SKIPs
          # empty values, so absent secrets are no-ops. Add them on
          # GitHub later and re-run; they'll appear on GitLab too. -----
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
          ADMIN_EMAIL_FROM: ${{ secrets.ADMIN_EMAIL_FROM }}
          ADMIN_COOKIE_SECURE: ${{ secrets.ADMIN_COOKIE_SECURE }}
          USER_BASE_URL: ${{ secrets.USER_BASE_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          USER_EMAIL_PROVIDER: ${{ secrets.USER_EMAIL_PROVIDER }}
          USER_EMAIL_FROM: ${{ secrets.USER_EMAIL_FROM }}
          USER_EMAIL_REPLY_TO: ${{ secrets.USER_EMAIL_REPLY_TO }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALIYUN_DM_SMTP_USER: ${{ secrets.ALIYUN_DM_SMTP_USER }}
          ALIYUN_DM_SMTP_HOST: ${{ secrets.ALIYUN_DM_SMTP_HOST }}
          ALIYUN_DM_SMTP_PORT: ${{ secrets.ALIYUN_DM_SMTP_PORT }}
          ALIYUN_DM_SMTP_SSL: ${{ secrets.ALIYUN_DM_SMTP_SSL }}
          ALIYUN_DM_SMTP_STARTTLS: ${{ secrets.ALIYUN_DM_SMTP_STARTTLS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DOUBAO_COOKIES_JSON: ${{ secrets.DOUBAO_COOKIES_JSON }}
          LUBANSMS_DOUBAO_SERVICE_ID_SECRET: ${{ secrets.LUBANSMS_DOUBAO_SERVICE_ID }}

          # ----- GitHub Variables (non-secret) -----
          LUBANSMS_DOUBAO_SERVICE_ID_VAR: ${{ vars.LUBANSMS_DOUBAO_SERVICE_ID }}

        run: |
          set -euo pipefail

          OK=0
          SKIP=0
          FAIL=0
          FAILED_KEYS=""

          push_var() {
            local key="$1"
            local value="$2"
            local var_type="${3:-env_var}"  # env_var | file

            if [ -z "$value" ]; then
              echo "SKIP   $key (empty input)"
              SKIP=$((SKIP+1))
              return 0
            fi

            local size=${#value}

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY    $key (type=$var_type, len=$size)"
              OK=$((OK+1))
              return 0
            fi

            local url="https://${GITLAB_HOST}/api/v4/projects/${GITLAB_PROJECT_ID}/variables"
            local code

            # Try PUT first (update existing). If 404, fall through to POST.
            code=$(curl -sS -o /tmp/out -w '%{http_code}' \
              --request PUT \
              --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
              --form-string "value=${value}" \
              --form "variable_type=${var_type}" \
              --form "masked=false" \
              --form "protected=false" \
              "${url}/${key}")

            if [ "$code" = "200" ]; then
              echo "UPDATE $key (200) [type=$var_type, len=$size]"
              OK=$((OK+1))
              return 0
            fi

            if [ "$code" = "404" ]; then
              code=$(curl -sS -o /tmp/out -w '%{http_code}' \
                --request POST \
                --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
                --form-string "key=${key}" \
                --form-string "value=${value}" \
                --form "variable_type=${var_type}" \
                --form "masked=false" \
                --form "protected=false" \
                "${url}")
              if [ "$code" = "201" ]; then
                echo "CREATE $key (201) [type=$var_type, len=$size]"
                OK=$((OK+1))
                return 0
              fi
            fi

            echo "FAIL   $key (HTTP $code) — body:"
            cat /tmp/out
            echo
            FAIL=$((FAIL+1))
            FAILED_KEYS="$FAILED_KEYS $key"
            return 0  # don't abort — continue migrating others
          }

          echo "=== Migrating to GitLab project ${GITLAB_PROJECT_ID} on ${GITLAB_HOST} ==="
          echo "=== DRY_RUN=${DRY_RUN} ==="
          echo

          # env_var (plain string)
          push_var ACR_REGISTRY            "$ACR_REGISTRY"
          push_var ACR_USERNAME            "$ACR_USERNAME"
          push_var ACR_PASSWORD            "$ACR_PASSWORD"
          push_var ALIYUN_DM_SMTP_PASSWORD "$ALIYUN_DM_SMTP_PASSWORD"
          push_var ARK_API_KEY             "$ARK_API_KEY"
          push_var CAPSOLVER_API_KEY       "$CAPSOLVER_API_KEY"
          push_var CLASH_API_SECRET        "$CLASH_API_SECRET"
          push_var HERO_SMS_API_KEY        "$HERO_SMS_API_KEY"
          push_var LUBANSMS_PROJECT_DOUBAO "$LUBANSMS_PROJECT_DOUBAO"
          push_var LUBANSMS_TOKEN          "$LUBANSMS_TOKEN"
          push_var POSTGRES_PASSWORD      "$POSTGRES_PASSWORD"
          push_var QG_PROXY_AUTH_KEY       "$QG_PROXY_AUTH_KEY"
          push_var QG_PROXY_AUTH_PASSWORD  "$QG_PROXY_AUTH_PASSWORD"
          push_var QG_PROXY_EXTRACT_URL    "$QG_PROXY_EXTRACT_URL"
          push_var SERVER_HOST             "$SERVER_HOST"
          push_var SERVER_USER             "$SERVER_USER"
          push_var USER_JWT_SECRET         "$USER_JWT_SECRET"
          push_var ADMIN_E2E_EMAIL         "$ADMIN_E2E_EMAIL"
          push_var ADMIN_E2E_PASSWORD      "$ADMIN_E2E_PASSWORD"

          # Ops / infrastructure
          push_var CLASH_SUBSCRIPTION_URL  "$CLASH_SUBSCRIPTION_URL"
          push_var CLASH_SUB_URL           "$CLASH_SUB_URL"
          push_var ECS_REPO_PATH           "$ECS_REPO_PATH"
          push_var GITLAB_RUNNER_TOKEN     "$GITLAB_RUNNER_TOKEN"
          push_var NINJA_RELAY_IP          "$NINJA_RELAY_IP"
          push_var TAILSCALE_AUTH_KEY      "$TAILSCALE_AUTH_KEY"
          push_var VNC_PASSWORD_01         "$VNC_PASSWORD_01"
          push_var VNC_PASSWORD_02         "$VNC_PASSWORD_02"

          # Optional (skipped if empty)
          push_var ADMIN_SESSION_SECRET    "$ADMIN_SESSION_SECRET"
          push_var JWT_SECRET              "$JWT_SECRET"
          push_var ADMIN_BASE_URL          "$ADMIN_BASE_URL"
          push_var ADMIN_EMAIL_FROM        "$ADMIN_EMAIL_FROM"
          push_var ADMIN_COOKIE_SECURE     "$ADMIN_COOKIE_SECURE"
          push_var USER_BASE_URL           "$USER_BASE_URL"
          push_var FRONTEND_URL            "$FRONTEND_URL"
          push_var USER_EMAIL_PROVIDER     "$USER_EMAIL_PROVIDER"
          push_var USER_EMAIL_FROM         "$USER_EMAIL_FROM"
          push_var USER_EMAIL_REPLY_TO     "$USER_EMAIL_REPLY_TO"
          push_var EMAIL_PROVIDER          "$EMAIL_PROVIDER"
          push_var EMAIL_FROM              "$EMAIL_FROM"
          push_var EMAIL_REPLY_TO          "$EMAIL_REPLY_TO"
          push_var RESEND_API_KEY          "$RESEND_API_KEY"
          push_var ALIYUN_DM_SMTP_USER     "$ALIYUN_DM_SMTP_USER"
          push_var ALIYUN_DM_SMTP_HOST     "$ALIYUN_DM_SMTP_HOST"
          push_var ALIYUN_DM_SMTP_PORT     "$ALIYUN_DM_SMTP_PORT"
          push_var ALIYUN_DM_SMTP_SSL      "$ALIYUN_DM_SMTP_SSL"
          push_var ALIYUN_DM_SMTP_STARTTLS "$ALIYUN_DM_SMTP_STARTTLS"
          push_var GOOGLE_CLIENT_ID        "$GOOGLE_CLIENT_ID"
          push_var GOOGLE_CLIENT_SECRET    "$GOOGLE_CLIENT_SECRET"
          push_var GOOGLE_CALLBACK_URL     "$GOOGLE_CALLBACK_URL"
          push_var ZHIPU_API_KEY           "$ZHIPU_API_KEY"

          # GitHub var → GitLab var. The secret takes precedence over the
          # variable if both happen to exist on GitHub.
          if [ -n "$LUBANSMS_DOUBAO_SERVICE_ID_SECRET" ]; then
            push_var LUBANSMS_DOUBAO_SERVICE_ID "$LUBANSMS_DOUBAO_SERVICE_ID_SECRET"
          else
            push_var LUBANSMS_DOUBAO_SERVICE_ID "$LUBANSMS_DOUBAO_SERVICE_ID_VAR"
          fi

          # variable_type=file (multiline / JSON blobs)
          push_var GEMINI_COOKIES_JSON     "$GEMINI_COOKIES_JSON"     file
          push_var DOUBAO_COOKIES_JSON     "$DOUBAO_COOKIES_JSON"     file
          push_var SERVER_SSH_KEY          "$SERVER_SSH_KEY"          file

          echo
          echo "=== Summary ==="
          echo "  OK:   $OK"
          echo "  SKIP: $SKIP (empty inputs)"
          echo "  FAIL: $FAIL${FAILED_KEYS:+ ($FAILED_KEYS)}"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
