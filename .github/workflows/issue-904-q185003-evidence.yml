          parts.append("Full artifact bundle (DB probes, screenshots, HTML, log slice) is uploaded to the workflow run above.")

          Path(os.environ["ARTIFACT_DIR"], "comment_body.md").write_text(
              "\n".join(parts), encoding="utf-8"
          )
          PY
          # Final sanitization pass over the comment body itself.
          python3 "${ARTIFACT_DIR}/sanitize.py" "${ARTIFACT_DIR}/comment_body.md"
          echo "=== comment_body.md (first 80 lines) ==="
          sed -n '1,80p' "${ARTIFACT_DIR}/comment_body.md"

      - name: Post evidence comment to issues 570, 904, 901
        shell: bash
        run: |
          set -euo pipefail
          repo="${GH_REPOSITORY}"
          body_file="${ARTIFACT_DIR}/comment_body.md"
          if [ ! -s "${body_file}" ]; then
            echo "::error::comment body is empty"
            exit 1
          fi
          # Build JSON safely: jq -Rs reads the file as a raw string and
          # encodes it as a JSON string literal — no shell quoting hazards.
          payload="$(jq -Rs '{body: .}' < "${body_file}")"
          for issue in ${ISSUE_REFS}; do
            echo "Posting evidence comment to issue #${issue}..."
            http_status="$(curl -sS -o /tmp/curl_resp.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "User-Agent: issue-904-q185003-evidence-workflow" \
              --data "${payload}" \
              "https://api.github.com/repos/${repo}/issues/${issue}/comments")"
            if [ "${http_status}" != "201" ]; then
              echo "::error::Failed to comment on #${issue} (HTTP ${http_status})"
              cat /tmp/curl_resp.json || true
              exit 1
            fi
            echo "  -> comment posted (HTTP ${http_status})"
          done

      - name: Sanitize artifact directory before upload (final pass)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${ARTIFACT_DIR}" ]; then
            # Re-run sanitizer over text files to be defensive.
            find "${ARTIFACT_DIR}" -type f \
              \( -name '*.txt' -o -name '*.log' -o -name '*.md' \
                 -o -name '*.json' -o -name '*.tsv' \) \
              -print0 | xargs -0 -r -n1 python3 "${ARTIFACT_DIR}/sanitize.py" || true
          fi

      - name: Upload evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-904-q185003-evidence-${{ github.run_id }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 30
