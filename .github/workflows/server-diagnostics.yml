name: Server Diagnostics

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "Brand id to inspect"
        required: false
        default: "12"
      brand_query:
        description: "Brand name fragment to inspect"
        required: false
        default: "雅诗兰黛"
      project_id:
        description: "Optional App project UUID to inspect"
        required: false
        default: "95d43022-a5c8-5944-b6d6-34b29faa18b5"
      scraper_mode:
        description: "diagnostics or bestcoffer_batch"
        required: false
        default: "diagnostics"
      batch_limit:
        description: "bestcoffer_batch only: number of no-response queries to dispatch"
        required: false
        default: "5"
      execute_batch:
        description: "bestcoffer_batch only: true dispatches, false only lists candidates"
        required: false
        default: "false"
      poll_seconds:
        description: "bestcoffer_batch only: seconds to wait for selected queries"
        required: false
        default: "900"

jobs:
  diagnostics:
    name: Inspect production server
    runs-on: ubuntu-latest

    steps:
      - name: Run bestCoffer scraper batch
        if: ${{ inputs.scraper_mode == 'bestcoffer_batch' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          BRAND_ID: ${{ inputs.brand_id }}
          BATCH_LIMIT: ${{ inputs.batch_limit }}
          EXECUTE_BATCH: ${{ inputs.execute_batch }}
          POLL_SECONDS: ${{ inputs.poll_seconds }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh scraper-batch-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_cmd="$(printf 'BRAND_ID=%q BATCH_LIMIT=%q EXECUTE_BATCH=%q POLL_SECONDS=%q GH_RUN_ID=%q bash -s' \
            "${BRAND_ID}" "${BATCH_LIMIT}" "${EXECUTE_BATCH}" "${POLL_SECONDS}" "${GH_RUN_ID}")"

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' | tee scraper-batch-artifacts/scraper-batch.log
          set -Eeuo pipefail
          cd /opt/genpano

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || fail "BRAND_ID must be an integer"
          [[ "${BATCH_LIMIT}" =~ ^[0-9]+$ ]] || fail "BATCH_LIMIT must be an integer"
          [[ "${POLL_SECONDS}" =~ ^[0-9]+$ ]] || fail "POLL_SECONDS must be an integer"
          [ "${BATCH_LIMIT}" -ge 1 ] || fail "BATCH_LIMIT must be >= 1"
          [ "${BATCH_LIMIT}" -le 100 ] || fail "BATCH_LIMIT must be <= 100 for staged scraper validation"
          case "${EXECUTE_BATCH}" in
            true|false) ;;
            *) fail "EXECUTE_BATCH must be true or false" ;;
          esac

          artifact_dir="/tmp/genpano_scraper_batch_${GH_RUN_ID}"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}/screenshots"
          worker_artifact_marker="/tmp/scraper-artifact-marker-${GH_RUN_ID}"
          summary_file="${artifact_dir}/summary.txt"
          exec > >(tee "${summary_file}") 2>&1
          finish() {
            status=$?
            echo "=== Artifact manifest ==="
            find "${artifact_dir}" -maxdepth 3 -type f | sort || true
            tar -czf "/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz" -C "${artifact_dir}" . || true
            echo "artifact_archive=/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz"
            exit "${status}"
          }
          trap finish EXIT

          psql_cmd() {
            docker compose exec -T postgres psql -X -v ON_ERROR_STOP=1 -U genpano -d genpano "$@" </dev/null
          }

          echo "=== bestCoffer scraper batch audit ==="
          echo "run=https://github.com/jotamotk/X/actions/runs/${GH_RUN_ID}"
          echo "brand_id=${BRAND_ID}"
          echo "batch_limit=${BATCH_LIMIT}"
          echo "execute_batch=${EXECUTE_BATCH}"
          echo "poll_seconds=${POLL_SECONDS}"
          date -u '+utc_started_at=%Y-%m-%dT%H:%M:%SZ'

          echo "=== Docker compose status ==="
          docker compose ps

          echo "=== Preflight query/response counters ==="
          psql_cmd -c "
            WITH scoped AS (
              SELECT q.id, q.target_llm, q.status
              FROM queries q
              WHERE q.brand_id = ${BRAND_ID}
            ),
            response_counts AS (
              SELECT query_id, COUNT(*) AS responses
              FROM llm_responses
              GROUP BY query_id
            )
            SELECT
              s.target_llm,
              s.status,
              COUNT(*) AS queries,
              COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) > 0) AS queries_with_response,
              COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) = 0) AS queries_without_response
            FROM scoped s
            LEFT JOIN response_counts r ON r.query_id = s.id
            GROUP BY s.target_llm, s.status
            ORDER BY s.target_llm, s.status;
          "

          selected_tsv="${artifact_dir}/selected.tsv"
          psql_cmd -At -F $'\t' -c "
            WITH selected AS (
              SELECT q.id, q.target_llm
              FROM queries q
              WHERE q.brand_id = ${BRAND_ID}
                AND NOT EXISTS (
                  SELECT 1 FROM llm_responses r WHERE r.query_id = q.id
                )
              ORDER BY q.id
              LIMIT ${BATCH_LIMIT}
            )
            SELECT id, target_llm FROM selected;
          " > "${selected_tsv}"
          batch_rows="$(cat "${selected_tsv}")"

          if [ -z "${batch_rows}" ]; then
            echo "No no-response bestCoffer queries remain for this batch."
            ids_csv=""
          else
            ids_csv="$(printf '%s\n' "${batch_rows}" | awk -F'\t' 'NF {print $1}' | paste -sd, -)"
          fi
          ids_space="${ids_csv//,/ }"

          echo "=== Selected batch IDs ==="
          if [ -n "${ids_csv}" ]; then
            printf '%s\n' "${batch_rows}"
            docker compose exec -T -e ARTIFACT_MARKER="${worker_artifact_marker}" worker sh -lc \
              'touch "${ARTIFACT_MARKER}"' </dev/null || true
          else
            echo "<none>"
          fi

          if [ "${EXECUTE_BATCH}" = "true" ] && [ -n "${ids_csv}" ]; then
            echo "=== Reset selected queries to pending ==="
            psql_cmd -c "
              WITH selected AS (
                SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
              )
              UPDATE queries q
              SET status = 'pending',
                  retry_count = COALESCE(q.retry_count, 0) + 1,
                  queued_at = NOW(),
                  started_at = NULL,
                  finished_at = NULL,
                  latency_ms = NULL,
                  retry_reason = 'bestcoffer_batch_audit:${GH_RUN_ID}'
              FROM selected s
              WHERE q.id = s.id
              RETURNING q.id, q.target_llm, q.status, q.retry_reason;
            "

            echo "=== Dispatch selected queries ==="
            batch_rows_b64="$(printf '%s' "${batch_rows}" | base64 | tr -d '\n')"
            docker compose exec -T -e BATCH_ROWS_B64="${batch_rows_b64}" worker python - <<'PY'
          import base64
          import os

          from geo_tracker.tasks.celery_tasks import execute_query

          decoded = base64.b64decode(os.environ["BATCH_ROWS_B64"]).decode("utf-8")
          rows = [line.split("\t", 1) for line in decoded.splitlines() if line.strip()]
          for query_id, target_llm in rows:
              queue = f"llm_{target_llm.strip()}"
              execute_query.apply_async(args=[int(query_id)], queue=queue)
              print(f"dispatched query_id={query_id} queue={queue}")
          PY

            echo "=== Poll selected queries ==="
            deadline=$((SECONDS + POLL_SECONDS))
            while true; do
              psql_cmd -c "
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                ),
                latest AS (
                  SELECT DISTINCT ON (r.query_id) r.query_id, r.id AS response_id
                  FROM llm_responses r
                  JOIN selected s ON s.id = r.query_id
                  ORDER BY r.query_id, r.id DESC
                )
                SELECT
                  q.status,
                  COUNT(*) AS queries,
                  COUNT(latest.response_id) AS latest_responses,
                  MIN(q.started_at) AS first_started_at,
                  MAX(q.finished_at) AS last_finished_at
                FROM queries q
                JOIN selected s ON s.id = q.id
                LEFT JOIN latest ON latest.query_id = q.id
                GROUP BY q.status
                ORDER BY q.status;
              "
              remaining="$(psql_cmd -At -c "
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                )
                SELECT COUNT(*)
                FROM queries q
                JOIN selected s ON s.id = q.id
                WHERE LOWER(q.status) IN ('pending', 'running');
              " | tr -d '[:space:]')"
              if [ "${remaining}" = "0" ]; then
                echo "Selected batch reached terminal statuses."
                break
              fi
              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "POLL_TIMEOUT remaining=${remaining}"
                break
              fi
              sleep 20
            done
          fi

          if [ -n "${ids_csv}" ]; then
            echo "=== Final response/citation audit CSV ==="
            psql_cmd -c "
              COPY (
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                ),
                latest AS (
                  SELECT DISTINCT ON (r.query_id)
                    r.query_id,
                    r.id AS response_id,
                    r.raw_text,
                    r.citations_json,
                    r.screenshot_path,
                    r.collected_at
                  FROM llm_responses r
                  JOIN selected s ON s.id = r.query_id
                  ORDER BY r.query_id, r.id DESC
                )
                SELECT
                  q.id AS query_id,
                  q.target_llm,
                  q.status,
                  q.retry_reason,
                  q.latency_ms,
                  q.started_at,
                  q.finished_at,
                  latest.response_id,
                  LENGTH(COALESCE(latest.raw_text, '')) AS response_len,
                  CASE
                    WHEN jsonb_typeof(latest.citations_json::jsonb) = 'array'
                    THEN jsonb_array_length(latest.citations_json::jsonb)
                    ELSE 0
                  END AS citation_count,
                  latest.screenshot_path,
                  latest.collected_at,
                  CASE
                    WHEN latest.response_id IS NULL THEN 'FAIL_NO_RESPONSE'
                    WHEN LENGTH(BTRIM(COALESCE(latest.raw_text, ''))) < 80 THEN 'SUSPECT_SHORT_RESPONSE'
                    WHEN latest.screenshot_path IS NULL THEN 'SUSPECT_NO_SCREENSHOT'
                    WHEN COALESCE(latest.raw_text, '') ILIKE '%captcha%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%cloudflare%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%login%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%verify%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%登录%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%验证码%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%出错%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%失败%'
                    THEN 'SUSPECT_RUNTIME_TEXT'
                    ELSE 'REVIEW_RESPONSE_SCREENSHOT'
                  END AS qa_auto_verdict,
                  REGEXP_REPLACE(LEFT(COALESCE(latest.raw_text, ''), 500), '[[:space:]]+', ' ', 'g') AS response_preview
                FROM queries q
                JOIN selected s ON s.id = q.id
                LEFT JOIN latest ON latest.query_id = q.id
                ORDER BY q.id
              ) TO STDOUT WITH CSV HEADER
            " > "${artifact_dir}/audit.csv"
            cat "${artifact_dir}/audit.csv"

            echo "=== Collect current batch worker logs ==="
            mkdir -p "${artifact_dir}/logs"
            docker compose logs --since "${utc_started_at}" worker worker-analysis beat \
              > "${artifact_dir}/logs/worker-services.log" 2>&1 || true
            if [ -n "${ids_space}" ]; then
              ids_regex="$(printf '%s\n' ${ids_space} | paste -sd'|' -)"
              grep -E "(${ids_regex})|execute_query|page_load|browser_timeout|soft_time_limit|no_input|no_response|cookies_expired|page_unavailable|deepseek|doubao|chatgpt" \
                "${artifact_dir}/logs/worker-services.log" \
                > "${artifact_dir}/logs/selected-query-worker.log" 2>/dev/null || true
            fi

            echo "=== Collect screenshot/html artifacts from worker ==="
            worker_cid="$(docker compose ps -q worker | head -n 1 || true)"
            if [ -n "${worker_cid}" ]; then
              docker compose exec -T -e IDS="${ids_space}" -e ARTIFACT_MARKER="${worker_artifact_marker}" worker sh -lc '
                rm -rf /tmp/scraper-artifacts
                mkdir -p /tmp/scraper-artifacts/screenshots
                for id in $IDS; do
                  find /data/screenshots -maxdepth 1 -type f -newer "${ARTIFACT_MARKER}" -name "query_${id}_*" -exec cp {} /tmp/scraper-artifacts/screenshots/ \; 2>/dev/null || true
                done
                find /data/screenshots -maxdepth 1 -type f -newer "${ARTIFACT_MARKER}" \( -name "query_-1_*" -o -name "*response_page*.html" -o -name "*extract_fail*.html" \) -exec cp {} /tmp/scraper-artifacts/screenshots/ \; 2>/dev/null || true
                find /tmp/scraper-artifacts/screenshots -maxdepth 1 -type f | sort > /tmp/scraper-artifacts/artifact_files.txt || true
              ' </dev/null || true
              docker cp "${worker_cid}:/tmp/scraper-artifacts/." "${artifact_dir}/" || true
            fi
          fi

          REMOTE

          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz" \
            scraper-batch-artifacts/
          tar -tzf "scraper-batch-artifacts/genpano_scraper_batch_${GH_RUN_ID}.tar.gz" | tee scraper-batch-artifacts/artifact-manifest.txt

      - name: Upload bestCoffer scraper batch artifacts
        if: ${{ always() && inputs.scraper_mode == 'bestcoffer_batch' }}
        uses: actions/upload-artifact@v4
        with:
          name: bestcoffer-scraper-batch-${{ github.run_id }}
          path: scraper-batch-artifacts

      - name: Run read-only diagnostics
        if: ${{ inputs.scraper_mode != 'bestcoffer_batch' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/genpano
            BRAND_ID='${{ inputs.brand_id }}'
            BRAND_QUERY='${{ inputs.brand_query }}'
            PROJECT_ID='${{ inputs.project_id }}'
            : "${BRAND_ID:=12}"
            : "${BRAND_QUERY:=雅诗兰黛}"
            : "${PROJECT_ID:=95d43022-a5c8-5944-b6d6-34b29faa18b5}"
            if ! [[ "${PROJECT_ID}" =~ ^[0-9A-Fa-f-]{36}$ ]]; then
              echo "Invalid PROJECT_ID input '${PROJECT_ID}', falling back to empty probe"
              PROJECT_ID="00000000-0000-0000-0000-000000000000"
            fi

            echo "=== Docker compose status ==="
            docker compose ps

            echo "=== Incident #475 container image/start details ==="
            docker compose ps -q | xargs -r docker inspect --format '{{.Name}} image={{.Config.Image}} started={{.State.StartedAt}} status={{.State.Status}} restart_count={{.RestartCount}}' || true

            echo "=== Incident #475 sample query rows ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                q.id,
                q.target_llm,
                q.status,
                q.queued_at,
                q.started_at,
                q.finished_at,
                q.latency_ms,
                q.retry_reason,
                q.account_id,
                a.status AS account_status,
                a.consecutive_fails AS account_consecutive_fails,
                a.cooldown_until AS account_cooldown_until,
                a.query_count_today AS account_query_count_today,
                a.daily_limit AS account_daily_limit,
                p.id AS proxy_id,
                p.provider AS proxy_provider,
                p.is_banned AS proxy_is_banned,
                p.cooldown_until AS proxy_cooldown_until,
                p.fail_count AS proxy_fail_count,
                p.success_count AS proxy_success_count
              FROM queries q
              LEFT JOIN llm_accounts a ON a.id = q.account_id
              LEFT JOIN proxies p ON p.id = a.proxy_id
              WHERE q.id IN (184581,184580,184578,184577,184576,184575,184574,184573,184572,184571,184570,184569,184568)
              ORDER BY q.id DESC;
            " || true

            echo "=== Incident #475 failure summary around 2026-05-11 08:07-08:11 UTC ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                q.target_llm,
                q.status,
                COALESCE(q.retry_reason, '') AS retry_reason,
                COUNT(*) AS rows,
                MIN(q.queued_at) AS min_queued_at,
                MIN(q.started_at) AS min_started_at,
                MIN(q.finished_at) AS min_finished_at,
                MAX(q.finished_at) AS max_finished_at,
                ROUND(AVG(q.latency_ms))::int AS avg_latency_ms,
                MAX(q.latency_ms) AS max_latency_ms
              FROM queries q
              WHERE COALESCE(q.started_at, q.finished_at, q.queued_at, q.created_at)
                    BETWEEN TIMESTAMP '2026-05-11 08:07:00'
                        AND TIMESTAMP '2026-05-11 08:11:00'
              GROUP BY q.target_llm, q.status, COALESCE(q.retry_reason, '')
              ORDER BY rows DESC, q.target_llm, retry_reason;
            " || true

            echo "=== Incident #475 account health by engine ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                llm_name,
                status,
                COUNT(*) AS accounts,
                COUNT(*) FILTER (WHERE cookies_json IS NOT NULL AND cookies_json <> '') AS with_cookies,
                COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
                SUM(query_count_today) AS query_count_today,
                SUM(daily_limit) AS daily_limit,
                MAX(consecutive_fails) AS max_consecutive_fails
              FROM llm_accounts
              GROUP BY llm_name, status
              ORDER BY llm_name, status;
            " || true

            echo "=== Incident #475 Redis queue lengths ==="
            for q in celery llm_chatgpt llm_gemini llm_doubao llm_deepseek account_login analysis beat; do
              printf '%s=' "$q"
              docker compose exec -T redis redis-cli -n 0 LLEN "$q" || true
            done
            echo "Redis key count:"
            docker compose exec -T redis redis-cli -n 0 DBSIZE || true
            echo "Celery binding keys:"
            docker compose exec -T redis redis-cli -n 0 --scan --pattern '_kombu.binding.*' | sort || true

            echo "=== Incident #475 Celery worker inspect ==="
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect ping || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect active || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect reserved || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect stats || true

            echo "=== Incident #475 proxy/vninja/clash state ==="
            systemctl is-active vninja || true
            systemctl status --no-pager -l vninja || true
            ss -ltnp | grep -E ':(6789|9097|9098)\b' || true
            curl -fsS --max-time 5 http://127.0.0.1:9097/configs -H 'Authorization: Bearer set-your-secret' | head -c 2000 || true
            echo
            curl -fsS --max-time 8 --proxy http://127.0.0.1:6789 https://www.gstatic.com/generate_204 -o /dev/null -w 'proxy_generate_204_http_code=%{http_code} total=%{time_total}\n' || true
            docker compose exec -T worker python - <<'PY' || true
            import os
            import socket

            print("CLASH_PROXY_URL=" + str(os.getenv("CLASH_PROXY_URL")))
            print("CLASH_API_URL=" + str(os.getenv("CLASH_API_URL")))
            for host, port in [("host.docker.internal", 6789), ("host.docker.internal", 9098)]:
                try:
                    with socket.create_connection((host, port), timeout=5):
                        print(f"socket_ok {host}:{port}")
                except Exception as exc:
                    print(f"socket_fail {host}:{port} {type(exc).__name__}: {exc}")
            PY

            echo "=== Incident #475 logs around 2026-05-11 08:07-08:11 UTC ==="
            journalctl -u vninja --since '2026-05-11 08:07:00 UTC' --until '2026-05-11 08:11:00 UTC' --no-pager -n 200 || true
            journalctl -u docker --since '2026-05-11 08:07:00 UTC' --until '2026-05-11 08:11:00 UTC' --no-pager -n 200 || true
            docker compose logs --since '2026-05-11T08:07:00' --until '2026-05-11T08:11:00' worker worker-analysis backend nginx || true

            echo "=== Incident #475 current worker logs ==="
            docker compose logs --tail=260 worker worker-analysis beat || true

            echo "=== Brand mention identity probe ==="
            echo "BRAND_ID=${BRAND_ID} BRAND_QUERY=${BRAND_QUERY}"
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, name_zh, name_en
              FROM brands
              WHERE id = ${BRAND_ID}
                 OR LOWER(COALESCE(name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                 OR LOWER(COALESCE(name_zh, '')) LIKE LOWER('%${BRAND_QUERY}%')
                 OR LOWER(COALESCE(name_en, '')) LIKE LOWER('%${BRAND_QUERY}%')
              ORDER BY id
              LIMIT 20;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT brand_id,
                     brand_name,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT response_id) AS responses,
                     SUM(COALESCE(mention_count, 1)) AS mentions,
                     MIN(created_at) AS first_seen,
                     MAX(created_at) AS last_seen
              FROM brand_mentions
              WHERE created_at >= NOW() - INTERVAL '90 days'
                AND (
                  brand_id = ${BRAND_ID}
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%雅思兰黛%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%雅诗兰黛%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%estee%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%estée%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%lauder%')
                )
              GROUP BY brand_id, brand_name
              ORDER BY rows DESC, responses DESC
              LIMIT 40;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT brand_id,
                     brand_name,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT response_id) AS responses,
                     SUM(COALESCE(mention_count, 1)) AS mentions
              FROM brand_mentions
              WHERE created_at >= NOW() - INTERVAL '90 days'
              GROUP BY brand_id, brand_name
              ORDER BY rows DESC
              LIMIT 25;
            " || true

            echo "=== Admin fact brand probe ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, primary_brand_id, industry_id
              FROM projects
              WHERE primary_brand_id = ${BRAND_ID}
                 OR LOWER(COALESCE(name, '')) LIKE LOWER('%${BRAND_QUERY}%')
              ORDER BY name
              LIMIT 20;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH scoped_topics AS (
                SELECT id FROM topics WHERE brand_id = ${BRAND_ID}
              ),
              scoped_prompts AS (
                SELECT p.id FROM prompts p JOIN scoped_topics t ON t.id = p.topic_id
              ),
              scoped_queries AS (
                SELECT q.id FROM queries q JOIN scoped_prompts p ON p.id = q.prompt_id
              ),
              scoped_responses AS (
                SELECT r.id FROM llm_responses r JOIN scoped_queries q ON q.id = r.query_id
              )
              SELECT
                (SELECT COUNT(*) FROM scoped_topics) AS topics,
                (SELECT COUNT(*) FROM scoped_prompts) AS prompts,
                (SELECT COUNT(*) FROM scoped_queries) AS queries,
                (SELECT COUNT(*) FROM scoped_responses) AS responses,
                (SELECT COUNT(*) FROM response_analyses ra JOIN scoped_responses r ON r.id = ra.response_id) AS analyses,
                (SELECT COUNT(*) FROM brand_mentions bm JOIN scoped_responses r ON r.id = bm.response_id) AS response_brand_mentions;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT q.brand_id,
                     COUNT(DISTINCT t.id) AS topics,
                     COUNT(DISTINCT p.id) AS prompts,
                     COUNT(DISTINCT q.id) AS queries,
                     COUNT(DISTINCT r.id) AS responses,
                     COUNT(DISTINCT ra.id) AS analyses
              FROM topics t
              LEFT JOIN prompts p ON p.topic_id = t.id
              LEFT JOIN queries q ON q.prompt_id = p.id
              LEFT JOIN llm_responses r ON r.query_id = q.id
              LEFT JOIN response_analyses ra ON ra.response_id = r.id
              GROUP BY q.brand_id
              ORDER BY responses DESC NULLS LAST, queries DESC NULLS LAST
              LIMIT 20;
            " || true

            echo "=== App project context probe ==="
            echo "BRAND_ID=${BRAND_ID} BRAND_QUERY=${BRAND_QUERY} PROJECT_ID=${PROJECT_ID}"
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH candidate_projects AS (
                SELECT
                  p.id,
                  p.user_id,
                  p.name,
                  p.industry_id,
                  p.primary_brand_id,
                  p.is_active,
                  p.deleted_at,
                  p.created_at,
                  EXISTS (
                    SELECT 1
                    FROM project_competitors pct
                    WHERE pct.project_id = p.id
                      AND pct.brand_id = ${BRAND_ID}
                  ) AS target_as_competitor
                FROM projects p
                WHERE p.id = '${PROJECT_ID}'
                   OR p.primary_brand_id = ${BRAND_ID}
                   OR LOWER(COALESCE(p.name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                   OR EXISTS (
                     SELECT 1
                     FROM project_competitors pct
                     WHERE pct.project_id = p.id
                       AND pct.brand_id = ${BRAND_ID}
                   )
              )
              SELECT
                cp.id,
                cp.user_id,
                cp.name,
                cp.industry_id,
                cp.primary_brand_id,
                cp.is_active,
                cp.deleted_at,
                cp.created_at,
                cp.target_as_competitor,
                COUNT(pc.brand_id) AS competitor_count,
                COALESCE(
                  STRING_AGG(pc.brand_id::text, ',' ORDER BY pc.brand_id),
                  ''
                ) AS competitor_brand_ids
              FROM candidate_projects cp
              LEFT JOIN project_competitors pc ON pc.project_id = cp.id
              GROUP BY
                cp.id,
                cp.user_id,
                cp.name,
                cp.industry_id,
                cp.primary_brand_id,
                cp.is_active,
                cp.deleted_at,
                cp.created_at,
                cp.target_as_competitor
              ORDER BY
                (cp.id = '${PROJECT_ID}') DESC,
                (cp.primary_brand_id = ${BRAND_ID}) DESC,
                cp.deleted_at NULLS FIRST,
                cp.created_at DESC
              LIMIT 50;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                pc.project_id,
                p.user_id,
                p.name,
                p.primary_brand_id,
                pc.brand_id AS competitor_brand_id,
                pc.pinned_at,
                pc.pinned_by
              FROM project_competitors pc
              LEFT JOIN projects p ON p.id = pc.project_id
              WHERE pc.project_id = '${PROJECT_ID}'
                 OR pc.brand_id = ${BRAND_ID}
              ORDER BY pc.project_id, pc.brand_id
              LIMIT 50;
            " || true

            echo "=== Raw text brand query probe ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, name_zh, name_en
              FROM brands
              WHERE id IN (1, 2, ${BRAND_ID}, 24)
              ORDER BY id;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH hits AS (
                SELECT 'topic' AS source, t.brand_id, t.id AS object_id,
                       NULL::integer AS query_id, NULL::integer AS response_id
                FROM topics t
                WHERE COALESCE(t.text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(t.text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(t.text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(t.text, '') ILIKE '%estee%'
                   OR COALESCE(t.text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'prompt' AS source, q.brand_id, p.id AS object_id,
                       NULL::integer AS query_id, NULL::integer AS response_id
                FROM prompts p
                LEFT JOIN topics t ON t.id = p.topic_id
                LEFT JOIN queries q ON q.prompt_id = p.id
                WHERE COALESCE(p.text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(p.text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(p.text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(p.text, '') ILIKE '%estee%'
                   OR COALESCE(p.text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'query' AS source, q.brand_id, q.id AS object_id,
                       q.id AS query_id, NULL::integer AS response_id
                FROM queries q
                WHERE COALESCE(q.query_text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(q.query_text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(q.query_text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(q.query_text, '') ILIKE '%estee%'
                   OR COALESCE(q.query_text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'response' AS source, q.brand_id, r.id AS object_id,
                       q.id AS query_id, r.id AS response_id
                FROM llm_responses r
                LEFT JOIN queries q ON q.id = r.query_id
                WHERE COALESCE(r.raw_text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(r.raw_text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(r.raw_text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(r.raw_text, '') ILIKE '%estee%'
                   OR COALESCE(r.raw_text, '') ILIKE '%lauder%'
              )
              SELECT source,
                     brand_id,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT query_id) AS queries,
                     COUNT(DISTINCT response_id) AS responses
              FROM hits
              GROUP BY source, brand_id
              ORDER BY source, rows DESC, brand_id;
            " || true

