name: Server Diagnostics

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "Brand id to inspect"
        required: false
        default: "12"
      brand_query:
        description: "Brand name fragment to inspect"
        required: false
        default: "雅诗兰黛"
      project_id:
        description: "Optional App project UUID to inspect"
        required: false
        default: "95d43022-a5c8-5944-b6d6-34b29faa18b5"
      from_date:
        description: "App analytics window start for business-completeness E2E"
        required: false
        default: "2026-04-24"
      to_date:
        description: "App analytics window end for business-completeness E2E"
        required: false
        default: "2026-05-07"
      scraper_mode:
        description: "diagnostics, query_status, bestcoffer_batch, account_quota_reset, doubao_auth_false_success_repair, doubao_sms_forensics, chatgpt_sms_env_check, vninja_proxy_check, vninja_subscription_update, or app_analytics_business_completeness"
        required: false
        default: "diagnostics"
      target_llm:
        description: "bestcoffer_batch only: optional target LLM filter, for staged per-engine batches"
        required: false
        default: ""
      batch_limit:
        description: "bestcoffer_batch only: number of no-response queries to dispatch"
        required: false
        default: "5"
      execute_batch:
        description: "bestcoffer_batch only: true dispatches, false only lists candidates"
        required: false
        default: "false"
      poll_seconds:
        description: "bestcoffer_batch only: seconds to wait for selected queries"
        required: false
        default: "900"
      repair_stale_running:
        description: "bestcoffer_batch only: true marks stale running/no-response rows failed before selection"
        required: false
        default: "false"
      stale_running_ttl_seconds:
        description: "bestcoffer_batch only: age threshold for stale running repair"
        required: false
        default: "3600"
      redact_bestcoffer_payload_artifacts:
        description: "bestcoffer_batch only: true omits raw query/response/citation payload artifacts"
        required: false
        default: "true"
      doubao_auth_repair_apply:
        description: "doubao_auth_false_success_repair only: true applies the #594 repair; false is dry-run"
        required: false
        default: "false"
      doubao_sms_since_utc:
        description: "doubao_sms_forensics only: UTC start timestamp for read-only DB/log evidence"
        required: false
        default: "2026-05-12 17:00:00 UTC"
      doubao_sms_until_utc:
        description: "doubao_sms_forensics only: UTC end timestamp for read-only DB/log evidence"
        required: false
        default: "2026-05-12 18:45:00 UTC"
      doubao_sms_phone_suffixes:
        description: "doubao_sms_forensics only: comma-separated phone endings; output remains masked"
        required: false
        default: "6310,0064,7576"
      account_quota_reset_llm:
        description: "account_quota_reset only: target engine allowlist value (doubao or chatgpt)"
        required: false
        default: "doubao"
      account_quota_reset_apply:
        description: "account_quota_reset only: true applies quota/cooldown reset; false is dry-run"
        required: false
        default: "false"

jobs:
  diagnostics:
    name: Inspect live test-environment server
    if: ${{ inputs.scraper_mode != 'app_analytics_business_completeness' }}
    runs-on: ubuntu-latest

    steps:
      - name: Run bestCoffer scraper batch
        if: ${{ inputs.scraper_mode == 'bestcoffer_batch' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          BRAND_ID: ${{ inputs.brand_id }}
          BATCH_LIMIT: ${{ inputs.batch_limit }}
          EXECUTE_BATCH: ${{ inputs.execute_batch }}
          POLL_SECONDS: ${{ inputs.poll_seconds }}
          TARGET_LLM: ${{ inputs.target_llm }}
          REPAIR_STALE_RUNNING: ${{ inputs.repair_stale_running }}
          STALE_RUNNING_TTL_SECONDS: ${{ inputs.stale_running_ttl_seconds }}
          REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS: ${{ inputs.redact_bestcoffer_payload_artifacts }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh scraper-batch-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_cmd="$(printf 'BRAND_ID=%q BATCH_LIMIT=%q EXECUTE_BATCH=%q POLL_SECONDS=%q TARGET_LLM=%q REPAIR_STALE_RUNNING=%q STALE_RUNNING_TTL_SECONDS=%q REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS=%q GH_RUN_ID=%q bash -s' \
            "${BRAND_ID}" "${BATCH_LIMIT}" "${EXECUTE_BATCH}" "${POLL_SECONDS}" "${TARGET_LLM}" "${REPAIR_STALE_RUNNING}" "${STALE_RUNNING_TTL_SECONDS}" "${REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS}" "${GH_RUN_ID}")"

          set +e
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' | tee scraper-batch-artifacts/scraper-batch.log
          set -Eeuo pipefail
          cd /opt/genpano

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          [[ "${BRAND_ID}" =~ ^[0-9]+$ ]] || fail "BRAND_ID must be an integer"
          [[ "${BATCH_LIMIT}" =~ ^[0-9]+$ ]] || fail "BATCH_LIMIT must be an integer"
          [[ "${POLL_SECONDS}" =~ ^[0-9]+$ ]] || fail "POLL_SECONDS must be an integer"
          [[ "${STALE_RUNNING_TTL_SECONDS}" =~ ^[0-9]+$ ]] || fail "STALE_RUNNING_TTL_SECONDS must be an integer"
          if [ -n "${TARGET_LLM}" ] && [ "${TARGET_LLM}" != "all" ] && ! [[ "${TARGET_LLM}" =~ ^[a-z0-9_-]+$ ]]; then
            fail "TARGET_LLM must be empty, all, or a lowercase engine key"
          fi
          [ "${BATCH_LIMIT}" -ge 1 ] || fail "BATCH_LIMIT must be >= 1"
          [ "${BATCH_LIMIT}" -le 100 ] || fail "BATCH_LIMIT must be <= 100 for staged scraper validation"
          [ "${STALE_RUNNING_TTL_SECONDS}" -ge 60 ] || fail "STALE_RUNNING_TTL_SECONDS must be >= 60"
          [ "${STALE_RUNNING_TTL_SECONDS}" -le 604800 ] || fail "STALE_RUNNING_TTL_SECONDS must be <= 604800"
          case "${EXECUTE_BATCH}" in
            true|false) ;;
            *) fail "EXECUTE_BATCH must be true or false" ;;
          esac
          case "${REPAIR_STALE_RUNNING}" in
            true|false) ;;
            *) fail "REPAIR_STALE_RUNNING must be true or false" ;;
          esac
          case "${REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS}" in
            true|false) ;;
            *) fail "REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS must be true or false" ;;
          esac

          artifact_dir="/tmp/genpano_scraper_batch_${GH_RUN_ID}"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}/screenshots"
          sanitizer_py="${artifact_dir}/sanitize_herosms_logs.py"
          cat > "${sanitizer_py}" <<'PY'
          from __future__ import annotations

          import re
          import sys
          from pathlib import Path

          HEROSMS_HANDLER_URL_RE = re.compile(
              r"(?i)https?://[^\s\"'<>]*handler_api\.php[^\s\"'<>]*"
          )
          SECRET_ASSIGN_RE = re.compile(
              r"(?ix)"
              r"\b("
              r"api[_-]?key|apikey|"
              r"access[_-]?token|refresh[_-]?token|token|secret|"
              r"authorization|auth|cookie|set[_-]?cookie"
              r")\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )
          HERO_SMS_ENV_RE = re.compile(r"(?i)\bHERO_SMS_API_KEY\s*=\s*\S+")
          AUTH_HEADER_RE = re.compile(r"(?i)\b(authorization|auth)\s*:\s*(?:bearer\s+)?[^\s;]+")
          COOKIE_HEADER_RE = re.compile(r"(?i)\b(cookie|set-cookie)\s*:\s*[^;\r\n]+;?")
          PHONE_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(phone(?:[_-]?number)?|msisdn|mobile|number)\s*[:=]\s*"
              r"\+?\d[\d\s().-]{7,}\d"
          )
          E164_PHONE_RE = re.compile(r"(?<![\w])\+?\d{10,15}(?![\w])")
          SMS_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(sms(?:[_-]?(?:text|body|message|code))?|text|body|message|code)"
              r"\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )
          ACTIVATION_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(activation[_-]?(?:id|ref|secret|code)|activationid)\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )

          def _redact_assignment(marker: str):
              def replace(match: re.Match[str]) -> str:
                  return f"{match.group(1)}={marker}"

              return replace

          def _redact_header(match: re.Match[str]) -> str:
              return f"{match.group(1)}: [secret redacted]"

          def sanitize_text(text: str) -> str:
              sanitized = HEROSMS_HANDLER_URL_RE.sub("[HeroSMS URL redacted]", text)
              sanitized = AUTH_HEADER_RE.sub(_redact_header, sanitized)
              sanitized = COOKIE_HEADER_RE.sub(_redact_header, sanitized)
              sanitized = SECRET_ASSIGN_RE.sub(_redact_assignment("[secret redacted]"), sanitized)
              sanitized = HERO_SMS_ENV_RE.sub("HERO_SMS_API_KEY_present=true", sanitized)
              sanitized = PHONE_FIELD_RE.sub(_redact_assignment("[phone redacted]"), sanitized)
              sanitized = E164_PHONE_RE.sub("[phone redacted]", sanitized)
              sanitized = SMS_FIELD_RE.sub(_redact_assignment("[SMS field redacted]"), sanitized)
              return ACTIVATION_FIELD_RE.sub(
                  _redact_assignment("[activation field redacted]"),
                  sanitized,
              )

          def sanitize_file(path: Path) -> None:
              text = path.read_text(encoding="utf-8", errors="replace")
              path.write_text(sanitize_text(text), encoding="utf-8")

          def main(argv: list[str]) -> int:
              if argv:
                  for arg in argv:
                      sanitize_file(Path(arg))
                  return 0
              sys.stdout.write(sanitize_text(sys.stdin.read()))
              return 0

          if __name__ == "__main__":
              raise SystemExit(main(sys.argv[1:]))
          PY
          chmod 700 "${sanitizer_py}"
          sanitize_herosms_stream() {
            python3 "${sanitizer_py}"
          }
          sanitize_herosms_logs() {
            python3 "${sanitizer_py}" "$1"
          }
          sanitizer_probe="$(sanitize_herosms_stream <<'EOF'
          https://hero-sms.example/stubs/handler_api.php?action=getNumber&api_key=selftest-secret&phone=+15551234567
          auth=selftest-auth-short
          Authorization: Bearer selftest-token
          Auth: Bearer selftest-auth-header
          Cookie: session=selftest-cookie
          Set-Cookie: hero=selftest-set-cookie
          sms_text='Your selftest code is 654321'
          activation_ref=selftest-ref activation_secret=selftest-activation-secret activation_code=112233
          EOF
          )"
          case "${sanitizer_probe}" in
            *hero-sms.example*|*handler_api.php*|*api_key=*|*selftest-secret*|*selftest-auth-short*|*selftest-token*|*selftest-auth-header*|*selftest-cookie*|*selftest-set-cookie*|*+15551234567*|*654321*|*selftest-ref*|*selftest-activation-secret*|*112233*)
              fail "HeroSMS sanitizer self-test failed before worker log capture"
              ;;
          esac
          worker_artifact_marker="/tmp/scraper-artifact-marker-${GH_RUN_ID}"
          summary_file="${artifact_dir}/summary.txt"
          exec > >(tee "${summary_file}") 2>&1
          finish() {
            status=$?
            echo "=== Artifact manifest ==="
            find "${artifact_dir}" -maxdepth 3 -type f | sort || true
            tar -czf "/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz" -C "${artifact_dir}" . || true
            echo "artifact_archive=/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz"
            exit "${status}"
          }
          trap finish EXIT

          psql_cmd() {
            docker compose exec -T postgres psql -X -v ON_ERROR_STOP=1 -U genpano -d genpano "$@" </dev/null
          }

          echo "=== bestCoffer scraper batch audit ==="
          echo "run=https://github.com/jotamotk/X/actions/runs/${GH_RUN_ID}"
          echo "brand_id=${BRAND_ID}"
          echo "batch_limit=${BATCH_LIMIT}"
          echo "execute_batch=${EXECUTE_BATCH}"
          echo "poll_seconds=${POLL_SECONDS}"
          echo "target_llm=${TARGET_LLM:-all}"
          echo "repair_stale_running=${REPAIR_STALE_RUNNING}"
          echo "stale_running_ttl_seconds=${STALE_RUNNING_TTL_SECONDS}"
          echo "redact_bestcoffer_payload_artifacts=${REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS}"
          utc_started_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "utc_started_at=${utc_started_at}"

          echo "=== Docker compose status ==="
          docker compose ps

          echo "=== Preflight query/response counters ==="
          psql_cmd -c "
            WITH scoped AS (
              SELECT q.id, q.target_llm, q.status
              FROM queries q
              WHERE q.brand_id = ${BRAND_ID}
                AND ('${TARGET_LLM}' IN ('', 'all') OR q.target_llm = '${TARGET_LLM}')
            ),
            response_counts AS (
              SELECT query_id, COUNT(*) AS responses
              FROM llm_responses
              GROUP BY query_id
            )
            SELECT
              s.target_llm,
              s.status,
              COUNT(*) AS queries,
              COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) > 0) AS queries_with_response,
              COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) = 0) AS queries_without_response
            FROM scoped s
            LEFT JOIN response_counts r ON r.query_id = s.id
            GROUP BY s.target_llm, s.status
            ORDER BY s.target_llm, s.status;
          "

          if [ "${REPAIR_STALE_RUNNING}" = "true" ]; then
            echo "=== Repair stale running no-response rows ==="
            repair_ids_tsv="${artifact_dir}/stale_running_repaired.tsv"
            psql_cmd -At -F $'\t' -c "
              WITH candidates AS (
                SELECT q.id, q.target_llm, q.status AS previous_status
                FROM queries q
                WHERE q.brand_id = ${BRAND_ID}
                  AND ('${TARGET_LLM}' IN ('', 'all') OR q.target_llm = '${TARGET_LLM}')
                  AND LOWER(q.status) = 'running'
                  AND COALESCE(q.started_at, q.executed_at, q.queued_at, q.created_at)
                      < NOW() - (CAST('${STALE_RUNNING_TTL_SECONDS}' AS text) || ' seconds')::interval
                  AND NOT EXISTS (
                    SELECT 1 FROM llm_responses r WHERE r.query_id = q.id
                  )
              ),
              updated AS (
                UPDATE queries q
                   SET status = 'failed',
                       finished_at = NOW(),
                       retry_reason = 'stale_running_timeout:${GH_RUN_ID}',
                       latency_ms = CASE
                         WHEN q.started_at IS NULL THEN q.latency_ms
                         ELSE GREATEST(
                           0,
                           FLOOR(EXTRACT(EPOCH FROM (NOW() - q.started_at)) * 1000)::int
                         )
                       END
                  FROM candidates c
                 WHERE q.id = c.id
                RETURNING q.id, q.target_llm, c.previous_status, q.status, q.retry_reason
              )
              SELECT id, target_llm, previous_status, status, retry_reason
              FROM updated
              ORDER BY target_llm, id;
            " > "${repair_ids_tsv}"

            if [ -s "${repair_ids_tsv}" ]; then
              echo "Repaired stale running rows:"
              cat "${repair_ids_tsv}"
              repair_ids_csv="$(awk -F'\t' 'NF {print $1}' "${repair_ids_tsv}" | paste -sd, -)"
              echo "Rollback note:"
              echo "UPDATE queries SET status = 'running', finished_at = NULL, retry_reason = 'rollback_stale_running_timeout:${GH_RUN_ID}' WHERE id IN (${repair_ids_csv}) AND retry_reason = 'stale_running_timeout:${GH_RUN_ID}';"
            else
              echo "No stale running no-response rows matched repair criteria."
            fi

            echo "=== Post-repair query/response counters ==="
            psql_cmd -c "
              WITH scoped AS (
                SELECT q.id, q.target_llm, q.status
                FROM queries q
                WHERE q.brand_id = ${BRAND_ID}
                  AND ('${TARGET_LLM}' IN ('', 'all') OR q.target_llm = '${TARGET_LLM}')
              ),
              response_counts AS (
                SELECT query_id, COUNT(*) AS responses
                FROM llm_responses
                GROUP BY query_id
              )
              SELECT
                s.target_llm,
                s.status,
                COUNT(*) AS queries,
                COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) > 0) AS queries_with_response,
                COUNT(*) FILTER (WHERE COALESCE(r.responses, 0) = 0) AS queries_without_response
              FROM scoped s
              LEFT JOIN response_counts r ON r.query_id = s.id
              GROUP BY s.target_llm, s.status
              ORDER BY s.target_llm, s.status;
            "
          fi

          selected_tsv="${artifact_dir}/selected.tsv"
          psql_cmd -At -F $'\t' -c "
            WITH selected AS (
              SELECT q.id, q.target_llm
              FROM queries q
              WHERE q.brand_id = ${BRAND_ID}
                AND ('${TARGET_LLM}' IN ('', 'all') OR q.target_llm = '${TARGET_LLM}')
                AND LOWER(q.status) IN ('pending', 'failed')
                AND NOT EXISTS (
                  SELECT 1 FROM llm_responses r WHERE r.query_id = q.id
                )
              ORDER BY q.id
              LIMIT ${BATCH_LIMIT}
            )
            SELECT id, target_llm FROM selected;
          " > "${selected_tsv}"
          batch_rows="$(cat "${selected_tsv}")"

          if [ -z "${batch_rows}" ]; then
            echo "No no-response bestCoffer queries remain for this batch."
            ids_csv=""
          else
            ids_csv="$(printf '%s\n' "${batch_rows}" | awk -F'\t' 'NF {print $1}' | paste -sd, -)"
          fi
          ids_space="${ids_csv//,/ }"

          echo "=== Selected batch IDs ==="
          if [ -n "${ids_csv}" ]; then
            printf '%s\n' "${batch_rows}"
            docker compose exec -T -e ARTIFACT_MARKER="${worker_artifact_marker}" worker sh -lc \
              'touch "${ARTIFACT_MARKER}"' </dev/null || true
          else
            echo "<none>"
          fi

          if [ "${EXECUTE_BATCH}" = "true" ] && [ -n "${ids_csv}" ]; then
            echo "=== Reset selected queries to pending ==="
            psql_cmd -c "
              WITH selected AS (
                SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
              )
              UPDATE queries q
              SET status = 'pending',
                  retry_count = COALESCE(q.retry_count, 0) + 1,
                  queued_at = NOW(),
                  started_at = NULL,
                  finished_at = NULL,
                  latency_ms = NULL,
                  retry_reason = 'bestcoffer_batch_audit:${GH_RUN_ID}'
              FROM selected s
              WHERE q.id = s.id
              RETURNING q.id, q.target_llm, q.status, q.retry_reason;
            "

            if [ "${TARGET_LLM}" = "chatgpt" ]; then
              echo "=== ChatGPT proxy route preflight ==="
              docker compose exec -T worker python - <<'PY' || true
          import asyncio
          import json
          import os
          from dataclasses import asdict

          from geo_tracker.agent.clash_api import (
              CLASH_API_URL,
              ensure_global_proxy_route,
          )
          from geo_tracker.agent.guest_executor import CLASH_PROXY_GROUP

          async def main():
              diagnostic = await ensure_global_proxy_route(CLASH_API_URL, CLASH_PROXY_GROUP)
              print(json.dumps({
                  "clash_api_url": CLASH_API_URL,
                  "clash_proxy_url": os.getenv("CLASH_PROXY_URL"),
                  "clash_proxy_group": CLASH_PROXY_GROUP,
                  "clash_global_proxy_group": os.getenv("CLASH_GLOBAL_PROXY_GROUP", "GLOBAL"),
                  "clash_api_secret_present": bool(os.getenv("CLASH_API_SECRET")),
                  "route": asdict(diagnostic),
              }, ensure_ascii=False))

          asyncio.run(main())
          PY
              docker compose exec -T worker sh -lc '
                code="$(curl -sS --max-time 12 --proxy "${CLASH_PROXY_URL}" \
                  https://chatgpt.com/ -o /dev/null -w "%{http_code}" || true)"
                echo "chatgpt_proxy_http_code=${code:-curl_failed}"
              ' </dev/null || true
            fi

            echo "=== Dispatch selected queries ==="
            batch_rows_b64="$(printf '%s' "${batch_rows}" | base64 | tr -d '\n')"
            docker compose exec -T -e BATCH_ROWS_B64="${batch_rows_b64}" worker python - <<'PY'
          import base64
          import os

          from geo_tracker.tasks.celery_tasks import execute_query

          decoded = base64.b64decode(os.environ["BATCH_ROWS_B64"]).decode("utf-8")
          rows = [line.split("\t", 1) for line in decoded.splitlines() if line.strip()]
          for query_id, target_llm in rows:
              queue = f"llm_{target_llm.strip()}"
              execute_query.apply_async(args=[int(query_id)], queue=queue)
              print(f"dispatched query_id={query_id} queue={queue}")
          PY

            echo "=== Poll selected queries ==="
            deadline=$((SECONDS + POLL_SECONDS))
            while true; do
              psql_cmd -c "
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                ),
                latest AS (
                  SELECT DISTINCT ON (r.query_id) r.query_id, r.id AS response_id
                  FROM llm_responses r
                  JOIN selected s ON s.id = r.query_id
                  ORDER BY r.query_id, r.id DESC
                )
                SELECT
                  q.status,
                  COUNT(*) AS queries,
                  COUNT(latest.response_id) AS latest_responses,
                  MIN(q.started_at) AS first_started_at,
                  MAX(q.finished_at) AS last_finished_at
                FROM queries q
                JOIN selected s ON s.id = q.id
                LEFT JOIN latest ON latest.query_id = q.id
                GROUP BY q.status
                ORDER BY q.status;
              "
              remaining="$(psql_cmd -At -c "
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                )
                SELECT COUNT(*)
                FROM queries q
                JOIN selected s ON s.id = q.id
                WHERE LOWER(q.status) IN ('pending', 'running');
              " | tr -d '[:space:]')"
              if [ "${remaining}" = "0" ]; then
                echo "Selected batch reached terminal statuses."
                break
              fi
              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "POLL_TIMEOUT remaining=${remaining}"
                break
              fi
              sleep 20
            done
          fi

          if [ -n "${ids_csv}" ]; then
            echo "=== Final response/citation audit CSV ==="
            psql_cmd -c "
              COPY (
                WITH selected AS (
                  SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
                ),
                latest AS (
                  SELECT DISTINCT ON (r.query_id)
                    r.query_id,
                    r.id AS response_id,
                    r.raw_text,
                    r.citations_json,
                    r.screenshot_path,
                    r.collected_at
                  FROM llm_responses r
                  JOIN selected s ON s.id = r.query_id
                  ORDER BY r.query_id, r.id DESC
                )
                SELECT
                  q.id AS query_id,
                  q.target_llm,
                  q.status,
                  q.retry_reason,
                  q.latency_ms,
                  q.started_at,
                  q.finished_at,
                  latest.response_id,
                  LENGTH(COALESCE(latest.raw_text, '')) AS response_len,
                  CASE
                    WHEN jsonb_typeof(latest.citations_json::jsonb) = 'array'
                    THEN jsonb_array_length(latest.citations_json::jsonb)
                    ELSE 0
                  END AS citation_count,
                  latest.screenshot_path IS NOT NULL AS screenshot_present,
                  latest.collected_at,
                  CASE
                    WHEN latest.response_id IS NULL THEN NULL
                    ELSE MD5(COALESCE(latest.raw_text, ''))
                  END AS response_text_hash,
                  CASE
                    WHEN latest.response_id IS NULL THEN 'FAIL_NO_RESPONSE'
                    WHEN LENGTH(BTRIM(COALESCE(latest.raw_text, ''))) < 80 THEN 'SUSPECT_SHORT_RESPONSE'
                    WHEN latest.screenshot_path IS NULL THEN 'SUSPECT_NO_SCREENSHOT'
                    WHEN COALESCE(latest.raw_text, '') ILIKE '%captcha%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%cloudflare%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%login%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%verify%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%登录%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%验证码%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%出错%'
                      OR COALESCE(latest.raw_text, '') ILIKE '%失败%'
                    THEN 'SUSPECT_RUNTIME_TEXT'
                    ELSE 'REVIEW_RESPONSE_SCREENSHOT'
                  END AS qa_auto_verdict
                FROM queries q
                JOIN selected s ON s.id = q.id
                LEFT JOIN latest ON latest.query_id = q.id
                ORDER BY q.id
              ) TO STDOUT WITH CSV HEADER
            " > "${artifact_dir}/audit.csv"
            cat "${artifact_dir}/audit.csv"

            echo "=== Export current batch responses JSONL ==="
            psql_cmd -At -c "
              WITH selected AS (
                SELECT unnest(string_to_array('${ids_csv}', ',')::int[]) AS id
              ),
              latest AS (
                SELECT DISTINCT ON (r.query_id)
                  r.query_id,
                  r.id AS response_id,
                  r.raw_text,
                  r.citations_json,
                  r.screenshot_path,
                  r.collected_at
                FROM llm_responses r
                JOIN selected s ON s.id = r.query_id
                ORDER BY r.query_id, r.id DESC
              )
              SELECT jsonb_build_object(
                'query_id', q.id,
                'target_llm', q.target_llm,
                'status', q.status,
                'retry_reason', q.retry_reason,
                'query_text_len', LENGTH(COALESCE(q.query_text, '')),
                'query_text_hash', MD5(COALESCE(q.query_text, '')),
                'response_id', latest.response_id,
                'response_len', LENGTH(COALESCE(latest.raw_text, '')),
                'response_text_hash', CASE
                  WHEN latest.response_id IS NULL THEN NULL
                  ELSE MD5(COALESCE(latest.raw_text, ''))
                END,
                'citation_count', CASE
                  WHEN jsonb_typeof(latest.citations_json::jsonb) = 'array'
                  THEN jsonb_array_length(latest.citations_json::jsonb)
                  ELSE 0
                END,
                'citation_payload_hash', CASE
                  WHEN latest.citations_json IS NULL THEN NULL
                  ELSE MD5(latest.citations_json::text)
                END,
                'screenshot_present', latest.screenshot_path IS NOT NULL,
                'collected_at', latest.collected_at
              )::text
              FROM queries q
              JOIN selected s ON s.id = q.id
              LEFT JOIN latest ON latest.query_id = q.id
              ORDER BY q.id;
            " > "${artifact_dir}/responses.jsonl"

            echo "=== Collect current batch worker logs ==="
            mkdir -p "${artifact_dir}/logs"
            docker compose logs --since "${utc_started_at}" worker worker-analysis beat \
              > "${artifact_dir}/logs/worker-services.log" 2>&1 || true
            sanitize_herosms_logs "${artifact_dir}/logs/worker-services.log"
            if [ -n "${ids_space}" ]; then
              ids_regex="$(printf '%s\n' ${ids_space} | paste -sd'|' -)"
              grep -E "(${ids_regex})|execute_query|page_load|browser_timeout|soft_time_limit|no_input|no_response|cookies_expired|token_invalidated|proxy_api|proxy_global|proxy_route|page_unavailable|deepseek|doubao|chatgpt" \
                "${artifact_dir}/logs/worker-services.log" \
                > "${artifact_dir}/logs/selected-query-worker.log" 2>/dev/null || true
              sanitize_herosms_logs "${artifact_dir}/logs/selected-query-worker.log"
            fi

            echo "=== Collect screenshot/html artifacts from worker ==="
            worker_cid="$(docker compose ps -q worker | head -n 1 || true)"
            if [ -n "${worker_cid}" ]; then
              docker compose exec -T -e IDS="${ids_space}" -e ARTIFACT_MARKER="${worker_artifact_marker}" worker sh -lc '
                rm -rf /tmp/scraper-artifacts
                mkdir -p /tmp/scraper-artifacts/screenshots
                for id in $IDS; do
                  find /data/screenshots -maxdepth 1 -type f -newer "${ARTIFACT_MARKER}" -name "query_${id}_*" -exec cp {} /tmp/scraper-artifacts/screenshots/ \; 2>/dev/null || true
                done
                find /data/screenshots -maxdepth 1 -type f -newer "${ARTIFACT_MARKER}" \( -name "query_-1_*" -o -name "*response_page*.html" -o -name "*extract_fail*.html" \) -exec cp {} /tmp/scraper-artifacts/screenshots/ \; 2>/dev/null || true
                find /tmp/scraper-artifacts/screenshots -maxdepth 1 -type f | sort > /tmp/scraper-artifacts/artifact_files.txt || true
              ' </dev/null || true
              docker cp "${worker_cid}:/tmp/scraper-artifacts/." "${artifact_dir}/" || true
            fi

            python3 - "${artifact_dir}" <<'PY' > "${artifact_dir}/citation_review.jsonl" || true
          from __future__ import annotations

          import html
          import json
          import re
          import sys
          from pathlib import Path
          from urllib.parse import urlparse

          artifact_dir = Path(sys.argv[1])
          responses_path = artifact_dir / "responses.jsonl"
          screenshots_dir = artifact_dir / "screenshots"
          skip_parts = (
              "chatgpt.com",
              "cdn.openai.com",
              "openaiassets.blob.core.windows.net",
              "persistent.oaistatic.com",
              "oaistatic.com",
              "oaiusercontent.com",
              "cdn-cgi",
              "gstatic.com",
              "googleapis.com",
              "statsig",
              "sentry",
              "intercom",
          )
          attr_url_re = re.compile(
              r"(?:href|data-url|data-href|cite)=['\"](?P<url>https?://[^'\"]+)['\"]",
              re.IGNORECASE,
          )
          source_ui_re = re.compile(
              r"(?:data-testid|aria-label|title)=['\"][^'\"]*(?:source|sources|citation|citations)[^'\"]*['\"]"
              r"|>\s*(?:Sources|Citations)\s*<",
              re.IGNORECASE,
          )

          def is_skipped(url: str) -> bool:
              try:
                  host = (urlparse(url).netloc or "").lower().split("@")[-1].split(":")[0]
              except Exception:
                  return True
              lowered = url.lower()
              return not host or any(part in host or part in lowered for part in skip_parts)

          def external_url_count(text: str) -> int:
              seen: set[str] = set()
              for match in attr_url_re.finditer(text):
                  url = html.unescape(match.group("url")).rstrip(".,;:!?)]}")
                  if url and not is_skipped(url):
                      seen.add(url)
              return len(seen)

          def assistant_segments(text: str) -> list[str]:
              lowered = text.lower()
              positions = [
                  match.start()
                  for match in re.finditer(
                      r"data-message-author-role=['\"]assistant['\"]",
                      lowered,
                  )
              ]
              segments: list[str] = []
              for index, start in enumerate(positions):
                  end = positions[index + 1] if index + 1 < len(positions) else len(text)
                  segments.append(text[start:end])
              return segments

          if responses_path.is_file():
              for line in responses_path.read_text(encoding="utf-8", errors="ignore").splitlines():
                  if not line.strip():
                      continue
                  row = json.loads(line)
                  query_id = row.get("query_id")
                  html_files = sorted(screenshots_dir.glob(f"query_{query_id}_*response_page*.html"))
                  external_count = 0
                  source_marker_count = 0
                  for html_file in html_files:
                      body = html_file.read_text(encoding="utf-8", errors="ignore")
                      scoped_html = "\n".join(assistant_segments(body))
                      external_count += external_url_count(scoped_html)
                      source_marker_count += len(source_ui_re.findall(scoped_html))
                  citation_count = int(row.get("citation_count") or 0)
                  target_llm = str(row.get("target_llm") or "").lower()
                  if citation_count > 0:
                      status = "citations_present"
                      reason = "persisted_citations"
                  elif target_llm != "chatgpt":
                      status = "not_checked"
                      reason = "non_chatgpt_without_citations"
                  elif external_count > 0:
                      status = "citation_extractor_gap"
                      reason = "external_urls_in_html_not_persisted"
                  elif source_marker_count > 0:
                      status = "citation_extractor_gap"
                      reason = "source_markers_without_extractable_urls"
                  else:
                      status = "citation_not_applicable"
                      reason = "no_source_markers_or_external_links"
                  print(
                      json.dumps(
                          {
                              "query_id": query_id,
                              "target_llm": target_llm,
                              "response_id": row.get("response_id"),
                              "citation_count": citation_count,
                              "citation_status": status,
                              "citation_reason": reason,
                              "html_response_files": len(html_files),
                              "external_url_count": external_count,
                              "source_marker_count": source_marker_count,
                          },
                          ensure_ascii=False,
                      )
                  )
          PY
            if [ "${REDACT_BESTCOFFER_PAYLOAD_ARTIFACTS}" = "true" ]; then
              echo "=== Redact payload-bearing bestCoffer artifacts ==="
              {
                echo "redacted=true"
                echo "reason=Refs #697 safe live gate: omit raw query, response, citation URL, screenshot, and HTML payloads"
                echo "preserved=audit.csv responses.jsonl citation_review.jsonl logs artifact manifest"
              } > "${artifact_dir}/payload_artifacts_redacted.txt"
              if [ -d "${artifact_dir}/screenshots" ]; then
                find "${artifact_dir}/screenshots" -type f \( -name '*.html' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' \) -delete || true
                find "${artifact_dir}/screenshots" -maxdepth 1 -type f | sort > "${artifact_dir}/artifact_files.txt" || true
              fi
              if [ -d "${artifact_dir}/logs" ]; then
                rm -f "${artifact_dir}/logs/worker-services.log" "${artifact_dir}/logs/selected-query-worker.log" || true
                echo "raw worker logs redacted for Refs #697 safe live gate" > "${artifact_dir}/logs/payload_logs_redacted.txt"
              fi
            fi

            if [ "${EXECUTE_BATCH}" = "true" ]; then
              echo "=== Enforce selected batch status semantics ==="
              python3 - "${artifact_dir}/audit.csv" "${artifact_dir}/batch_status_semantics_failed.txt" <<'PY'
          from __future__ import annotations

          import csv
          import sys
          from pathlib import Path

          audit_path = Path(sys.argv[1])
          failure_path = Path(sys.argv[2])

          def as_int(value: str | None) -> int:
              try:
                  return int(str(value or "").strip() or "0")
              except ValueError:
                  return 0

          failures: list[str] = []
          with audit_path.open(newline="", encoding="utf-8") as handle:
              for row in csv.DictReader(handle):
                  query_id = str(row.get("query_id") or "").strip() or "<unknown>"
                  status = str(row.get("status") or "").strip().lower()
                  verdict = str(row.get("qa_auto_verdict") or "").strip().upper()
                  response_id = str(row.get("response_id") or "").strip()
                  response_len = as_int(row.get("response_len"))
                  reasons: list[str] = []

                  if status == "failed":
                      reasons.append("terminal_failed_status")
                  if verdict.startswith("FAIL"):
                      reasons.append("failing_qa_auto_verdict")
                  if not response_id:
                      reasons.append("missing_response_id")
                  if response_len <= 0:
                      reasons.append("missing_response_text")

                  if reasons:
                      failures.append(
                          ",".join(
                              [
                                  f"query_id={query_id}",
                                  f"status={status or '<empty>'}",
                                  f"qa_auto_verdict={verdict or '<empty>'}",
                                  f"response_id_present={bool(response_id)}",
                                  f"response_len={response_len}",
                                  "reasons=" + "|".join(reasons),
                              ]
                          )
                      )

          if failures:
              failure_path.write_text("\n".join(failures) + "\n", encoding="utf-8")
              print("Selected batch status semantics failed:")
              for failure in failures:
                  print(failure)
              sys.exit(3)

          failure_path.write_text(
              "selected batch status semantics passed\n",
              encoding="utf-8",
          )
          print("Selected batch status semantics passed.")
          PY
            else
              echo "=== Skip selected batch status semantics for preview ==="
              {
                echo "status_semantics_enforced=false"
                echo "reason=execute_batch=false candidate preview does not dispatch selected rows"
              } > "${artifact_dir}/batch_status_semantics_skipped.txt"
            fi
          fi

          REMOTE
          remote_status=${PIPESTATUS[0]}
          set -e

          scp_status=0
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/genpano_scraper_batch_${GH_RUN_ID}.tar.gz" \
            scraper-batch-artifacts/ || scp_status=$?

          manifest_status=0
          artifact_archive="scraper-batch-artifacts/genpano_scraper_batch_${GH_RUN_ID}.tar.gz"
          if [ -f "${artifact_archive}" ]; then
            tar -tzf "${artifact_archive}" | tee scraper-batch-artifacts/artifact-manifest.txt \
              || manifest_status=$?
          else
            {
              echo "artifact_archive_missing=${artifact_archive}"
              echo "scp_status=${scp_status}"
            } | tee scraper-batch-artifacts/artifact-manifest.txt
          fi

          if [ "${remote_status}" -ne 0 ]; then
            exit "${remote_status}"
          fi
          if [ "${scp_status}" -ne 0 ]; then
            exit "${scp_status}"
          fi
          if [ "${manifest_status}" -ne 0 ]; then
            exit "${manifest_status}"
          fi

      - name: Upload bestCoffer scraper batch artifacts
        if: ${{ always() && inputs.scraper_mode == 'bestcoffer_batch' }}
        uses: actions/upload-artifact@v4
        with:
          name: bestcoffer-scraper-batch-${{ github.run_id }}
          path: scraper-batch-artifacts

      - name: Run Doubao auth false-success repair
        if: ${{ inputs.scraper_mode == 'doubao_auth_false_success_repair' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DOUBAO_AUTH_REPAIR_APPLY: ${{ inputs.doubao_auth_repair_apply }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh doubao-auth-repair-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_cmd="$(printf 'DOUBAO_AUTH_REPAIR_APPLY=%q GH_RUN_ID=%q bash -s' \
            "${DOUBAO_AUTH_REPAIR_APPLY}" "${GH_RUN_ID}")"

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' \
            | tee doubao-auth-repair-artifacts/repair-output.json
          set -Eeuo pipefail
          cd /opt/genpano

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          case "${DOUBAO_AUTH_REPAIR_APPLY}" in
            true|false) ;;
            *) fail "DOUBAO_AUTH_REPAIR_APPLY must be true or false" ;;
          esac

          if [ "${DOUBAO_AUTH_REPAIR_APPLY}" = "true" ]; then
            docker compose exec -T worker python -m geo_tracker.tasks.doubao_auth_false_success_repair --apply --approval-ref "Refs #594:${GH_RUN_ID}"
          else
            docker compose exec -T worker python -m geo_tracker.tasks.doubao_auth_false_success_repair --approval-ref "Refs #594 dry-run:${GH_RUN_ID}"
          fi
          REMOTE

          cp doubao-auth-repair-artifacts/repair-output.json \
            doubao-auth-repair-artifacts/repair-output.log
          python3 - <<'PY' > doubao-auth-repair-artifacts/rollback.sql
          import json
          from pathlib import Path

          payload = json.loads(Path("doubao-auth-repair-artifacts/repair-output.json").read_text(encoding="utf-8-sig"))
          rollback = payload.get("rollback_sql") or []
          if rollback:
              print("-- Rollback SQL emitted by doubao_auth_false_success_repair")
              for item in rollback:
                  print(item)
          else:
              print("-- No rollback SQL emitted; no matching DONE false-success rows were repaired or repair was a dry-run with no candidates.")
          PY
          cat doubao-auth-repair-artifacts/rollback.sql

      - name: Upload Doubao auth repair artifacts
        if: ${{ always() && inputs.scraper_mode == 'doubao_auth_false_success_repair' }}
        uses: actions/upload-artifact@v4
        with:
          name: doubao-auth-false-success-repair-${{ github.run_id }}
          path: doubao-auth-repair-artifacts

      - name: Run LLM account quota/cooldown reset
        if: ${{ inputs.scraper_mode == 'account_quota_reset' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ACCOUNT_QUOTA_RESET_LLM: ${{ inputs.account_quota_reset_llm }}
          ACCOUNT_QUOTA_RESET_APPLY: ${{ inputs.account_quota_reset_apply }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh account-quota-reset-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_cmd="$(printf 'ACCOUNT_QUOTA_RESET_LLM=%q ACCOUNT_QUOTA_RESET_APPLY=%q GH_RUN_ID=%q bash -s' \
            "${ACCOUNT_QUOTA_RESET_LLM}" "${ACCOUNT_QUOTA_RESET_APPLY}" "${GH_RUN_ID}")"

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' | tee account-quota-reset-artifacts/account-quota-reset.log
          set -Eeuo pipefail
          cd /opt/genpano

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          case "${ACCOUNT_QUOTA_RESET_LLM}" in
            doubao) target_llm_sql="'doubao'" ;;
            chatgpt) target_llm_sql="'chatgpt'" ;;
            *) fail "ACCOUNT_QUOTA_RESET_LLM must be doubao or chatgpt" ;;
          esac
          case "${ACCOUNT_QUOTA_RESET_APPLY}" in
            true|false) ;;
            *) fail "ACCOUNT_QUOTA_RESET_APPLY must be true or false" ;;
          esac

          artifact_dir="/tmp/genpano_account_quota_reset_${GH_RUN_ID}"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"
          summary_file="${artifact_dir}/summary.txt"
          exec > >(tee "${summary_file}") 2>&1
          finish() {
            status=$?
            echo "=== Artifact manifest ==="
            find "${artifact_dir}" -maxdepth 2 -type f | sort || true
            tar -czf "/tmp/genpano_account_quota_reset_${GH_RUN_ID}.tar.gz" -C "${artifact_dir}" . || true
            echo "artifact_archive=/tmp/genpano_account_quota_reset_${GH_RUN_ID}.tar.gz"
            exit "${status}"
          }
          trap finish EXIT

          psql_cmd() {
            docker compose exec -T postgres psql -X -v ON_ERROR_STOP=1 -U genpano -d genpano "$@" </dev/null
          }

          echo "=== LLM account quota/cooldown reset audit ==="
          echo "run=https://github.com/jotamotk/trash_test/actions/runs/${GH_RUN_ID}"
          echo "approval_ref=Refs #526"
          echo "target_llm=${ACCOUNT_QUOTA_RESET_LLM}"
          echo "apply=${ACCOUNT_QUOTA_RESET_APPLY}"
          echo "scope=status IN ('active','cooldown'); expired accounts are skipped"
          echo "fields=query_count_today=0, consecutive_fails=0, cooldown_until=NULL, status='active'"
          echo "secrets_policy=cookies_json/passwords/tokens are not selected, printed, or changed"
          echo "phone_policy=phone_number is masked when printed"

          echo "=== Docker compose status ==="
          docker compose ps

          echo "=== Before aggregates for target engine ==="
          psql_cmd -c "
            SELECT
              llm_name,
              status,
              COUNT(*) AS accounts,
              COUNT(*) FILTER (WHERE cookies_json IS NOT NULL AND cookies_json <> '') AS with_cookies,
              COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
              SUM(query_count_today) AS query_count_today,
              SUM(daily_limit) AS daily_limit,
              MAX(consecutive_fails) AS max_consecutive_fails
            FROM llm_accounts
            WHERE llm_name = ${target_llm_sql}
            GROUP BY llm_name, status
            ORDER BY llm_name, status;
          "

          echo "=== Candidate active/cooldown accounts (masked) ==="
          psql_cmd -c "
            SELECT
              id,
              llm_name,
              status,
              CASE
                WHEN COALESCE(phone_number, '') = '' THEN ''
                WHEN LENGTH(phone_number) <= 4 THEN REPEAT('*', LENGTH(phone_number))
                ELSE REPEAT('*', GREATEST(LENGTH(phone_number) - 4, 0)) || RIGHT(phone_number, 4)
              END AS phone_masked,
              query_count_today,
              daily_limit,
              consecutive_fails,
              cooldown_until
            FROM llm_accounts
            WHERE llm_name = ${target_llm_sql}
              AND status IN ('active', 'cooldown')
            ORDER BY status, id;
          "

          rollback_sql="${artifact_dir}/rollback.sql"
          psql_cmd -At -c "
            SELECT format(
              'UPDATE llm_accounts SET status=%L, query_count_today=%s, consecutive_fails=%s, cooldown_until=%s WHERE id=%s AND llm_name=%L;',
              status,
              COALESCE(query_count_today, 0),
              COALESCE(consecutive_fails, 0),
              CASE
                WHEN cooldown_until IS NULL THEN 'NULL'
                ELSE quote_nullable(cooldown_until)
              END,
              id,
              llm_name
            )
            FROM llm_accounts
            WHERE llm_name = ${target_llm_sql}
              AND status IN ('active', 'cooldown')
            ORDER BY id;
          " > "${rollback_sql}"

          echo "=== Rollback SQL ==="
          if [ -s "${rollback_sql}" ]; then
            cat "${rollback_sql}"
          else
            echo "-- No active/cooldown accounts matched target_llm=${ACCOUNT_QUOTA_RESET_LLM}; no rollback needed."
          fi

          if [ "${ACCOUNT_QUOTA_RESET_APPLY}" = "true" ]; then
            echo "=== Applying reset ==="
            psql_cmd -c "
              WITH candidates AS (
                SELECT id
                FROM llm_accounts
                WHERE llm_name = ${target_llm_sql}
                  AND status IN ('active', 'cooldown')
              ),
              updated AS (
                UPDATE llm_accounts a
                   SET query_count_today = 0,
                       consecutive_fails = 0,
                       cooldown_until = NULL,
                       status = 'active'
                  FROM candidates c
                 WHERE a.id = c.id
                RETURNING
                  a.id,
                  a.llm_name,
                  a.status,
                  a.query_count_today,
                  a.daily_limit,
                  a.consecutive_fails,
                  a.cooldown_until
              )
              SELECT * FROM updated ORDER BY id;
            "
          else
            echo "DRY_RUN: no rows were updated. Set account_quota_reset_apply=true to apply."
          fi

          echo "=== After aggregates for target engine ==="
          psql_cmd -c "
            SELECT
              llm_name,
              status,
              COUNT(*) AS accounts,
              COUNT(*) FILTER (WHERE cookies_json IS NOT NULL AND cookies_json <> '') AS with_cookies,
              COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
              SUM(query_count_today) AS query_count_today,
              SUM(daily_limit) AS daily_limit,
              MAX(consecutive_fails) AS max_consecutive_fails
            FROM llm_accounts
            WHERE llm_name = ${target_llm_sql}
            GROUP BY llm_name, status
            ORDER BY llm_name, status;
          "
          REMOTE

          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/genpano_account_quota_reset_${GH_RUN_ID}.tar.gz" \
            account-quota-reset-artifacts/
          tar -tzf "account-quota-reset-artifacts/genpano_account_quota_reset_${GH_RUN_ID}.tar.gz" | tee account-quota-reset-artifacts/artifact-manifest.txt

      - name: Upload LLM account quota/cooldown reset artifacts
        if: ${{ always() && inputs.scraper_mode == 'account_quota_reset' }}
        uses: actions/upload-artifact@v4
        with:
          name: account-quota-reset-${{ github.run_id }}
          path: account-quota-reset-artifacts

      - name: Checkout repo for V-Ninja helper
        if: ${{ inputs.scraper_mode == 'vninja_proxy_check' || inputs.scraper_mode == 'vninja_subscription_update' }}
        uses: actions/checkout@v4

      - name: Run V-Ninja proxy check/update
        if: ${{ inputs.scraper_mode == 'vninja_proxy_check' || inputs.scraper_mode == 'vninja_subscription_update' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          CLASH_SUBSCRIPTION_URL: ${{ secrets.CLASH_SUBSCRIPTION_URL }}
          SCRAPER_MODE: ${{ inputs.scraper_mode }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh vninja-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_script="/tmp/update_vninja_subscription_${GITHUB_RUN_ID}.sh"
          remote_secret_file=""
          local_secret_file=""
          cleanup() {
            if [ -n "${local_secret_file}" ] && [ -f "${local_secret_file}" ]; then
              rm -f "${local_secret_file}"
            fi
          }
          trap cleanup EXIT

          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            scripts/update_vninja_subscription.sh \
            "${SERVER_USER}@${SERVER_HOST}:${remote_script}"

          remote_mode="check"
          if [ "${SCRAPER_MODE}" = "vninja_subscription_update" ]; then
            if [ -z "${CLASH_SUBSCRIPTION_URL}" ]; then
              echo "CLASH_SUBSCRIPTION_URL GitHub secret is empty or unavailable" >&2
              exit 1
            fi
            local_secret_file="$(mktemp)"
            printf '%s' "${CLASH_SUBSCRIPTION_URL}" > "${local_secret_file}"
            chmod 600 "${local_secret_file}"
            remote_secret_file="/tmp/genpano_clash_sub_${GITHUB_RUN_ID}.txt"
            scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
              "${local_secret_file}" \
              "${SERVER_USER}@${SERVER_HOST}:${remote_secret_file}"
            remote_mode="update"
          fi

          remote_cmd="$(printf 'MODE=%q REMOTE_SCRIPT=%q SUB_URL_FILE=%q bash -s' \
            "${remote_mode}" "${remote_script}" "${remote_secret_file}")"

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' | tee vninja-artifacts/vninja-proxy.log
          set -Eeuo pipefail
          cleanup() {
            rm -f "${SUB_URL_FILE:-}" "${REMOTE_SCRIPT:-}"
          }
          trap cleanup EXIT
          chmod +x "${REMOTE_SCRIPT}"
          if [ "${MODE}" = "update" ]; then
            timeout 8m bash "${REMOTE_SCRIPT}" update "${SUB_URL_FILE}"
          else
            timeout 5m bash "${REMOTE_SCRIPT}" check
          fi
          REMOTE

      - name: Upload V-Ninja proxy artifacts
        if: ${{ always() && (inputs.scraper_mode == 'vninja_proxy_check' || inputs.scraper_mode == 'vninja_subscription_update') }}
        uses: actions/upload-artifact@v4
        with:
          name: vninja-proxy-${{ github.run_id }}
          path: vninja-artifacts

      - name: Run Doubao SMS forensics
        if: ${{ inputs.scraper_mode == 'doubao_sms_forensics' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DOUBAO_SMS_SINCE_UTC: ${{ inputs.doubao_sms_since_utc }}
          DOUBAO_SMS_UNTIL_UTC: ${{ inputs.doubao_sms_until_utc }}
          DOUBAO_SMS_PHONE_SUFFIXES: ${{ inputs.doubao_sms_phone_suffixes }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh doubao-sms-forensics-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          remote_cmd="$(printf 'DOUBAO_SMS_SINCE_UTC=%q DOUBAO_SMS_UNTIL_UTC=%q DOUBAO_SMS_PHONE_SUFFIXES=%q GH_RUN_ID=%q bash -s' \
            "${DOUBAO_SMS_SINCE_UTC}" "${DOUBAO_SMS_UNTIL_UTC}" "${DOUBAO_SMS_PHONE_SUFFIXES}" "${GH_RUN_ID}")"

          set +e
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" "${remote_cmd}" <<'REMOTE' \
            | tee doubao-sms-forensics-artifacts/doubao-sms-forensics.log
          set -Eeuo pipefail
          cd /opt/genpano

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          sanitizer_dir="$(mktemp -d /tmp/genpano_doubao_sms_forensics_sanitizer.XXXXXX)"
          sanitizer_py="${sanitizer_dir}/sanitize_herosms_logs.py"
          cat > "${sanitizer_py}" <<'PY'
          from __future__ import annotations

          import re
          import sys
          from pathlib import Path

          HEROSMS_HANDLER_URL_RE = re.compile(
              r"(?i)https?://[^\s\"'<>]*handler_api\.php[^\s\"'<>]*"
          )
          SECRET_ASSIGN_RE = re.compile(
              r"(?ix)"
              r"\b("
              r"api[_-]?key|apikey|"
              r"access[_-]?token|refresh[_-]?token|token|secret|"
              r"authorization|auth|cookie|set[_-]?cookie"
              r")\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )
          HERO_SMS_ENV_RE = re.compile(r"(?i)\bHERO_SMS_API_KEY\s*=\s*\S+")
          AUTH_HEADER_RE = re.compile(r"(?i)\b(authorization|auth)\s*:\s*(?:bearer\s+)?[^\s;]+")
          COOKIE_HEADER_RE = re.compile(r"(?i)\b(cookie|set-cookie)\s*:\s*[^;\r\n]+;?")
          PHONE_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(phone(?:[_-]?number)?|msisdn|mobile|number)\s*[:=]\s*"
              r"\+?\d[\d\s().-]{7,}\d"
          )
          E164_PHONE_RE = re.compile(r"(?<![\w])\+?\d{10,15}(?![\w])")
          SMS_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(sms(?:[_-]?(?:text|body|message|code))?|text|body|message|code)"
              r"\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )
          ACTIVATION_FIELD_RE = re.compile(
              r"(?ix)"
              r"\b(activation[_-]?(?:id|ref|secret|code)|activationid)\s*[:=]\s*"
              r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
          )

          def _redact_assignment(marker: str):
              def replace(match: re.Match[str]) -> str:
                  return f"{match.group(1)}={marker}"

              return replace

          def _redact_header(match: re.Match[str]) -> str:
              return f"{match.group(1)}: [secret redacted]"

          def sanitize_text(text: str) -> str:
              sanitized = HEROSMS_HANDLER_URL_RE.sub("[HeroSMS URL redacted]", text)
              sanitized = AUTH_HEADER_RE.sub(_redact_header, sanitized)
              sanitized = COOKIE_HEADER_RE.sub(_redact_header, sanitized)
              sanitized = SECRET_ASSIGN_RE.sub(_redact_assignment("[secret redacted]"), sanitized)
              sanitized = HERO_SMS_ENV_RE.sub("HERO_SMS_API_KEY_present=true", sanitized)
              sanitized = PHONE_FIELD_RE.sub(_redact_assignment("[phone redacted]"), sanitized)
              sanitized = E164_PHONE_RE.sub("[phone redacted]", sanitized)
              sanitized = SMS_FIELD_RE.sub(_redact_assignment("[SMS field redacted]"), sanitized)
              return ACTIVATION_FIELD_RE.sub(
                  _redact_assignment("[activation field redacted]"),
                  sanitized,
              )

          def sanitize_file(path: Path) -> None:
              text = path.read_text(encoding="utf-8", errors="replace")
              path.write_text(sanitize_text(text), encoding="utf-8")

          def main(argv: list[str]) -> int:
              if argv:
                  for arg in argv:
                      sanitize_file(Path(arg))
                  return 0
              sys.stdout.write(sanitize_text(sys.stdin.read()))
              return 0

          if __name__ == "__main__":
              raise SystemExit(main(sys.argv[1:]))
          PY
          chmod 700 "${sanitizer_py}"
          sanitize_herosms_stream() {
            python3 "${sanitizer_py}"
          }
          sanitizer_probe="$(sanitize_herosms_stream <<'EOF'
          https://hero-sms.example/stubs/handler_api.php?action=getNumber&api_key=selftest-secret&phone=+15551234567
          Authorization: Bearer selftest-token
          Cookie: session=selftest-cookie
          sms_text='Your selftest code is 654321'
          activation_ref=selftest-ref activation_secret=selftest-activation-secret
          EOF
          )"
          case "${sanitizer_probe}" in
            *hero-sms.example*|*handler_api.php*|*api_key=*|*selftest-secret*|*selftest-token*|*selftest-cookie*|*+15551234567*|*654321*|*selftest-ref*|*selftest-activation-secret*)
              fail "SMS sanitizer self-test failed before Doubao log capture"
              ;;
          esac

          since_iso="$(date -u -d "${DOUBAO_SMS_SINCE_UTC}" '+%Y-%m-%dT%H:%M:%S' 2>/dev/null || true)"
          until_iso="$(date -u -d "${DOUBAO_SMS_UNTIL_UTC}" '+%Y-%m-%dT%H:%M:%S' 2>/dev/null || true)"
          [ -n "${since_iso}" ] || fail "DOUBAO_SMS_SINCE_UTC must be parseable by GNU date"
          [ -n "${until_iso}" ] || fail "DOUBAO_SMS_UNTIL_UTC must be parseable by GNU date"
          since_epoch="$(date -u -d "${since_iso}Z" '+%s')"
          until_epoch="$(date -u -d "${until_iso}Z" '+%s')"
          [ "${since_epoch}" -lt "${until_epoch}" ] || fail "forensics start must be before end"
          window_seconds=$((until_epoch - since_epoch))
          [ "${window_seconds}" -le 21600 ] || fail "forensics window must be <= 6 hours"
          since_sql="${since_iso/T/ }"
          until_sql="${until_iso/T/ }"

          IFS=',' read -r -a suffix_array <<< "${DOUBAO_SMS_PHONE_SUFFIXES// /}"
          normalized_suffixes=""
          sql_suffixes=""
          for suffix in "${suffix_array[@]}"; do
            [ -n "${suffix}" ] || continue
            [[ "${suffix}" =~ ^[0-9]{2,8}$ ]] || fail "phone suffixes must be 2-8 digits"
            case ",${normalized_suffixes}," in
              *",${suffix},"*) continue ;;
            esac
            normalized_suffixes="${normalized_suffixes:+${normalized_suffixes},}${suffix}"
            sql_suffixes="${sql_suffixes:+${sql_suffixes},}'${suffix}'"
          done
          [ -n "${normalized_suffixes}" ] || fail "at least one phone suffix is required"

          artifact_dir="/tmp/genpano_doubao_sms_forensics_${GH_RUN_ID}"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"
          summary_file="${artifact_dir}/summary.txt"
          main_bash_pid="${BASHPID}"
          exec > >(tee "${summary_file}") 2>&1
          finish() {
            status=$?
            if [ "${BASHPID}" != "${main_bash_pid}" ]; then
              exit "${status}"
            fi
            echo "=== Artifact manifest ==="
            find "${artifact_dir}" -maxdepth 2 -type f | sort || true
            tar -czf "/tmp/genpano_doubao_sms_forensics_${GH_RUN_ID}.tar.gz" -C "${artifact_dir}" . || true
            echo "artifact_archive=/tmp/genpano_doubao_sms_forensics_${GH_RUN_ID}.tar.gz"
            exit "${status}"
          }
          trap finish EXIT

          psql_cmd() {
            docker compose exec -T postgres psql -X -v ON_ERROR_STOP=1 -U genpano -d genpano "$@" </dev/null
          }

          echo "=== Doubao SMS forensics metadata ==="
          echo "issue=Refs #754"
          echo "child_issue=Refs #757"
          echo "run=https://github.com/jotamotk/trash_test/actions/runs/${GH_RUN_ID}"
          echo "read_only=true"
          echo "mutations_attempted=false"
          echo "phone_policy=only configured suffixes are printed"
          echo "cookie_policy=cookies_json is never selected or printed"
          echo "incident_window_utc=${since_iso}Z..${until_iso}Z"
          echo "phone_suffixes=${normalized_suffixes}"

          echo "=== Doubao account rows for configured phone endings ==="
          psql_cmd -c "
            SELECT
              id AS account_id,
              llm_name,
              '[phone ending ' || RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) || ']' AS phone_suffix,
              status,
              cookies_json IS NOT NULL AND cookies_json <> '' AS has_cookies,
              CASE WHEN cookies_json IS NOT NULL AND cookies_json <> '' THEN LENGTH(cookies_json) ELSE 0 END AS cookie_bytes,
              cookies_updated_at,
              created_at,
              last_used_at,
              cooldown_until,
              consecutive_fails,
              query_count_today,
              daily_limit
            FROM llm_accounts
            WHERE llm_name = 'doubao'
              AND RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) IN (${sql_suffixes})
            ORDER BY phone_suffix, created_at, account_id;
          " | tee "${artifact_dir}/doubao-account-rows.txt" || true

          echo "=== Doubao account rotations in incident window ==="
          psql_cmd -c "
            WITH matched_accounts AS (
              SELECT
                id,
                RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) AS suffix
              FROM llm_accounts
              WHERE llm_name = 'doubao'
                AND RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) IN (${sql_suffixes})
            )
            SELECT
              '[phone ending ' || ma.suffix || ']' AS phone_suffix,
              arl.account_id,
              arl.reason,
              arl.rotated_at
            FROM account_rotation_logs arl
            JOIN matched_accounts ma ON ma.id = arl.account_id
            WHERE arl.rotated_at BETWEEN TIMESTAMP '${since_sql}' AND TIMESTAMP '${until_sql}'
            ORDER BY arl.rotated_at, arl.account_id;
          " | tee "${artifact_dir}/doubao-account-rotations.txt" || true

          echo "=== Doubao query rows for matched accounts in incident window ==="
          psql_cmd -c "
            WITH matched_accounts AS (
              SELECT
                id,
                RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) AS suffix
              FROM llm_accounts
              WHERE llm_name = 'doubao'
                AND RIGHT(REGEXP_REPLACE(COALESCE(phone_number, ''), '[^0-9]', '', 'g'), 4) IN (${sql_suffixes})
            )
            SELECT
              q.id AS query_id,
              '[phone ending ' || ma.suffix || ']' AS phone_suffix,
              q.target_llm,
              q.status,
              q.queued_at,
              q.started_at,
              q.finished_at,
              q.retry_count,
              COALESCE(q.retry_reason, '') AS retry_reason
            FROM queries q
            JOIN matched_accounts ma ON ma.id = q.account_id
            WHERE COALESCE(q.started_at, q.finished_at, q.queued_at, q.created_at)
                  BETWEEN TIMESTAMP '${since_sql}' AND TIMESTAMP '${until_sql}'
            ORDER BY COALESCE(q.started_at, q.finished_at, q.queued_at, q.created_at), q.id;
          " | tee "${artifact_dir}/doubao-query-rows.txt" || true

          echo "=== Doubao account health snapshot ==="
          psql_cmd -c "
            SELECT
              llm_name,
              status,
              COUNT(*) AS accounts,
              COUNT(*) FILTER (WHERE cookies_json IS NOT NULL AND cookies_json <> '') AS with_cookies,
              COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
              SUM(query_count_today) AS query_count_today,
              SUM(daily_limit) AS daily_limit,
              MAX(consecutive_fails) AS max_consecutive_fails
            FROM llm_accounts
            WHERE llm_name = 'doubao'
            GROUP BY llm_name, status
            ORDER BY llm_name, status;
          " | tee "${artifact_dir}/doubao-account-health.txt" || true

          echo "=== Current Doubao SMS blacklist suffix snapshot ==="
          blacklist_file="${artifact_dir}/doubao-blacklist-snapshot.txt"
          : > "${blacklist_file}"
          while IFS= read -r key; do
            digits="$(printf '%s' "${key}" | tr -cd '0-9')"
            if [ "${#digits}" -lt 4 ]; then
              continue
            fi
            suffix="${digits:$((${#digits} - 4)):4}"
            case ",${normalized_suffixes}," in
              *",${suffix},"*) ;;
              *) continue ;;
            esac
            ttl="$(docker compose exec -T redis redis-cli -n 0 TTL "${key}" | tr -d '\r' || true)"
            value="$(docker compose exec -T redis redis-cli -n 0 GET "${key}" | tr -d '\r' | sanitize_herosms_stream || true)"
            line="key=sms_blacklist:doubao:[phone ending ${suffix}] ttl_seconds=${ttl} reason=${value}"
            printf '%s\n' "${line}"
            printf '%s\n' "${line}" >> "${blacklist_file}"
          done < <(docker compose exec -T redis redis-cli -n 0 --scan --pattern 'sms_blacklist:doubao:*' || true)

          echo "=== Current queue lengths ==="
          queue_file="${artifact_dir}/queue-lengths.txt"
          : > "${queue_file}"
          for q in celery llm_chatgpt llm_gemini llm_doubao llm_deepseek account_login analysis beat; do
            queue_len="$(docker compose exec -T redis redis-cli -n 0 LLEN "$q" | tr -d '\r' || true)"
            line="${q}=${queue_len}"
            printf '%s\n' "${line}"
            printf '%s\n' "${line}" >> "${queue_file}"
          done

          echo "=== Celery worker inspect snapshot ==="
          timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect active || true
          timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect reserved || true

          echo "=== Sanitized Doubao incident logs ==="
          journalctl -u docker --since "${since_sql} UTC" --until "${until_sql} UTC" --no-pager -n 400 2>&1 | sanitize_herosms_stream | tee "${artifact_dir}/journal-docker-window.txt" || true
          docker compose logs --since "${since_iso}Z" --until "${until_iso}Z" worker worker-analysis beat backend nginx 2>&1 | sanitize_herosms_stream | tee "${artifact_dir}/compose-window.log" || true

          echo "=== Sanitized current worker tail ==="
          docker compose logs --tail=320 worker worker-analysis beat 2>&1 | sanitize_herosms_stream | tee "${artifact_dir}/compose-current-tail.log" || true
          REMOTE
          ssh_status=${PIPESTATUS[0]}
          set -e

          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/genpano_doubao_sms_forensics_${GH_RUN_ID}.tar.gz" \
            doubao-sms-forensics-artifacts/ || true
          if [ -f "doubao-sms-forensics-artifacts/genpano_doubao_sms_forensics_${GH_RUN_ID}.tar.gz" ]; then
            tar -tzf "doubao-sms-forensics-artifacts/genpano_doubao_sms_forensics_${GH_RUN_ID}.tar.gz" \
              | tee doubao-sms-forensics-artifacts/artifact-manifest.txt
          fi
          exit "${ssh_status}"

      - name: Upload Doubao SMS forensics artifacts
        if: ${{ always() && inputs.scraper_mode == 'doubao_sms_forensics' }}
        uses: actions/upload-artifact@v4
        with:
          name: doubao-sms-forensics-${{ github.run_id }}
          path: doubao-sms-forensics-artifacts
          if-no-files-found: error

      - name: Run ChatGPT SMS env check
        if: ${{ inputs.scraper_mode == 'chatgpt_sms_env_check' }}
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh hero-sms-env-artifacts
          chmod 700 ~/.ssh
          printf '%s' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new "${SERVER_USER}@${SERVER_HOST}" <<'REMOTE' | tee hero-sms-env-artifacts/runtime-env.json
          set -Eeuo pipefail
          cd /opt/genpano
          docker compose exec -T worker python - <<'PY'
          import json
          import os

          print(json.dumps({
              "HERO_SMS_API_KEY_present": bool(os.getenv("HERO_SMS_API_KEY")),
              "country": "187",
              "countPhysical": None,
              "operator": "physic",
              "price_bucket": "usd<=0.60",
              "purchaseAttempted": False,
              "purchaseEndpointsCalled": False,
              "readOnly": True,
              "runtime_service": "worker",
              "service": "dr",
          }, sort_keys=True))
          PY
          REMOTE

      - name: Upload ChatGPT SMS env diagnostic
        if: ${{ always() && inputs.scraper_mode == 'chatgpt_sms_env_check' }}
        uses: actions/upload-artifact@v4
        with:
          name: hero-sms-env-${{ github.run_id }}
          path: hero-sms-env-artifacts/runtime-env.json
          if-no-files-found: error

      - name: Run exact query status diagnostics
        if: ${{ inputs.scraper_mode == 'query_status' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/genpano
            QUERY_IDS='${{ inputs.brand_query }}'
            QUERY_IDS="${QUERY_IDS#"${QUERY_IDS%%[![:space:]]*}"}"
            QUERY_IDS="${QUERY_IDS%"${QUERY_IDS##*[![:space:]]}"}"
            if ! [[ "${QUERY_IDS}" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "ERROR: query_status mode expects brand_query as comma-separated query ids, got '${QUERY_IDS}'" >&2
              exit 1
            fi

            echo "=== Exact query readback ==="
            docker compose exec -T postgres psql -U genpano -d genpano -P pager=off -c "
              WITH selected_queries AS (
                SELECT *
                FROM queries
                WHERE id IN (${QUERY_IDS})
              ),
              response_rollup AS (
                SELECT
                  r.query_id,
                  COUNT(*) AS response_count,
                  MAX(r.id) AS latest_response_id,
                  MAX(LENGTH(COALESCE(r.raw_text, ''))) AS latest_response_len,
                  BOOL_OR(COALESCE(r.screenshot_path, '') <> '') AS screenshot_present,
                  MAX(r.collected_at) AS latest_collected_at,
                  MAX(r.analysis_status) AS latest_response_analysis_status
                FROM llm_responses r
                WHERE r.query_id IN (${QUERY_IDS})
                GROUP BY r.query_id
              ),
              analysis_rollup AS (
                SELECT
                  r.query_id,
                  COUNT(ra.id) AS analysis_count
                FROM llm_responses r
                LEFT JOIN response_analyses ra ON ra.response_id = r.id
                WHERE r.query_id IN (${QUERY_IDS})
                GROUP BY r.query_id
              )
              SELECT
                q.id AS query_id,
                q.brand_id,
                q.profile_id,
                q.target_llm,
                q.status,
                q.retry_reason,
                q.retry_count,
                q.account_id,
                a.status AS account_status,
                (COALESCE(a.cookies_json, '') <> '') AS account_has_cookies,
                a.query_count_today AS account_query_count_today,
                a.daily_limit AS account_daily_limit,
                q.queued_at,
                q.started_at,
                q.finished_at,
                q.latency_ms,
                COALESCE(rr.response_count, 0) AS response_count,
                rr.latest_response_id,
                rr.latest_response_len,
                COALESCE(rr.screenshot_present, FALSE) AS screenshot_present,
                rr.latest_collected_at,
                rr.latest_response_analysis_status,
                COALESCE(ar.analysis_count, 0) AS analysis_count,
                CASE
                  WHEN COALESCE(rr.response_count, 0) > 0 THEN 'HAS_RESPONSE_REVIEW_ARTIFACTS'
                  ELSE 'NO_RESPONSE_ROW'
                END AS evidence_state
              FROM selected_queries q
              LEFT JOIN llm_accounts a ON a.id = q.account_id
              LEFT JOIN response_rollup rr ON rr.query_id = q.id
              LEFT JOIN analysis_rollup ar ON ar.query_id = q.id
              ORDER BY q.id;
            "

            echo "=== Doubao account availability for affected profiles ==="
            docker compose exec -T postgres psql -U genpano -d genpano -P pager=off -c "
              WITH affected_profiles AS (
                SELECT DISTINCT q.profile_id::text AS profile_id
                FROM queries q
                WHERE q.id IN (${QUERY_IDS}) AND q.profile_id IS NOT NULL
              )
              SELECT
                ap.profile_id,
                a.id AS account_id,
                a.status,
                (COALESCE(a.cookies_json, '') <> '') AS has_cookies,
                a.query_count_today,
                a.daily_limit,
                a.cooldown_until,
                EXISTS (
                  SELECT 1
                  FROM account_profile_map apm
                  WHERE apm.account_id = a.id
                    AND apm.profile_id = ap.profile_id
                ) AS explicit_profile_binding,
                (a.profile_id::text = ap.profile_id) AS legacy_profile_binding,
                (
                  a.status = 'active'
                  AND COALESCE(a.cookies_json, '') <> ''
                  AND (a.cooldown_until IS NULL OR a.cooldown_until <= NOW())
                  AND COALESCE(a.daily_limit, 0) > 0
                  AND COALESCE(a.query_count_today, 0) < a.daily_limit
                ) AS executable_now
              FROM affected_profiles ap
              JOIN llm_accounts a
                ON a.llm_name = 'doubao'
               AND (
                 EXISTS (
                   SELECT 1
                   FROM account_profile_map apm
                   WHERE apm.account_id = a.id
                     AND apm.profile_id = ap.profile_id
                 )
                 OR a.profile_id::text = ap.profile_id
               )
              ORDER BY ap.profile_id, executable_now DESC, a.status, a.id;
            "

            echo "=== Doubao account summary ==="
            docker compose exec -T postgres psql -U genpano -d genpano -P pager=off -c "
              SELECT
                llm_name,
                status,
                COUNT(*) AS accounts,
                COUNT(*) FILTER (WHERE COALESCE(cookies_json, '') <> '') AS with_cookies,
                COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
                SUM(query_count_today) AS query_count_today,
                SUM(daily_limit) AS daily_limit,
                MAX(consecutive_fails) AS max_consecutive_fails
              FROM llm_accounts
              WHERE llm_name = 'doubao'
              GROUP BY llm_name, status
              ORDER BY status;
            "

      - name: Run read-only diagnostics
        if: ${{ inputs.scraper_mode == 'diagnostics' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLASH_API_SECRET: ${{ secrets.CLASH_API_SECRET || vars.CLASH_API_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CLASH_API_SECRET
          script: |
            set -euo pipefail
            cd /opt/genpano
            BRAND_ID='${{ inputs.brand_id }}'
            BRAND_QUERY='${{ inputs.brand_query }}'
            PROJECT_ID='${{ inputs.project_id }}'
            fail() {
              echo "ERROR: $*" >&2
              exit 1
            }
            sanitizer_dir="$(mktemp -d /tmp/genpano_server_diagnostics_sanitizer.XXXXXX)"
            sanitizer_py="${sanitizer_dir}/sanitize_herosms_logs.py"
            trap 'rm -rf "${sanitizer_dir}"' EXIT
            cat > "${sanitizer_py}" <<'PY'
            from __future__ import annotations

            import re
            import sys
            from pathlib import Path

            HEROSMS_HANDLER_URL_RE = re.compile(
                r"(?i)https?://[^\s\"'<>]*handler_api\.php[^\s\"'<>]*"
            )
            SECRET_ASSIGN_RE = re.compile(
                r"(?ix)"
                r"\b("
                r"api[_-]?key|apikey|"
                r"access[_-]?token|refresh[_-]?token|token|secret|"
                r"authorization|auth|cookie|set[_-]?cookie"
                r")\s*[:=]\s*"
                r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
            )
            HERO_SMS_ENV_RE = re.compile(r"(?i)\bHERO_SMS_API_KEY\s*=\s*\S+")
            AUTH_HEADER_RE = re.compile(r"(?i)\b(authorization|auth)\s*:\s*(?:bearer\s+)?[^\s;]+")
            COOKIE_HEADER_RE = re.compile(r"(?i)\b(cookie|set-cookie)\s*:\s*[^;\r\n]+;?")
            PHONE_FIELD_RE = re.compile(
                r"(?ix)"
                r"\b(phone(?:[_-]?number)?|msisdn|mobile|number)\s*[:=]\s*"
                r"\+?\d[\d\s().-]{7,}\d"
            )
            E164_PHONE_RE = re.compile(r"(?<![\w])\+?\d{10,15}(?![\w])")
            SMS_FIELD_RE = re.compile(
                r"(?ix)"
                r"\b(sms(?:[_-]?(?:text|body|message|code))?|text|body|message|code)"
                r"\s*[:=]\s*"
                r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
            )
            ACTIVATION_FIELD_RE = re.compile(
                r"(?ix)"
                r"\b(activation[_-]?(?:id|ref|secret|code)|activationid)\s*[:=]\s*"
                r"(?:\"[^\"]*\"|'[^']*'|[^&\s\"'<>]+)"
            )

            def _redact_assignment(marker: str):
                def replace(match: re.Match[str]) -> str:
                    return f"{match.group(1)}={marker}"

                return replace

            def _redact_header(match: re.Match[str]) -> str:
                return f"{match.group(1)}: [secret redacted]"

            def sanitize_text(text: str) -> str:
                sanitized = HEROSMS_HANDLER_URL_RE.sub("[HeroSMS URL redacted]", text)
                sanitized = AUTH_HEADER_RE.sub(_redact_header, sanitized)
                sanitized = COOKIE_HEADER_RE.sub(_redact_header, sanitized)
                sanitized = SECRET_ASSIGN_RE.sub(_redact_assignment("[secret redacted]"), sanitized)
                sanitized = HERO_SMS_ENV_RE.sub("HERO_SMS_API_KEY_present=true", sanitized)
                sanitized = PHONE_FIELD_RE.sub(_redact_assignment("[phone redacted]"), sanitized)
                sanitized = E164_PHONE_RE.sub("[phone redacted]", sanitized)
                sanitized = SMS_FIELD_RE.sub(_redact_assignment("[SMS field redacted]"), sanitized)
                return ACTIVATION_FIELD_RE.sub(
                    _redact_assignment("[activation field redacted]"),
                    sanitized,
                )

            def sanitize_file(path: Path) -> None:
                text = path.read_text(encoding="utf-8", errors="replace")
                path.write_text(sanitize_text(text), encoding="utf-8")

            def main(argv: list[str]) -> int:
                if argv:
                    for arg in argv:
                        sanitize_file(Path(arg))
                    return 0
                sys.stdout.write(sanitize_text(sys.stdin.read()))
                return 0

            if __name__ == "__main__":
                raise SystemExit(main(sys.argv[1:]))
            PY
            chmod 700 "${sanitizer_py}"
            sanitize_herosms_stream() {
              python3 "${sanitizer_py}"
            }
            sanitizer_probe="$(sanitize_herosms_stream <<'EOF'
            https://hero-sms.example/stubs/handler_api.php?action=getNumber&api_key=selftest-secret&phone=+15551234567
            auth=selftest-auth-short
            Authorization: Bearer selftest-token
            Auth: Bearer selftest-auth-header
            Cookie: session=selftest-cookie
            Set-Cookie: hero=selftest-set-cookie
            sms_text='Your selftest code is 654321'
            activation_ref=selftest-ref activation_secret=selftest-activation-secret activation_code=112233
            EOF
            )"
            case "${sanitizer_probe}" in
              *hero-sms.example*|*handler_api.php*|*api_key=*|*selftest-secret*|*selftest-auth-short*|*selftest-token*|*selftest-auth-header*|*selftest-cookie*|*selftest-set-cookie*|*+15551234567*|*654321*|*selftest-ref*|*selftest-activation-secret*|*112233*)
                fail "HeroSMS sanitizer self-test failed before worker log capture"
                ;;
            esac
            : "${BRAND_ID:=12}"
            : "${BRAND_QUERY:=雅诗兰黛}"
            : "${PROJECT_ID:=95d43022-a5c8-5944-b6d6-34b29faa18b5}"
            if ! [[ "${PROJECT_ID}" =~ ^[0-9A-Fa-f-]{36}$ ]]; then
