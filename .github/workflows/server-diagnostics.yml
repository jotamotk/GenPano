name: Server Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnostics:
    name: Inspect production server
    runs-on: ubuntu-latest

    steps:
      - name: Run read-only diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/genpano

            echo "=== Docker compose status ==="
            docker compose ps

            echo "=== Deployed images ==="
            docker compose images

            echo "=== Worker celery config and runtime ==="
            docker compose exec -T worker python - <<'PY' || true
            from geo_tracker.tasks.celery_tasks import app

            print("worker_concurrency_conf=", app.conf.worker_concurrency)
            print("worker_prefetch_multiplier=", app.conf.worker_prefetch_multiplier)
            print("task_time_limit=", app.conf.task_time_limit)
            print("task_soft_time_limit=", app.conf.task_soft_time_limit)
            print("task_routes=", app.conf.task_routes)
            PY

            echo "=== Worker process snapshot ==="
            docker compose exec -T worker sh -lc \
              "ps -eo pid,ppid,stat,comm,args | grep -Ei 'celery|python|firefox|chrom|camoufox' | grep -v grep | head -120" \
              || true

            echo "=== Celery inspect active queues/stats/active/reserved ==="
            docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect active_queues --timeout=5 || true
            docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect stats --timeout=5 || true
            docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect active --timeout=5 || true
            docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect reserved --timeout=5 || true

            echo "=== Redis queue lengths ==="
            for q in celery llm_chatgpt llm_doubao llm_deepseek llm_gemini account_login analysis beat; do
              printf "%s " "$q"
              docker compose exec -T redis redis-cli LLEN "$q" || true
            done

            echo "=== Account availability by engine/status ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                llm_name,
                status,
                COUNT(*) AS rows,
                COUNT(*) FILTER (
                  WHERE cookies_json IS NOT NULL AND cookies_json <> ''
                ) AS with_cookies,
                COUNT(*) FILTER (
                  WHERE status = 'active'
                    AND cookies_json IS NOT NULL
                    AND cookies_json <> ''
                    AND (cooldown_until IS NULL OR cooldown_until <= NOW())
                    AND query_count_today < daily_limit
                ) AS executable_now,
                COUNT(*) FILTER (
                  WHERE status = 'active'
                    AND cookies_json IS NOT NULL
                    AND cookies_json <> ''
                    AND cooldown_until > NOW()
                ) AS cooling_now,
                COUNT(*) FILTER (
                  WHERE status = 'active'
                    AND cookies_json IS NOT NULL
                    AND cookies_json <> ''
                    AND query_count_today >= daily_limit
                ) AS quota_full,
                COALESCE(SUM(daily_limit), 0) AS daily_limit_total,
                COALESCE(SUM(query_count_today), 0) AS used_today,
                MAX(cooldown_until) AS newest_cooldown_until
              FROM llm_accounts
              GROUP BY llm_name, status
              ORDER BY llm_name, status;
            " || true

            echo "=== Account exclusion details for scheduler engines ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH engines(engine) AS (
                VALUES ('chatgpt'), ('deepseek'), ('doubao'), ('gemini')
              )
              SELECT
                e.engine,
                COUNT(a.id) AS total,
                COUNT(a.id) FILTER (WHERE a.status = 'active') AS active,
                COUNT(a.id) FILTER (
                  WHERE a.cookies_json IS NOT NULL AND a.cookies_json <> ''
                ) AS with_cookies,
                COUNT(a.id) FILTER (
                  WHERE a.status = 'active'
                    AND (a.cookies_json IS NULL OR a.cookies_json = '')
                ) AS active_without_cookies,
                COUNT(a.id) FILTER (
                  WHERE a.status = 'active'
                    AND a.cookies_json IS NOT NULL
                    AND a.cookies_json <> ''
                    AND a.cooldown_until > NOW()
                ) AS active_cooling,
                COUNT(a.id) FILTER (
                  WHERE a.status = 'active'
                    AND a.cookies_json IS NOT NULL
                    AND a.cookies_json <> ''
                    AND a.query_count_today >= a.daily_limit
                ) AS active_quota_full,
                COUNT(a.id) FILTER (
                  WHERE a.status = 'active'
                    AND a.cookies_json IS NOT NULL
                    AND a.cookies_json <> ''
                    AND (a.cooldown_until IS NULL OR a.cooldown_until <= NOW())
                    AND a.query_count_today < a.daily_limit
                ) AS executable_now
              FROM engines e
              LEFT JOIN llm_accounts a ON a.llm_name = e.engine
              GROUP BY e.engine
              ORDER BY e.engine;
            " || true

            echo "=== Recent account rows (masked) ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                id,
                llm_name,
                status,
                CASE
                  WHEN cookies_json IS NULL OR cookies_json = '' THEN false
                  ELSE true
                END AS has_cookies,
                query_count_today,
                daily_limit,
                cooldown_until,
                consecutive_fails,
                profile_id,
                cookies_updated_at,
                last_used_at
              FROM llm_accounts
              WHERE llm_name IN ('chatgpt', 'deepseek', 'doubao', 'gemini')
              ORDER BY llm_name, status, id
              LIMIT 120;
            " || true

            echo "=== Account rotation/failure reasons since midnight UTC ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                a.llm_name,
                l.reason,
                COUNT(*) AS rows,
                MAX(l.rotated_at) AS newest_rotated_at
              FROM account_rotation_logs l
              LEFT JOIN llm_accounts a ON a.id = l.account_id
              WHERE l.rotated_at >= date_trunc('day', NOW())
              GROUP BY a.llm_name, l.reason
              ORDER BY rows DESC, a.llm_name, l.reason;
            " || true

            echo "=== Query failure/status distribution last 6h ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                target_llm,
                status,
                COALESCE(retry_reason, '') AS retry_reason,
                COUNT(*) AS rows,
                MIN(created_at) AS oldest_created_at,
                MAX(started_at) AS newest_started_at,
                MAX(finished_at) AS newest_finished_at
              FROM queries
              WHERE created_at >= NOW() - INTERVAL '6 hours'
                 OR queued_at >= NOW() - INTERVAL '6 hours'
                 OR started_at >= NOW() - INTERVAL '6 hours'
                 OR finished_at >= NOW() - INTERVAL '6 hours'
              GROUP BY target_llm, status, retry_reason
              ORDER BY rows DESC, target_llm, status, retry_reason
              LIMIT 80;
            " || true

            echo "=== Recent query rows ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                id,
                target_llm,
                status,
                account_id,
                retry_reason,
                retry_count,
                queued_at,
                started_at,
                finished_at,
                created_at
              FROM queries
              ORDER BY id DESC
              LIMIT 80;
            " || true

            echo "=== Recent worker logs for accounts/concurrency/failures ==="
            docker compose logs --tail=500 worker 2>&1 \
              | grep -Ei 'acquired account|No available account|no_account_available|cookies_expired|soft_time_limit|Soft time limit|BrowserType.launch|write EPIPE|worker_concurrency|concurrency|Task geo_tracker.tasks.celery_tasks.execute_query|execute_query .*raised|retry:' \
              || true
