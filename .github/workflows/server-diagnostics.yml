name: Server Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnostics:
    name: Inspect production server
    runs-on: ubuntu-latest

    steps:
      - name: Run read-only diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/genpano

            echo "=== Docker compose status ==="
            docker compose ps

            echo "=== Backend email env (password masked) ==="
            docker compose exec -T backend python - <<'PY'
            import os

            keys = [
                "USER_EMAIL_PROVIDER",
                "EMAIL_PROVIDER",
                "USER_EMAIL_FROM",
                "EMAIL_FROM",
                "USER_EMAIL_REPLY_TO",
                "EMAIL_REPLY_TO",
                "ALIYUN_DM_SMTP_USER",
                "ALIYUN_DM_SMTP_HOST",
                "ALIYUN_DM_SMTP_PORT",
                "ALIYUN_DM_SMTP_SSL",
                "ALIYUN_DM_SMTP_STARTTLS",
                "ALIYUN_DM_SMTP_PASSWORD",
                "USER_BASE_URL",
                "FRONTEND_URL",
            ]
            for key in keys:
                value = os.getenv(key, "")
                if "PASSWORD" in key and value:
                    value = "***"
                print(f"{key}={value}")
            PY

            echo "=== Aliyun DM SMTP login probe (no email is sent) ==="
            docker compose exec -T backend python - <<'PY'
            import os
            import smtplib
            import ssl

            def env_bool(name: str, default: bool) -> bool:
                raw = os.getenv(name)
                if raw is None:
                    return default
                return raw.strip().lower() in {"1", "true", "yes", "on"}

            host = os.getenv("ALIYUN_DM_SMTP_HOST", "smtpdm.aliyun.com")
            port = int(os.getenv("ALIYUN_DM_SMTP_PORT", "465"))
            user = os.getenv("ALIYUN_DM_SMTP_USER", "")
            password = os.getenv("ALIYUN_DM_SMTP_PASSWORD", "")
            use_ssl = env_bool("ALIYUN_DM_SMTP_SSL", port == 465)
            use_starttls = env_bool("ALIYUN_DM_SMTP_STARTTLS", not use_ssl)

            print(f"SMTP_TARGET={host}:{port} ssl={use_ssl} starttls={use_starttls} user={user} password_set={bool(password)}")
            try:
                context = ssl.create_default_context()
                if use_ssl:
                    smtp = smtplib.SMTP_SSL(host, port, timeout=15, context=context)
                else:
                    smtp = smtplib.SMTP(host, port, timeout=15)
                    if use_starttls:
                        smtp.starttls(context=context)
                with smtp:
                    smtp.ehlo()
                    smtp.login(user, password)
                print("SMTP_LOGIN_OK")
            except Exception as exc:
                print(f"SMTP_LOGIN_FAIL {type(exc).__name__}: {exc}")
            PY

            echo "=== Recent backend logs ==="
            docker compose logs --tail=220 backend

            echo "=== Query picker diagnostics: bestCoffer counts ==="
            docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -c "
              WITH target_brand AS (
                SELECT id::text AS brand_id, name, name_zh, name_en
                FROM brands
                WHERE LOWER(COALESCE(name, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_zh, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_en, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_zh, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_en, '')) LIKE LOWER('%bestCoffer%')
                ORDER BY id
                LIMIT 5
              ),
              branded_candidates AS (
                SELECT
                  q.id,
                  q.run_id,
                  q.candidate_seq,
                  q.candidate_status,
                  q.rendered_query,
                  q.created_at,
                  COALESCE(
                    q.metadata_json->>'brand_id',
                    q.metadata_json->>'brandId',
                    t.brand_id::text
                  ) AS resolved_brand_id
                FROM query_generation_candidates q
                LEFT JOIN prompts pr ON CAST(pr.id AS TEXT) = q.prompt_id
                LEFT JOIN topics t ON t.id = pr.topic_id
              )
              SELECT
                tb.brand_id,
                COALESCE(tb.name, tb.name_zh, tb.name_en) AS brand_name,
                bc.candidate_status,
                COUNT(*) AS rows
              FROM target_brand tb
              LEFT JOIN branded_candidates bc ON bc.resolved_brand_id = tb.brand_id
              GROUP BY tb.brand_id, brand_name, bc.candidate_status
              ORDER BY tb.brand_id, bc.candidate_status;
            "

            echo "=== Query picker diagnostics: bestCoffer ready page shape ==="
            docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -c "
              WITH target_brand AS (
                SELECT id::text AS brand_id
                FROM brands
                WHERE LOWER(COALESCE(name, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_zh, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_en, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_zh, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_en, '')) LIKE LOWER('%bestCoffer%')
                ORDER BY id
                LIMIT 1
              ),
              branded_ready AS (
                SELECT
                  q.id,
                  q.run_id,
                  q.candidate_seq,
                  q.candidate_status,
                  q.rendered_query,
                  q.created_at,
                  COALESCE(
                    q.metadata_json->>'brand_id',
                    q.metadata_json->>'brandId',
                    t.brand_id::text
                  ) AS resolved_brand_id
                FROM query_generation_candidates q
                LEFT JOIN prompts pr ON CAST(pr.id AS TEXT) = q.prompt_id
                LEFT JOIN topics t ON t.id = pr.topic_id
                WHERE q.candidate_status = 'ready'
              )
              SELECT
                COUNT(*) AS ready_total,
                COUNT(*) FILTER (WHERE candidate_seq IS NULL) AS null_seq,
                COUNT(DISTINCT run_id) AS runs,
                MIN(candidate_seq) AS min_seq,
                MAX(candidate_seq) AS max_seq
              FROM branded_ready br
              JOIN target_brand tb ON br.resolved_brand_id = tb.brand_id;
            "

            docker compose exec -T postgres psql -U genpano -d genpano -v ON_ERROR_STOP=1 -c "
              WITH target_brand AS (
                SELECT id::text AS brand_id
                FROM brands
                WHERE LOWER(COALESCE(name, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_zh, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name_en, '')) = LOWER('bestCoffer')
                   OR LOWER(COALESCE(name, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_zh, '')) LIKE LOWER('%bestCoffer%')
                   OR LOWER(COALESCE(name_en, '')) LIKE LOWER('%bestCoffer%')
                ORDER BY id
                LIMIT 1
              ),
              branded_ready AS (
                SELECT
                  q.id,
                  q.run_id,
                  q.candidate_seq,
                  q.rendered_query,
                  COALESCE(
                    q.metadata_json->>'brand_id',
                    q.metadata_json->>'brandId',
                    t.brand_id::text
                  ) AS resolved_brand_id
                FROM query_generation_candidates q
                LEFT JOIN prompts pr ON CAST(pr.id AS TEXT) = q.prompt_id
                LEFT JOIN topics t ON t.id = pr.topic_id
                WHERE q.candidate_status = 'ready'
              )
              SELECT id, run_id, candidate_seq, LEFT(rendered_query, 80) AS query
              FROM branded_ready br
              JOIN target_brand tb ON br.resolved_brand_id = tb.brand_id
              ORDER BY candidate_seq ASC, id ASC
              OFFSET 95
              LIMIT 20;
            "
