name: Server Diagnostics

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "Brand id to inspect"
        required: false
        default: "12"
      brand_query:
        description: "Brand name fragment to inspect"
        required: false
        default: "雅诗兰黛"
      project_id:
        description: "Optional App project UUID to inspect"
        required: false
        default: "95d43022-a5c8-5944-b6d6-34b29faa18b5"

jobs:
  diagnostics:
    name: Inspect production server
    runs-on: ubuntu-latest

    steps:
      - name: Run read-only diagnostics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/genpano
            BRAND_ID='${{ inputs.brand_id }}'
            BRAND_QUERY='${{ inputs.brand_query }}'
            PROJECT_ID='${{ inputs.project_id }}'
            : "${BRAND_ID:=12}"
            : "${BRAND_QUERY:=雅诗兰黛}"
            : "${PROJECT_ID:=95d43022-a5c8-5944-b6d6-34b29faa18b5}"
            if ! [[ "${PROJECT_ID}" =~ ^[0-9A-Fa-f-]{36}$ ]]; then
              echo "Invalid PROJECT_ID input '${PROJECT_ID}', falling back to empty probe"
              PROJECT_ID="00000000-0000-0000-0000-000000000000"
            fi

            echo "=== Docker compose status ==="
            docker compose ps

            echo "=== Incident #475 container image/start details ==="
            docker compose ps -q | xargs -r docker inspect --format '{{.Name}} image={{.Config.Image}} started={{.State.StartedAt}} status={{.State.Status}} restart_count={{.RestartCount}}' || true

            echo "=== Incident #475 sample query rows ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                q.id,
                q.target_llm,
                q.status,
                q.queued_at,
                q.started_at,
                q.finished_at,
                q.latency_ms,
                q.retry_reason,
                q.account_id,
                a.status AS account_status,
                a.consecutive_fails AS account_consecutive_fails,
                a.cooldown_until AS account_cooldown_until,
                a.query_count_today AS account_query_count_today,
                a.daily_limit AS account_daily_limit,
                p.id AS proxy_id,
                p.provider AS proxy_provider,
                p.is_banned AS proxy_is_banned,
                p.cooldown_until AS proxy_cooldown_until,
                p.fail_count AS proxy_fail_count,
                p.success_count AS proxy_success_count
              FROM queries q
              LEFT JOIN llm_accounts a ON a.id = q.account_id
              LEFT JOIN proxies p ON p.id = a.proxy_id
              WHERE q.id IN (184581,184580,184578,184577,184576,184575,184574,184573,184572,184571,184570,184569,184568)
              ORDER BY q.id DESC;
            " || true

            echo "=== Incident #475 failure summary around 2026-05-11 08:07-08:11 UTC ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                q.target_llm,
                q.status,
                COALESCE(q.retry_reason, '') AS retry_reason,
                COUNT(*) AS rows,
                MIN(q.queued_at) AS min_queued_at,
                MIN(q.started_at) AS min_started_at,
                MIN(q.finished_at) AS min_finished_at,
                MAX(q.finished_at) AS max_finished_at,
                ROUND(AVG(q.latency_ms))::int AS avg_latency_ms,
                MAX(q.latency_ms) AS max_latency_ms
              FROM queries q
              WHERE COALESCE(q.started_at, q.finished_at, q.queued_at, q.created_at)
                    BETWEEN TIMESTAMP '2026-05-11 08:07:00'
                        AND TIMESTAMP '2026-05-11 08:11:00'
              GROUP BY q.target_llm, q.status, COALESCE(q.retry_reason, '')
              ORDER BY rows DESC, q.target_llm, retry_reason;
            " || true

            echo "=== Incident #475 account health by engine ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                llm_name,
                status,
                COUNT(*) AS accounts,
                COUNT(*) FILTER (WHERE cookies_json IS NOT NULL AND cookies_json <> '') AS with_cookies,
                COUNT(*) FILTER (WHERE cooldown_until IS NOT NULL AND cooldown_until > NOW()) AS cooling_down,
                SUM(query_count_today) AS query_count_today,
                SUM(daily_limit) AS daily_limit,
                MAX(consecutive_fails) AS max_consecutive_fails
              FROM llm_accounts
              GROUP BY llm_name, status
              ORDER BY llm_name, status;
            " || true

            echo "=== Incident #475 Redis queue lengths ==="
            for q in celery llm_chatgpt llm_gemini llm_doubao llm_deepseek account_login analysis beat; do
              printf '%s=' "$q"
              docker compose exec -T redis redis-cli -n 0 LLEN "$q" || true
            done
            echo "Redis key count:"
            docker compose exec -T redis redis-cli -n 0 DBSIZE || true
            echo "Celery binding keys:"
            docker compose exec -T redis redis-cli -n 0 --scan --pattern '_kombu.binding.*' | sort || true

            echo "=== Incident #475 Celery worker inspect ==="
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect ping || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect active || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect reserved || true
            timeout 20s docker compose exec -T worker celery -A geo_tracker.tasks.celery_tasks inspect stats || true

            echo "=== Incident #475 proxy/vninja/clash state ==="
            systemctl is-active vninja || true
            systemctl status --no-pager -l vninja || true
            ss -ltnp | grep -E ':(6789|9097|9098)\b' || true
            curl -fsS --max-time 5 http://127.0.0.1:9097/configs -H 'Authorization: Bearer set-your-secret' | head -c 2000 || true
            echo
            curl -fsS --max-time 8 --proxy http://127.0.0.1:6789 https://www.gstatic.com/generate_204 -o /dev/null -w 'proxy_generate_204_http_code=%{http_code} total=%{time_total}\n' || true
            docker compose exec -T worker python - <<'PY' || true
            import os
            import socket

            print("CLASH_PROXY_URL=" + str(os.getenv("CLASH_PROXY_URL")))
            print("CLASH_API_URL=" + str(os.getenv("CLASH_API_URL")))
            for host, port in [("host.docker.internal", 6789), ("host.docker.internal", 9098)]:
                try:
                    with socket.create_connection((host, port), timeout=5):
                        print(f"socket_ok {host}:{port}")
                except Exception as exc:
                    print(f"socket_fail {host}:{port} {type(exc).__name__}: {exc}")
            PY

            echo "=== Incident #475 logs around 2026-05-11 08:07-08:11 UTC ==="
            journalctl -u vninja --since '2026-05-11 08:07:00 UTC' --until '2026-05-11 08:11:00 UTC' --no-pager -n 200 || true
            journalctl -u docker --since '2026-05-11 08:07:00 UTC' --until '2026-05-11 08:11:00 UTC' --no-pager -n 200 || true
            docker compose logs --since '2026-05-11T08:07:00' --until '2026-05-11T08:11:00' worker worker-analysis backend nginx || true

            echo "=== Incident #475 current worker logs ==="
            docker compose logs --tail=260 worker worker-analysis beat || true

            echo "=== Brand mention identity probe ==="
            echo "BRAND_ID=${BRAND_ID} BRAND_QUERY=${BRAND_QUERY}"
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, name_zh, name_en
              FROM brands
              WHERE id = ${BRAND_ID}
                 OR LOWER(COALESCE(name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                 OR LOWER(COALESCE(name_zh, '')) LIKE LOWER('%${BRAND_QUERY}%')
                 OR LOWER(COALESCE(name_en, '')) LIKE LOWER('%${BRAND_QUERY}%')
              ORDER BY id
              LIMIT 20;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT brand_id,
                     brand_name,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT response_id) AS responses,
                     SUM(COALESCE(mention_count, 1)) AS mentions,
                     MIN(created_at) AS first_seen,
                     MAX(created_at) AS last_seen
              FROM brand_mentions
              WHERE created_at >= NOW() - INTERVAL '90 days'
                AND (
                  brand_id = ${BRAND_ID}
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%雅思兰黛%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%雅诗兰黛%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%estee%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%estée%')
                  OR LOWER(COALESCE(brand_name, '')) LIKE LOWER('%lauder%')
                )
              GROUP BY brand_id, brand_name
              ORDER BY rows DESC, responses DESC
              LIMIT 40;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT brand_id,
                     brand_name,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT response_id) AS responses,
                     SUM(COALESCE(mention_count, 1)) AS mentions
              FROM brand_mentions
              WHERE created_at >= NOW() - INTERVAL '90 days'
              GROUP BY brand_id, brand_name
              ORDER BY rows DESC
              LIMIT 25;
            " || true

            echo "=== Admin fact brand probe ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, primary_brand_id, industry_id
              FROM projects
              WHERE primary_brand_id = ${BRAND_ID}
                 OR LOWER(COALESCE(name, '')) LIKE LOWER('%${BRAND_QUERY}%')
              ORDER BY name
              LIMIT 20;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH scoped_topics AS (
                SELECT id FROM topics WHERE brand_id = ${BRAND_ID}
              ),
              scoped_prompts AS (
                SELECT p.id FROM prompts p JOIN scoped_topics t ON t.id = p.topic_id
              ),
              scoped_queries AS (
                SELECT q.id FROM queries q JOIN scoped_prompts p ON p.id = q.prompt_id
              ),
              scoped_responses AS (
                SELECT r.id FROM llm_responses r JOIN scoped_queries q ON q.id = r.query_id
              )
              SELECT
                (SELECT COUNT(*) FROM scoped_topics) AS topics,
                (SELECT COUNT(*) FROM scoped_prompts) AS prompts,
                (SELECT COUNT(*) FROM scoped_queries) AS queries,
                (SELECT COUNT(*) FROM scoped_responses) AS responses,
                (SELECT COUNT(*) FROM response_analyses ra JOIN scoped_responses r ON r.id = ra.response_id) AS analyses,
                (SELECT COUNT(*) FROM brand_mentions bm JOIN scoped_responses r ON r.id = bm.response_id) AS response_brand_mentions;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT q.brand_id,
                     COUNT(DISTINCT t.id) AS topics,
                     COUNT(DISTINCT p.id) AS prompts,
                     COUNT(DISTINCT q.id) AS queries,
                     COUNT(DISTINCT r.id) AS responses,
                     COUNT(DISTINCT ra.id) AS analyses
              FROM topics t
              LEFT JOIN prompts p ON p.topic_id = t.id
              LEFT JOIN queries q ON q.prompt_id = p.id
              LEFT JOIN llm_responses r ON r.query_id = q.id
              LEFT JOIN response_analyses ra ON ra.response_id = r.id
              GROUP BY q.brand_id
              ORDER BY responses DESC NULLS LAST, queries DESC NULLS LAST
              LIMIT 20;
            " || true

            echo "=== App project context probe ==="
            echo "BRAND_ID=${BRAND_ID} BRAND_QUERY=${BRAND_QUERY} PROJECT_ID=${PROJECT_ID}"
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH candidate_projects AS (
                SELECT
                  p.id,
                  p.user_id,
                  p.name,
                  p.industry_id,
                  p.primary_brand_id,
                  p.is_active,
                  p.deleted_at,
                  p.created_at,
                  EXISTS (
                    SELECT 1
                    FROM project_competitors pct
                    WHERE pct.project_id = p.id
                      AND pct.brand_id = ${BRAND_ID}
                  ) AS target_as_competitor
                FROM projects p
                WHERE p.id = '${PROJECT_ID}'
                   OR p.primary_brand_id = ${BRAND_ID}
                   OR LOWER(COALESCE(p.name, '')) LIKE LOWER('%${BRAND_QUERY}%')
                   OR EXISTS (
                     SELECT 1
                     FROM project_competitors pct
                     WHERE pct.project_id = p.id
                       AND pct.brand_id = ${BRAND_ID}
                   )
              )
              SELECT
                cp.id,
                cp.user_id,
                cp.name,
                cp.industry_id,
                cp.primary_brand_id,
                cp.is_active,
                cp.deleted_at,
                cp.created_at,
                cp.target_as_competitor,
                COUNT(pc.brand_id) AS competitor_count,
                COALESCE(
                  STRING_AGG(pc.brand_id::text, ',' ORDER BY pc.brand_id),
                  ''
                ) AS competitor_brand_ids
              FROM candidate_projects cp
              LEFT JOIN project_competitors pc ON pc.project_id = cp.id
              GROUP BY
                cp.id,
                cp.user_id,
                cp.name,
                cp.industry_id,
                cp.primary_brand_id,
                cp.is_active,
                cp.deleted_at,
                cp.created_at,
                cp.target_as_competitor
              ORDER BY
                (cp.id = '${PROJECT_ID}') DESC,
                (cp.primary_brand_id = ${BRAND_ID}) DESC,
                cp.deleted_at NULLS FIRST,
                cp.created_at DESC
              LIMIT 50;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT
                pc.project_id,
                p.user_id,
                p.name,
                p.primary_brand_id,
                pc.brand_id AS competitor_brand_id,
                pc.pinned_at,
                pc.pinned_by
              FROM project_competitors pc
              LEFT JOIN projects p ON p.id = pc.project_id
              WHERE pc.project_id = '${PROJECT_ID}'
                 OR pc.brand_id = ${BRAND_ID}
              ORDER BY pc.project_id, pc.brand_id
              LIMIT 50;
            " || true

            echo "=== Raw text brand query probe ==="
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              SELECT id, name, name_zh, name_en
              FROM brands
              WHERE id IN (1, 2, ${BRAND_ID}, 24)
              ORDER BY id;
            " || true
            docker compose exec -T postgres psql -U genpano -d genpano -c "
              WITH hits AS (
                SELECT 'topic' AS source, t.brand_id, t.id AS object_id,
                       NULL::integer AS query_id, NULL::integer AS response_id
                FROM topics t
                WHERE COALESCE(t.text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(t.text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(t.text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(t.text, '') ILIKE '%estee%'
                   OR COALESCE(t.text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'prompt' AS source, q.brand_id, p.id AS object_id,
                       NULL::integer AS query_id, NULL::integer AS response_id
                FROM prompts p
                LEFT JOIN topics t ON t.id = p.topic_id
                LEFT JOIN queries q ON q.prompt_id = p.id
                WHERE COALESCE(p.text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(p.text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(p.text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(p.text, '') ILIKE '%estee%'
                   OR COALESCE(p.text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'query' AS source, q.brand_id, q.id AS object_id,
                       q.id AS query_id, NULL::integer AS response_id
                FROM queries q
                WHERE COALESCE(q.query_text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(q.query_text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(q.query_text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(q.query_text, '') ILIKE '%estee%'
                   OR COALESCE(q.query_text, '') ILIKE '%lauder%'
                UNION ALL
                SELECT 'response' AS source, q.brand_id, r.id AS object_id,
                       q.id AS query_id, r.id AS response_id
                FROM llm_responses r
                LEFT JOIN queries q ON q.id = r.query_id
                WHERE COALESCE(r.raw_text, '') ILIKE '%' || '${BRAND_QUERY}' || '%'
                   OR COALESCE(r.raw_text, '') ILIKE '%雅诗兰黛%'
                   OR COALESCE(r.raw_text, '') ILIKE '%雅思兰黛%'
                   OR COALESCE(r.raw_text, '') ILIKE '%estee%'
                   OR COALESCE(r.raw_text, '') ILIKE '%lauder%'
              )
              SELECT source,
                     brand_id,
                     COUNT(*) AS rows,
                     COUNT(DISTINCT query_id) AS queries,
                     COUNT(DISTINCT response_id) AS responses
              FROM hits
              GROUP BY source, brand_id
              ORDER BY source, rows DESC, brand_id;
            " || true

            echo "=== Recent nginx logs ==="
            docker compose logs --tail=220 nginx || true

            echo "=== Backend email env (password masked) ==="
            docker compose exec -T backend python - <<'PY'
            import os

            keys = [
                "USER_EMAIL_PROVIDER",
                "EMAIL_PROVIDER",
                "USER_EMAIL_FROM",
                "EMAIL_FROM",
                "USER_EMAIL_REPLY_TO",
                "EMAIL_REPLY_TO",
                "ALIYUN_DM_SMTP_USER",
                "ALIYUN_DM_SMTP_HOST",
                "ALIYUN_DM_SMTP_PORT",
                "ALIYUN_DM_SMTP_SSL",
                "ALIYUN_DM_SMTP_STARTTLS",
                "ALIYUN_DM_SMTP_PASSWORD",
                "USER_BASE_URL",
                "FRONTEND_URL",
            ]
            for key in keys:
                value = os.getenv(key, "")
                if "PASSWORD" in key and value:
                    value = "***"
                print(f"{key}={value}")
            PY

            echo "=== Aliyun DM SMTP login probe (no email is sent) ==="
            docker compose exec -T backend python - <<'PY'
            import os
            import smtplib
            import ssl

            def env_bool(name: str, default: bool) -> bool:
                raw = os.getenv(name)
                if raw is None:
                    return default
                return raw.strip().lower() in {"1", "true", "yes", "on"}

            host = os.getenv("ALIYUN_DM_SMTP_HOST", "smtpdm.aliyun.com")
            port = int(os.getenv("ALIYUN_DM_SMTP_PORT", "465"))
            user = os.getenv("ALIYUN_DM_SMTP_USER", "")
            password = os.getenv("ALIYUN_DM_SMTP_PASSWORD", "")
            use_ssl = env_bool("ALIYUN_DM_SMTP_SSL", port == 465)
            use_starttls = env_bool("ALIYUN_DM_SMTP_STARTTLS", not use_ssl)

            print(f"SMTP_TARGET={host}:{port} ssl={use_ssl} starttls={use_starttls} user={user} password_set={bool(password)}")
            try:
                context = ssl.create_default_context()
                if use_ssl:
                    smtp = smtplib.SMTP_SSL(host, port, timeout=15, context=context)
                else:
                    smtp = smtplib.SMTP(host, port, timeout=15)
                    if use_starttls:
                        smtp.starttls(context=context)
                with smtp:
                    smtp.ehlo()
                    smtp.login(user, password)
                print("SMTP_LOGIN_OK")
            except Exception as exc:
                print(f"SMTP_LOGIN_FAIL {type(exc).__name__}: {exc}")
            PY

            echo "=== Recent backend logs ==="
            docker compose logs --tail=220 backend
