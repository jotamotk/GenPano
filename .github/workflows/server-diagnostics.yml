name: Server Diagnostics

on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "Brand id to inspect"
        required: false
        default: "12"
      project_id:
        description: "App project UUID to inspect"
        required: false
        default: "95d43022-a5c8-5944-b6d6-34b29faa18b5"
      from_date:
        description: "Inclusive analytics window start"
        required: false
        default: "2026-04-24"
      to_date:
        description: "Inclusive analytics window end"
        required: false
        default: "2026-05-07"

jobs:
  live-app-analytics-no-fallback-e2e:
    name: Live App analytics no-fallback Playwright E2E
    runs-on: ubuntu-22.04
    timeout-minutes: 24
    permissions:
      contents: read

    env:
      BASE_URL: http://116.62.36.173
      PROJECT_ID: ${{ inputs.project_id }}
      BRAND_ID: ${{ inputs.brand_id }}
      FROM_DATE: ${{ inputs.from_date }}
      TO_DATE: ${{ inputs.to_date }}
      OWNER_USER_ID: fe25eff1-8462-43eb-a027-bc8eb2c3db81
      USER_JWT_SECRET: ${{ secrets.USER_JWT_SECRET || secrets.JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Verify live App analytics APIs and chart states
        working-directory: frontend
        run: |
          node <<'NODE'
          import crypto from 'node:crypto';
          import fs from 'node:fs/promises';
          import { chromium } from '@playwright/test';

          const baseUrl = process.env.BASE_URL;
          const projectId = process.env.PROJECT_ID;
          const brandId = Number(process.env.BRAND_ID || '12');
          const fromDate = process.env.FROM_DATE;
          const toDate = process.env.TO_DATE;
          const userId = process.env.OWNER_USER_ID;
          const secret = process.env.USER_JWT_SECRET || '';
          const competitorId = 2;
          const artifactsDir = 'test-results/live-app-analytics-no-fallback';

          function assert(condition, message) {
            if (!condition) throw new Error(message);
          }

          function lower(value) {
            return String(value || '').toLowerCase();
          }

          function isOkFormula(status) {
            const normalized = lower(status);
            if (!normalized) return true;
            return ['ok', 'valid', 'ready', 'complete', 'computed', 'formula_ok'].includes(normalized);
          }

          function effectiveFormulaStatus(payload) {
            return payload?.formula_status || payload?.formula_diagnostics?.status || null;
          }

          function effectiveFormulaOk(payload) {
            return isOkFormula(effectiveFormulaStatus(payload));
          }

          function isOkState(payload) {
            return lower(payload?.state) === 'ok';
          }

          function isFullyOk(payload) {
            return isOkState(payload) && effectiveFormulaOk(payload);
          }

          function count(payload, key) {
            const value = payload?.evidence_counts?.[key];
            return Number.isFinite(Number(value)) ? Number(value) : 0;
          }

          function listIncludes(payload, needle) {
            const haystack = [
              ...(payload?.missing_inputs || []),
              ...(payload?.missing_sources || []),
              ...(payload?.missing_reasons || []),
              ...(payload?.formula_diagnostics?.pending_sources || []),
              ...(payload?.formula_diagnostics?.details || []),
            ].map((item) => lower(typeof item === 'string' ? item : JSON.stringify(item)));
            return haystack.some((item) => item.includes(lower(needle)));
          }

          function normalizeRatio(value, fields = {}) {
            if (value === null || value === undefined || value === '') return null;
            const raw = Number(value);
            if (!Number.isFinite(raw)) return null;
            const scale = lower(fields.value_scale);
            const unit = lower(fields.unit);
            if (scale === 'percent' || unit === 'percent') return raw / 100;
            if (scale === 'decimal' || unit === 'ratio') return raw;
            return Math.abs(raw) > 1 ? raw / 100 : raw;
          }

          function pointMap(points = []) {
            const out = new Map();
            for (const point of points || []) {
              if (point?.date && point?.value !== null && point?.value !== undefined) {
                out.set(point.date, Number(point.value));
              }
            }
            return out;
          }

          function summarizeContract(name, payload) {
            const summary = {
              state: payload?.state,
              state_reason: payload?.state_reason,
              formula_status: effectiveFormulaStatus(payload),
              evidence_count: payload?.evidence_count,
              evidence_counts: payload?.evidence_counts,
              missing_inputs: payload?.missing_inputs,
              missing_sources: payload?.missing_sources,
              items: Array.isArray(payload?.items) ? payload.items.length : undefined,
              points: Array.isArray(payload?.points) ? payload.points.length : undefined,
              rows: Array.isArray(payload?.rows) ? payload.rows.length : undefined,
              series: Array.isArray(payload?.series)
                ? payload.series.map((item) => ({
                    metric: item.metric,
                    state: item.state,
                    formula_status: item.formula_status,
                    points: Array.isArray(item.points) ? item.points.length : 0,
                    missing_inputs: item.missing_inputs,
                  }))
                : undefined,
              kpis: Array.isArray(payload?.kpi_cards)
                ? payload.kpi_cards.map((item) => ({
                    key: item.metric_key,
                    value: item.value,
                    unit: item.unit,
                    value_scale: item.value_scale,
                    formula_status: item.formula_status,
                  }))
                : undefined,
            };
            console.log(`CONTRACT_SUMMARY ${name} ${JSON.stringify(summary)}`);
          }

          function requireContract(name, payload) {
            if (!payload || typeof payload !== 'object') {
              throw new Error(`${name} returned non-object payload`);
            }
            if ('state' in payload) {
              assert(['ok', 'empty', 'partial'].includes(lower(payload.state)), `${name} returned invalid state ${payload.state}`);
              if (isOkState(payload)) {
                assert(effectiveFormulaOk(payload), `${name} state=ok but formula_status=${effectiveFormulaStatus(payload)}`);
              } else {
                assert(
                  payload.state_reason ||
                    (payload.missing_inputs || []).length ||
                    (payload.missing_sources || []).length ||
                    (payload.formula_diagnostics?.details || []).length,
                  `${name} is non-ok without an evidence explanation`,
                );
              }
            }
          }

          function jsonB64(value) {
            return Buffer.from(JSON.stringify(value)).toString('base64url');
          }

          function signJwt() {
            const now = Math.floor(Date.now() / 1000);
            const header = { alg: 'HS256', typ: 'JWT' };
            const payload = {
              sub: userId,
              email: 'app-analytics-e2e@example.invalid',
              iat: now,
              exp: now + 30 * 60,
              iss: 'genpano',
              aud: 'genpano-user-access',
            };
            const body = `${jsonB64(header)}.${jsonB64(payload)}`;
            const signature = crypto.createHmac('sha256', secret).update(body).digest('base64url');
            return `${body}.${signature}`;
          }

          assert(baseUrl, 'BASE_URL is required');
          assert(projectId, 'PROJECT_ID is required');
          assert(userId, 'OWNER_USER_ID is required');
          assert(Buffer.byteLength(secret, 'utf8') >= 32, 'USER_JWT_SECRET/JWT_SECRET is missing or too short');

          const token = signJwt();
          console.log('::add-mask::' + token);

          async function api(name, path) {
            const response = await fetch(`${baseUrl}${path}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/json',
                'Accept-Language': 'zh-CN,zh;q=0.9',
              },
            });
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`${name} ${path} -> HTTP ${response.status}: ${text.slice(0, 800)}`);
            }
            const payload = text ? JSON.parse(text) : null;
            summarizeContract(name, payload);
            requireContract(name, payload);
            return payload;
          }

          const dateParams = `from=${encodeURIComponent(fromDate)}&to=${encodeURIComponent(toDate)}`;
          const brandDateParams = `${dateParams}&brand_id=${brandId}`;

          const me = await api('auth_me', '/api/auth/me');
          assert(me.id === userId, `auth/me returned unexpected user ${me.id}`);
          assert(me.needs_onboarding !== true && me.needsOnboarding !== true, 'owner user still needs onboarding');

          const projects = await api('projects', '/api/v1/projects/');
          const projectItems = Array.isArray(projects?.items) ? projects.items : [];
          assert(
            projectItems.some((project) => project.id === projectId && Number(project.primary_brand_id) === brandId),
            'approved Estee Lauder project is not visible to owner user',
          );

          const overview = await api('overview', `/api/v1/projects/${projectId}/overview?brand_id=${brandId}`);
          const metrics = await api('metrics', `/api/v1/projects/${projectId}/metrics?series=mention_rate,sov,rank,sentiment,citation&${brandDateParams}`);
          const byEngine = await api('metrics_by_engine', `/api/v1/projects/${projectId}/metrics/by-engine?${dateParams}`);
          const position = await api('position_distribution', `/api/v1/projects/${projectId}/position-distribution?${dateParams}`);
          const competitors = await api('competitors_metrics', `/api/v1/projects/${projectId}/competitors/metrics?${brandDateParams}`);
          const competitorTrends = await api('competitors_trends_geo', `/api/v1/projects/${projectId}/competitors/trends?metric=geo_score&${brandDateParams}`);
          const topicMonitoring = await api('topics_monitoring', `/api/v1/projects/${projectId}/topics/monitoring?${brandDateParams}`);
          const queryActivity = await api('query_activity', `/api/v1/projects/${projectId}/query-activity?${brandDateParams}`);
          const heatmapMention = await api('topic_heatmap_mention', `/api/v1/projects/${projectId}/topic-heatmap?metric=mention_rate&compare_with=${competitorId}&top_n=10&${dateParams}`);
          const heatmapSentiment = await api('topic_heatmap_sentiment', `/api/v1/projects/${projectId}/topic-heatmap?metric=sentiment&compare_with=${competitorId}&top_n=10&${dateParams}`);
          const sentiment = await api('sentiment', `/api/v1/projects/${projectId}/sentiment?${dateParams}`);
          const sentimentByEngine = await api('sentiment_by_engine', `/api/v1/projects/${projectId}/sentiment/by-engine?${dateParams}`);
          const sentimentTrend = await api('sentiment_trend_by_engine', `/api/v1/projects/${projectId}/sentiment/trend-by-engine?${dateParams}`);
          const sentimentAttribution = await api('sentiment_topic_attribution', `/api/v1/projects/${projectId}/sentiment/topic-attribution?limit=10&${dateParams}`);
          const mentionSamples = await api('mention_samples', `/api/v1/projects/${projectId}/mention-samples?limit=20&${dateParams}`);
          const citations = await api('citations', `/api/v1/projects/${projectId}/citations?page_size=20&${dateParams}`);
          const citationComposition = await api('citations_composition', `/api/v1/projects/${projectId}/citations/composition?${dateParams}`);
          const citationAuthorityTrend = await api('citations_authority_trend', `/api/v1/projects/${projectId}/citations/authority-trend?${dateParams}`);
          const citationContentGap = await api('citations_content_gap', `/api/v1/projects/${projectId}/citations/content-gap?limit=12&${dateParams}`);

          assert(overview.project_scope?.primary_brand_id === brandId, 'overview project_scope primary_brand_id mismatch');
          assert((overview.project_scope?.competitor_brand_ids || []).includes(competitorId), 'overview project_scope is missing configured competitor brand 2');
          const overviewMentionResponses =
            count(overview, 'brand_mentioned_response_count') ||
            Number(overview.identity_diagnostics?.brand_mentioned_response_count || 0);
          assert(overviewMentionResponses > 0, 'overview has no target brand mentioned response evidence');

          const overviewCompetitiveMentions = count(overview, 'competitive_mention_count');
          if (overviewCompetitiveMentions <= 0) {
            assert(!isFullyOk(overview), 'overview is fully ok without competitive mention evidence for SoV');
          }

          const kpiCards = Array.isArray(overview.kpi_cards) ? overview.kpi_cards : [];
          const cardByKey = new Map(kpiCards.map((card) => [card.metric_key, card]));
          const mentionCard = cardByKey.get('mention_rate');
          const sovCard = cardByKey.get('sov');
          const sentimentCard = cardByKey.get('sentiment') || cardByKey.get('avg_sentiment');
          assert(mentionCard, 'overview is missing mention_rate KPI contract');
          assert(sovCard, 'overview is missing SoV KPI contract');
          assert(sentimentCard, 'overview is missing sentiment KPI contract');
          if (isFullyOk(overview) && isOkFormula(sovCard.formula_status)) {
            const sovValue = normalizeRatio(sovCard.value, sovCard);
            assert(sovValue !== null && sovValue < 0.999, `overview SoV KPI is still effectively 100%: ${sovCard.value}`);
          }

          const seriesByMetric = new Map((metrics.series || []).map((series) => [series.metric, series]));
          for (const required of ['mention_rate', 'sov', 'rank', 'sentiment', 'citation']) {
            assert(seriesByMetric.has(required), `metrics endpoint missing series ${required}`);
          }
          const mentionSeries = seriesByMetric.get('mention_rate');
          const sovSeries = seriesByMetric.get('sov');
          const citationSeries = seriesByMetric.get('citation');
          for (const point of mentionSeries.points || []) {
            const value = normalizeRatio(point.value, mentionSeries);
            assert(value === null || value <= 1, `mention_rate point exceeds 1 after normalization: ${point.value}`);
          }
          if (isFullyOk(sovSeries) && (sovSeries.points || []).length) {
            const normalized = sovSeries.points.map((point) => normalizeRatio(point.value, sovSeries)).filter((value) => value !== null);
            assert(!normalized.every((value) => value >= 0.999), `SoV series is still effectively 100%: ${JSON.stringify(normalized)}`);
          } else {
            assert(
              listIncludes(sovSeries, 'competitive') || listIncludes(metrics, 'competitive'),
              'SoV is not ok but does not explain missing competitive-set evidence',
            );
          }

          const citationEvidence = Math.max(
            count(overview, 'citation_source_count'),
            count(metrics, 'citation_source_count'),
            Number(citations.total || 0),
            Number(citations.evidence_count || 0),
            Number(citationComposition.total || 0),
            Number(citationComposition.evidence_count || 0),
          );
          if (citationEvidence <= 0) {
            assert(!isFullyOk(citations), 'citations endpoint is fully ok despite zero citation_sources evidence');
            assert(listIncludes(citations, 'citation'), 'citations endpoint does not identify citation_sources as missing');
            assert(
              !isFullyOk(citationSeries) || !(citationSeries.points || []).length,
              `citation metric series is ok/populated despite zero citation source evidence: ${JSON.stringify(citationSeries)}`,
            );
          }

          assert(byEngine.items?.length > 0 || !isFullyOk(byEngine), 'by-engine chart has no rows while fully ok');
          for (const row of byEngine.items || []) {
            for (const key of ['mention_rate', 'sov', 'citation_rate']) {
              const value = normalizeRatio(row[key]);
              assert(value === null || value <= 1, `${key} exceeds 1 for engine ${row.engine}: ${row[key]}`);
            }
          }

          assert(position.total_mentions > 0 || !isFullyOk(position), 'position distribution has no mentions while fully ok');
          assert(competitors.primary || !isFullyOk(competitors), 'competitors/metrics has no primary row while fully ok');
          assert((competitors.competitors || []).length >= 1 || !isFullyOk(competitors), 'competitors/metrics has no competitor rows while fully ok');

          const trendHasPoints = (competitorTrends.series || []).some((series) =>
            (series.points || []).some((point) => point.value !== null && point.value !== undefined),
          );
          assert(trendHasPoints || !isFullyOk(competitorTrends), 'PANO/GEO trend is fully ok but has no points');

          const metricsSovMap = pointMap(sovSeries?.points || []);
          const overviewSovMap = pointMap(overview.sov_30d || []);
          if (isFullyOk(overview) && isFullyOk(sovSeries) && metricsSovMap.size && overviewSovMap.size) {
            for (const [day, metricValue] of metricsSovMap) {
              if (!overviewSovMap.has(day)) continue;
              const overviewValue = Number(overviewSovMap.get(day));
              const normalizedMetric = normalizeRatio(metricValue, sovSeries);
              const normalizedOverview = normalizeRatio(overviewValue);
              assert(
                Math.abs(normalizedMetric - normalizedOverview) <= 0.015,
                `overview vs visibility SoV mismatch on ${day}: overview=${overviewValue}, metrics=${metricValue}`,
              );
            }
          }

          const topicSummary = topicMonitoring.summary || {};
          if (isFullyOk(topicMonitoring)) {
            assert(Number(topicSummary.topic_count || 0) > 0, 'topics monitoring ok but topic_count=0');
            assert(Number(topicSummary.prompt_count || 0) > 0, 'topics monitoring ok but prompt_count=0');
            assert(Number(topicSummary.query_count || 0) > 0, 'topics monitoring ok but query_count=0');
            assert(Number(topicSummary.response_count || 0) > 0, 'topics monitoring ok but response_count=0');
          }
          assert((queryActivity.totals?.queries || 0) > 0 || !isFullyOk(queryActivity), 'query activity ok but no queries');
          assert((queryActivity.totals?.responses || 0) > 0 || !isFullyOk(queryActivity), 'query activity ok but no responses');

          const topicWithPrompts = (topicMonitoring.topics || []).find((topic) => Number(topic.prompt_count || 0) > 0);
          if (topicWithPrompts) {
            const promptPayload = await api(
              'topic_prompts_sample',
              `/api/v1/projects/${projectId}/topics/${topicWithPrompts.topic_id}/prompts?${brandDateParams}`,
            );
            assert(promptPayload.total > 0, `topic ${topicWithPrompts.topic_id} has prompt_count but prompts endpoint returned none`);
            const promptWithQueries = (promptPayload.items || []).find((prompt) => Number(prompt.query_count || 0) > 0);
            assert(promptWithQueries, `topic ${topicWithPrompts.topic_id} prompts endpoint has no prompt with query_count`);
            const queriesPayload = await api(
              'prompt_queries_sample',
              `/api/v1/projects/${projectId}/prompts/${promptWithQueries.prompt_id}/queries?${brandDateParams}`,
            );
            assert(queriesPayload.total > 0, `prompt ${promptWithQueries.prompt_id} has query_count but queries endpoint returned none`);
          } else if (isFullyOk(topicMonitoring)) {
            throw new Error('topics monitoring is fully ok but no topic exposes prompt/query evidence');
          }

          for (const [name, heatmap] of [
            ['mention heatmap', heatmapMention],
            ['sentiment heatmap', heatmapSentiment],
          ]) {
            const uniqueBrands = new Set((heatmap.rows || []).map((row) => row.brand_id));
            const uniqueTopics = new Set(
              (heatmap.rows || []).flatMap((row) => (row.values || []).map((cell) => cell.topic_id)),
            );
            if (isFullyOk(heatmap)) {
              assert(uniqueBrands.size >= 2, `${name} is ok but collapsed to ${uniqueBrands.size} brand row(s)`);
              assert(uniqueTopics.size >= 2, `${name} is ok but collapsed to ${uniqueTopics.size} topic(s)`);
            } else {
              assert(
                (heatmap.missing_inputs || []).length ||
                  (heatmap.missing_sources || []).length ||
                  heatmap.state_reason,
                `${name} is non-ok without missing evidence metadata`,
              );
            }
          }

          const sentimentTotal =
            Number(sentiment.distribution?.positive_count || 0) +
            Number(sentiment.distribution?.neutral_count || 0) +
            Number(sentiment.distribution?.negative_count || 0);
          assert(sentimentTotal > 0 || !isFullyOk(sentiment), 'sentiment endpoint fully ok but distribution has zero evidence');
          assert((sentimentByEngine.items || []).length > 0 || !isFullyOk(sentimentByEngine), 'sentiment by-engine fully ok but empty');
          assert((sentimentTrend.items || []).length > 0 || !isFullyOk(sentimentTrend), 'sentiment trend fully ok but empty');
          assert((mentionSamples.items || []).length > 0 || !isFullyOk(mentionSamples), 'mention samples fully ok but empty');
          if ((sentiment.top_drivers || []).length === 0) {
            assert(
              !isFullyOk(sentiment) || listIncludes(sentiment, 'sentiment_drivers'),
              'sentiment endpoint is fully ok while sentiment driver evidence is absent',
            );
          }
          if (isFullyOk(sentimentAttribution)) {
            assert((sentimentAttribution.items || []).length > 0, 'sentiment topic attribution fully ok but empty');
          }

          if (citationEvidence <= 0) {
            for (const [name, payload] of [
              ['citation composition', citationComposition],
              ['citation authority trend', citationAuthorityTrend],
            ]) {
              assert(!isFullyOk(payload), `${name} is fully ok despite zero citation_sources evidence`);
            }
          }
          if (isFullyOk(citationContentGap)) {
            assert((citationContentGap.topics || []).length > 0, 'citation content gap fully ok but no topics');
          }

          await fs.mkdir(artifactsDir, { recursive: true });
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          const failedResponses = [];
          const runtimeErrors = [];
          page.on('response', (response) => {
            const url = response.url();
            const status = response.status();
            if (url.includes('/api/') && (status === 401 || status >= 500)) {
              failedResponses.push(`${status} ${url}`);
            }
          });
          page.on('pageerror', (error) => runtimeErrors.push(`pageerror: ${error.message}`));
          page.on('console', (message) => {
            if (message.type() === 'error') runtimeErrors.push(`console: ${message.text()}`);
          });
          await page.addInitScript(
            ({ token, projectId, brandId }) => {
              window.localStorage.setItem('genpano_token', token);
              window.sessionStorage.setItem('genpano_onboarding_skipped', '1');
              window.localStorage.setItem('genpano_lang', 'zh');
              window.localStorage.setItem(
                'genpano_active_project',
                JSON.stringify({
                  id: projectId,
                  primaryBrandId: Number(brandId),
                  industryId: null,
                  name: 'Estee Lauder / App Analytics',
                  competitorBrandIds: [2],
                }),
              );
            },
            { token, projectId, brandId },
          );

          const routes = [
            '/brand/overview?brandId=12&range=30d&profileGroup=all',
            '/brand/visibility?brandId=12&range=30d&profileGroup=all',
            '/brand/topics?brandId=12&range=30d&profileGroup=all',
            '/brand/sentiment?brandId=12&range=30d&profileGroup=all',
            '/brand/citations?brandId=12&range=30d&profileGroup=all',
            '/brand/competitors?brandId=12&range=30d&profileGroup=all',
          ];
          const pageSummaries = [];
          for (const route of routes) {
            await page.goto(`${baseUrl}${route}`, { waitUntil: 'domcontentloaded', timeout: 60000 });
            await page.waitForLoadState('networkidle', { timeout: 25000 }).catch(() => {});
            const path = new URL(page.url()).pathname;
            assert(!['/register', '/login', '/onboarding'].includes(path), `${route} redirected to ${page.url()}`);
            const text = await page.locator('body').innerText({ timeout: 15000 });
            const hasBrandContext =
              text.toLowerCase().includes('estee') ||
              text.toLowerCase().includes('est\u00e9e') ||
              text.includes('\u96c5\u8bd7\u5170\u9edb');
            assert(hasBrandContext, `${route} did not render Estee/Est\u00e9e/\u96c5\u8bd7\u5170\u9edb context`);
            const surfaceCount = await page.locator('.recharts-wrapper, svg, table, [role="table"], [data-testid*="chart"], [class*="chart"]').count();
            assert(surfaceCount > 0, `${route} rendered no chart/table/svg surface`);
            const screenshotName = route.replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'route';
            await page.screenshot({ path: `${artifactsDir}/${screenshotName}.png`, fullPage: true });
            pageSummaries.push({ route, path, surfaceCount });
          }
          await browser.close();

          const fatalRuntimeErrors = runtimeErrors.filter(
            (item) =>
              !item.includes('favicon') &&
              !item.includes('ResizeObserver loop') &&
              !item.includes('A request was aborted') &&
              !item.includes('Failed to load resource'),
          );
          if (failedResponses.length) {
            throw new Error(`live App had failing API responses:\n${failedResponses.join('\n')}`);
          }
          if (fatalRuntimeErrors.length) {
            throw new Error(`live App had runtime errors:\n${fatalRuntimeErrors.join('\n')}`);
          }

          console.log('FINAL_NO_FALLBACK_E2E_SUMMARY ' + JSON.stringify({
            projectId,
            brandId,
            window: { from: fromDate, to: toDate },
            overview: {
              state: overview.state,
              formula_status: overview.formula_status,
              evidence_counts: overview.evidence_counts,
              kpis: kpiCards.map((card) => ({
                key: card.metric_key,
                value: card.value,
                formula_status: card.formula_status,
                value_scale: card.value_scale,
              })),
            },
            metrics: (metrics.series || []).map((series) => ({
              metric: series.metric,
              state: series.state,
              formula_status: series.formula_status,
              points: (series.points || []).length,
              missing_inputs: series.missing_inputs,
            })),
            topics: topicSummary,
            heatmapMention: {
              state: heatmapMention.state,
              rows: (heatmapMention.rows || []).length,
            },
            sentiment: {
              state: sentiment.state,
              formula_status: sentiment.formula_status,
              evidence_count: sentiment.evidence_count,
              top_drivers: (sentiment.top_drivers || []).length,
            },
            citations: {
              state: citations.state,
              formula_status: citations.formula_status,
              total: citations.total,
              evidence_count: citations.evidence_count,
            },
            pageSummaries,
          }));
          NODE

      - name: Upload live E2E screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-app-analytics-no-fallback-${{ github.run_id }}
          path: frontend/test-results/live-app-analytics-no-fallback
          if-no-files-found: ignore
