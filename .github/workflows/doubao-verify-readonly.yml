name: Doubao Verify (read-only)

# Refs #963 anti-scraping verification: SSH to the worker, read recent
# Doubao query state + the latest runtime-snapshot fingerprint dump
# from PR #1068, and post the output back as a PR comment so the
# Claude session can read it via the GitHub MCP without needing
# admin/SSH access on its own. Read-only — does not mutate any DB
# row or kick a celery task. Pure observation.

# Refs Codex P2 review on PR #1073: the original trigger was just
# ``pull_request`` on this file's path, which is too narrow — after the
# YAML lands on main, future Doubao fix PRs won't re-run this verifier
# unless someone makes a dummy workflow edit. Broaden the trigger:
# - ``workflow_dispatch`` lets the user (or any maintainer) hit "Run
#   workflow" in the Actions UI on demand, exactly the way
#   ``server-diagnostics.yml`` and the other runbook workflows are
#   invoked.
# - ``push`` on a fixed Claude-owned branch lets the assistant trigger
#   a fresh dump by pushing an empty commit / tiny edit to that branch
#   without opening a new PR every time.
# - ``pull_request`` on this file is kept so PR self-tests still work
#   when the verifier YAML itself is being touched.
on:
  workflow_dispatch:
    inputs:
      brand_id:
        description: "Optional brand_id filter for the doubao query SELECT (default: all)"
        required: false
        default: ""
  push:
    branches:
      - 'claude/verify-doubao'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/doubao-verify-readonly.yml'

permissions:
  contents: read
  pull-requests: write
  # Refs #963 follow-up: ``issues: write`` is needed so the fallback
  # comment path (when no PR is associated with the trigger commit)
  # can post the dump back to issue #963 — the GitHub Actions API
  # rejects ``createComment`` on an issue otherwise even though both
  # PRs and issues share the same comment endpoint.
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH + capture Doubao state
        id: ssh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s' "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          output=$(ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=4 \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -uo pipefail
          cd /opt/genpano

          echo "=== Container build identity ==="
          docker compose images worker 2>/dev/null | head -5 || true

          echo ""
          echo "=== TZ env in worker container ==="
          docker compose exec -T worker sh -c 'echo TZ=$TZ; date; ls -la /usr/share/zoneinfo/Asia/Shanghai 2>&1 | head -2' </dev/null 2>&1 || true

          echo ""
          echo "=== Last 15 doubao queries (most recent first) ==="
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT
              q.id,
              q.status,
              q.retry_reason,
              q.retry_count,
              q.account_id,
              q.queued_at,
              q.finished_at,
              EXTRACT(EPOCH FROM (NOW() - q.queued_at))::int AS seconds_since_queued,
              (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id = q.id) AS resp_count
            FROM queries q
            WHERE q.target_llm='doubao'
            ORDER BY q.id DESC
            LIMIT 15;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Doubao queries with response_count > 0 after deploy 2026-05-16 (success markers) ==="
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT
              q.id, q.status, q.retry_reason, q.finished_at,
              (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id=q.id) AS resp_count
            FROM queries q
            WHERE q.target_llm='doubao'
              AND q.finished_at > '2026-05-16 09:00:00 UTC'::timestamp
              AND EXISTS (SELECT 1 FROM llm_responses r WHERE r.query_id=q.id)
            ORDER BY q.id DESC
            LIMIT 10;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== IP-binding hypothesis: doubao account re-login frequency (past 48h) ==="
          # Refs #963 user question: does every qg.net IP rotation force
          # Doubao to invalidate the account session, making the rotating-IP
          # strategy structurally broken? The LLMAccount schema uses
          # ``cookies_updated_at`` as the durable proxy for "last successful
          # login": ``celery_tasks.py`` writes this column atomically with
          # the fresh ``cookies_json`` payload at the end of a
          # ``login_or_register`` handshake (see celery_tasks.py:1948).
          # If accounts are forced to re-authenticate after every IP swap,
          # we expect deltas between consecutive cookies_updated_at values
          # for a given account to cluster well below the per-account
          # daily quota (~20 queries/day → ~72 min/query at most).
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            WITH doubao_accts AS (
              SELECT id, cookies_updated_at,
                     LAG(cookies_updated_at) OVER (
                       PARTITION BY id ORDER BY cookies_updated_at
                     ) AS prev_login
              FROM llm_accounts
              WHERE llm_name='doubao'
                AND cookies_updated_at > NOW() - INTERVAL '48 hours'
            )
            SELECT id AS account_id, cookies_updated_at, prev_login,
                   EXTRACT(EPOCH FROM (cookies_updated_at - prev_login))/60 AS delta_minutes
            FROM doubao_accts
            WHERE prev_login IS NOT NULL
            ORDER BY id, cookies_updated_at
            LIMIT 40;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== IP-binding hypothesis: distribution of cookies_updated_at refreshes per account (past 48h) ==="
          # Aggregate so we can see at a glance how aggressively each
          # account is being bounced through re-login. If accounts churn
          # cookies dozens of times per day, IP-invalidation is the dominant
          # failure mode; if cookies last hours/days, the hypothesis weakens.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT id AS account_id,
                   status,
                   expired_transition_count,
                   consecutive_fails,
                   cookies_updated_at,
                   last_used_at,
                   EXTRACT(EPOCH FROM (NOW() - cookies_updated_at))/60 AS minutes_since_login,
                   query_count_today
            FROM llm_accounts
            WHERE llm_name='doubao'
            ORDER BY cookies_updated_at DESC NULLS LAST
            LIMIT 25;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== IP-binding hypothesis: doubao query success vs minutes-since-account-login (past 48h) ==="
          # If successful queries cluster at minutes_since_login < N and
          # failures (doubao_auth_state_missing / doubao_not_logged_in /
          # doubao_homepage_content) cluster at minutes_since_login > M,
          # IP rotation is silently invalidating the in-flight session.
          # If both succeed and fail are scattered across the range, IP
          # rotation is fine and the issue is elsewhere (anti-bot, page
          # gating, etc.).
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT
              q.id AS query_id,
              q.account_id,
              q.status,
              q.retry_reason,
              q.retry_count,
              q.queued_at,
              q.finished_at,
              a.cookies_updated_at,
              EXTRACT(EPOCH FROM (q.queued_at - a.cookies_updated_at))/60 AS minutes_since_login_at_queue,
              (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id = q.id) AS resp_count
            FROM queries q
            JOIN llm_accounts a ON a.id = q.account_id
            WHERE q.target_llm='doubao'
              AND q.finished_at IS NOT NULL
              AND q.finished_at > NOW() - INTERVAL '48 hours'
            ORDER BY q.finished_at DESC
            LIMIT 40;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== IP-binding hypothesis: per-account session lifetime to first auth failure ==="
          # For each account, the first auth-state failure (retry_reason
          # IN {doubao_not_logged_in, doubao_auth_state_missing,
          # doubao_homepage_content}) after its most recent
          # cookies_updated_at. Short lifetimes (< a few minutes) support
          # the IP-binding hypothesis; longer lifetimes (~hours, spanning
          # many qg IPs) refute it.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            WITH last_login AS (
              SELECT id AS account_id, cookies_updated_at
              FROM llm_accounts
              WHERE llm_name='doubao' AND cookies_updated_at IS NOT NULL
            ),
            first_fail AS (
              SELECT q.account_id, MIN(q.finished_at) AS first_fail_at
              FROM queries q
              JOIN last_login l ON l.account_id = q.account_id
              WHERE q.target_llm='doubao'
                AND q.retry_reason IN (
                  'doubao_not_logged_in',
                  'doubao_auth_state_missing',
                  'doubao_homepage_content'
                )
                AND q.finished_at > l.cookies_updated_at
                AND q.finished_at > NOW() - INTERVAL '48 hours'
              GROUP BY q.account_id
            )
            SELECT
              l.account_id,
              l.cookies_updated_at,
              f.first_fail_at,
              EXTRACT(EPOCH FROM (f.first_fail_at - l.cookies_updated_at))/60 AS minutes_session_lasted,
              (SELECT COUNT(*) FROM queries q
                 WHERE q.account_id = l.account_id
                   AND q.target_llm='doubao'
                   AND q.finished_at > l.cookies_updated_at
                   AND q.finished_at <= f.first_fail_at) AS queries_before_failure
            FROM last_login l
            LEFT JOIN first_fail f ON f.account_id = l.account_id
            WHERE l.cookies_updated_at > NOW() - INTERVAL '48 hours'
            ORDER BY l.account_id;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== IP-binding hypothesis: qg.net extract URL config (does num=1 enforce per-call rotation?) ==="
          # AGENTS.md Evidence-First: confirm what the production worker is
          # ACTUALLY configured with for qg, including the ?num= and
          # ?session_id= / ?sticky= params if any. Note: QG_PROXY_EXTRACT_URL
          # is a secret containing an apikey; redact before printing.
          docker compose exec -T worker python3 - <<'PYEND'
          import os, re
          url = os.getenv("QG_PROXY_EXTRACT_URL", "")
          if not url:
              print("QG_PROXY_EXTRACT_URL: <empty>")
          else:
              red = re.sub(r"(key|apikey|token|password|auth)=[^&\s]+",
                           r"\1=[redacted]", url, flags=re.IGNORECASE)
              print("QG_PROXY_EXTRACT_URL (redacted):", red)
              # Pull out only the param keys to confirm sticky-session support
              # without exposing secrets.
              try:
                  from urllib.parse import urlparse, parse_qs
                  parsed = urlparse(url)
                  print("  host  :", parsed.netloc)
                  print("  path  :", parsed.path)
                  keys = sorted(parse_qs(parsed.query).keys())
                  print("  param keys:", keys)
              except Exception as e:
                  print("  param parse failed:", e)
          for k in ("QG_PROXY_AUTH_KEY", "QG_PROXY_AUTH_PASSWORD"):
              v = os.getenv(k, "")
              print(f"{k}: {'set ('+str(len(v))+' chars)' if v else '<empty>'}")
          PYEND

          echo ""
          echo "=== Latest 5 doubao runtime-snapshot files (inside worker container) ==="
          docker compose exec -T worker sh -c 'ls -lat /data/screenshots/query_*_doubao_*.json 2>/dev/null | head -5 || echo "(none)"' </dev/null

          echo ""
          echo "=== Latest doubao runtime snapshot — fingerprint + selector inspect ==="
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, json, os
          # Refs #963 follow-up: pick the most recent doubao snapshot from
          # /data/screenshots so we can correlate the diagnostic dump with
          # the scrape failure mode. The previous read tried the host path
          # which is not mounted; switch to the worker container's view.
          files = sorted(
              glob.glob("/data/screenshots/query_*_doubao_*.json"),
              key=os.path.getmtime,
              reverse=True,
          )
          if not files:
              print("(no doubao snapshots in /data/screenshots)")
              raise SystemExit(0)
          path = files[0]
          print(f"FILE: {path}")
          with open(path) as f:
              d = json.load(f)
          print("suffix          :", d.get("suffix"))
          print("queryId         :", d.get("queryId"))
          print("savedAt         :", d.get("savedAt"))
          print("doubaoAuthReason:", d.get("doubaoAuthStateReason"))
          print("doubaoChallenge :", d.get("doubaoVisualChallenge"))
          page = d.get("page", {}) or {}
          print("url             :", page.get("url"))
          print("title           :", (page.get("title") or "")[:120])
          print("readyState      :", page.get("readyState"))
          print("--- responseSelectors (these tell us which Doubao DOM nodes match) ---")
          for sel in (page.get("responseSelectors") or []):
              print(json.dumps(
                  {k: sel.get(k) for k in (
                      "selector", "count", "visibleCount", "firstText", "error"
                  )},
                  ensure_ascii=False,
              )[:1200])
          print("--- inputSelectors ---")
          for sel in (page.get("inputSelectors") or []):
              print(json.dumps(
                  {k: sel.get(k) for k in (
                      "selector", "count", "visibleCount", "firstText", "error"
                  )},
                  ensure_ascii=False,
              )[:600])
          fp = page.get("fingerprint", {}) or {}
          print("--- fingerprint ---")
          for k in (
              "userAgent","language","languages","platform","hardwareConcurrency",
              "webdriver","devicePixelRatio","timezone","timezoneOffset",
              "rtcPeerConnectionAvailable","onChatPage","userMessageBubbleCount",
          ):
              print(f"{k:30s} = {fp.get(k)!r}")
          print(f"{'screen':30s} = {json.dumps(fp.get('screen') or {})}")
          print("--- bodyText (first 1200 chars) ---")
          print((page.get("bodyText") or "")[:1200])
          PYEND

          echo ""
          echo "=== Latest doubao saved HTML — looking for likely response containers ==="
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, os, re
          files = sorted(
              glob.glob("/data/screenshots/query_*_doubao_response_page_*.html")
              + glob.glob("/data/screenshots/query_*_doubao_extract_fail_*.html")
              + glob.glob("/data/screenshots/query_*_doubao_homepage_content_*.html"),
              key=os.path.getmtime,
              reverse=True,
          )
          if not files:
              print("(no recent doubao response HTML files)")
              raise SystemExit(0)
          path = files[0]
          print(f"FILE: {path}")
          with open(path, "r", encoding="utf-8", errors="replace") as f:
              html = f.read()
          print(f"size={len(html)} bytes")
          # Search for likely Doubao response container patterns. Each
          # candidate is reported with the count of matches so we can
          # confirm whether the CURRENT site DOM contains markdown bodies
          # at all and, if so, under what class name.
          candidates = [
              r"class=['\"][^'\"]*flow-markdown-body[^'\"]*['\"]",
              r"class=['\"][^'\"]*markdown[^'\"]*['\"]",
              r"class=['\"][^'\"]*message-bubble[^'\"]*['\"]",
              r"class=['\"][^'\"]*chat-message[^'\"]*['\"]",
              r"class=['\"][^'\"]*answer[^'\"]*['\"]",
              r"class=['\"][^'\"]*response[^'\"]*['\"]",
              r"class=['\"][^'\"]*assistant[^'\"]*['\"]",
              r"data-testid=['\"][^'\"]*message[^'\"]*['\"]",
              r"data-testid=['\"][^'\"]*answer[^'\"]*['\"]",
              r"<article[^>]*>",
          ]
          for pat in candidates:
              n = len(re.findall(pat, html))
              print(f"{pat:60s} -> {n} matches")
          # Dump the first 10 distinct class names that contain 'markdown',
          # 'message', 'answer', or 'response' — gives the scraper team a
          # hint about the CURRENT Doubao DOM.
          interesting = set()
          for m in re.finditer(r"class=['\"]([^'\"]*)['\"]", html):
              for cls in m.group(1).split():
                  if any(k in cls.lower() for k in ("markdown","message","answer","response","assistant","bubble","reply")):
                      interesting.add(cls)
          print(f"--- distinct classes mentioning markdown/message/answer/response (sample 30) ---")
          for c in list(sorted(interesting))[:30]:
              print(f"  {c}")
          PYEND

          echo ""
          echo "=== Phase 1 evidence capture: run each persistence_auth_reason gate against the failing HTML ==="
          # Refs #963 / 3rd iteration on persistence_auth_reason (#1047, #1076, Codex P1 on #1076).
          # Q-184971 retry on worker SHA 9e9b1e0 streamed a real 1178-char answer
          # via .flow-markdown-body but persistence_auth_reason still returned
          # doubao_not_logged_in. AGENTS.md "Evidence-First Debugging" demands the
          # literal triggering string from the production HTML before editing any
          # gate. This block runs every gate function (visible_login_dialog,
          # substantive_answer_html, hard/strong persistence) against the most
          # recent doubao_not_logged_in HTML and prints the marker/regex that
          # tripped, with 200-char context around it.
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, os, re, sys
          sys.path.insert(0, '/app')
          from geo_tracker.agent.response_validation import (
              doubao_persistence_auth_reason,
              _doubao_has_visible_login_dialog,
              _doubao_has_substantive_answer_html,
              _doubao_hard_persistence_auth_reason,
              _doubao_strong_persistence_auth_reason,
              doubao_auth_state_reason,
              _strip_hidden_doubao_auth_chrome,
              _DOUBAO_FLOW_MARKDOWN_BODY_RE,
              _DOUBAO_PERSISTENCE_HARD_UNAUTH_MARKERS,
              _DOUBAO_PERSISTENCE_STATE_LOGOUT_RE,
          )

          # Prefer the Q-184971 HTML if still present, otherwise the most
          # recent doubao_not_logged_in HTML.
          preferred = sorted(
              glob.glob('/data/screenshots/query_184971_doubao_not_logged_in_*.html'),
              key=os.path.getmtime, reverse=True,
          )
          files = preferred or sorted(
              glob.glob('/data/screenshots/query_*_doubao_not_logged_in_*.html'),
              key=os.path.getmtime, reverse=True,
          )
          if not files:
              print('(no doubao_not_logged_in HTML files in /data/screenshots)')
              raise SystemExit(0)
          path = files[0]
          print(f'FILE: {path}')
          with open(path, 'r', encoding='utf-8', errors='replace') as f:
              html = f.read()
          print(f'size={len(html)}')

          # Strip hidden chrome to mimic what the gate actually inspects.
          visible = _strip_hidden_doubao_auth_chrome(html)
          print(f'visible_size_after_strip_hidden={len(visible)}')

          # Run each gate stage independently.
          print(f'visible_login_dialog          = {_doubao_has_visible_login_dialog(visible)}')
          print(f'substantive_answer_html       = {_doubao_has_substantive_answer_html(html)}')
          hard = _doubao_hard_persistence_auth_reason(None, html)
          print(f'hard_persistence_auth_reason  = {hard}')
          strong = _doubao_strong_persistence_auth_reason(None, html)
          print(f'strong_persistence_auth_reason= {strong}')
          auth_state = doubao_auth_state_reason(None, html)
          print(f'doubao_auth_state_reason      = {auth_state}')

          # Grep all HARD markers + STATE_LOGOUT_RE with 200-char context.
          print('--- HARD markers in visible html (with 200-char context) ---')
          for marker in _DOUBAO_PERSISTENCE_HARD_UNAUTH_MARKERS:
              idx = visible.find(marker)
              if idx >= 0:
                  ctx = visible[max(0, idx-100):idx+len(marker)+100]
                  print(f'MARKER {marker!r} at offset {idx}: ...{ctx!r}...')
          for m in _DOUBAO_PERSISTENCE_STATE_LOGOUT_RE.finditer(visible):
              ctx = visible[max(0, m.start()-100):m.end()+100]
              print(f'STATE_LOGOUT_RE match {m.group(0)!r} at offset {m.start()}: ...{ctx!r}...')

          # Visible-login-dialog candidate markers with 200-char context.
          print('--- visible_login_dialog candidates ---')
          for needle in (
              'passport', 'role="dialog"', "role='dialog'",
              'login-dialog', 'login-button',
              '扫码登录',     # 扫码登录
              '手机号',           # 手机号
              '手机号登录', # 手机号登录
              '短信验证码', # 短信验证码
              '请输入手机号', # 请输入手机号
          ):
              idx = visible.find(needle)
              if idx >= 0:
                  ctx = visible[max(0, idx-100):idx+len(needle)+100]
                  print(f'DIALOG-CANDIDATE {needle!r} at offset {idx}: ...{ctx!r}...')
              else:
                  print(f'DIALOG-CANDIDATE {needle!r}: not found in visible html')

          # .flow-markdown-body match details — proves the gate has the answer.
          matches = list(_DOUBAO_FLOW_MARKDOWN_BODY_RE.finditer(visible))
          print(f'flow-markdown-body matches in visible: {len(matches)}')
          for i, m in enumerate(matches[:3]):
              stripped = re.sub(r'<[^>]+>', ' ', m.group('body')).strip()
              print(f'  match {i}: body_raw_len={len(m.group("body"))} body_stripped_len={len(stripped)} first 200 stripped: {stripped[:200]!r}')

          # Final gate verdict.
          print('--- final gate verdict ---')
          verdict = doubao_persistence_auth_reason('doubao', None, html)
          print(f'doubao_persistence_auth_reason(doubao, None, html) = {verdict}')
          PYEND

          echo ""
          echo "=== Submit-failed HTML inspection — Q-184971 #flow-end-msg-send state at submit fail ==="
          # Refs #963: doubao retry on worker SHA d8a22482 saved
          # /data/screenshots/query_184971_doubao_submit_failed_1778996414.html
          # at 05:40:14 UTC. The retry log showed the code went straight
          # from "通过 JS 注入受控 textarea" to "通过 Enter 键提交"
          # (skipped both the configured submit_button selectors and the
          # JS _find_submit_button_js fallback). Dump the actual button
          # state + textarea + overlay markers so the fix can target the
          # observed cause instead of a guess.
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, os, re, html as htmllib
          # Prefer Q-184971 specifically (the named smoking gun), then any
          # recent submit_failed HTML.
          preferred = sorted(
              glob.glob('/data/screenshots/query_184971_doubao_submit_failed_*.html'),
              key=os.path.getmtime, reverse=True,
          )
          files = preferred or sorted(
              glob.glob('/data/screenshots/query_*_doubao_submit_failed_*.html'),
              key=os.path.getmtime, reverse=True,
          )
          if not files:
              print('(no doubao_submit_failed HTML files in /data/screenshots)')
              raise SystemExit(0)
          path = files[0]
          print(f'FILE: {path}')
          with open(path, 'r', encoding='utf-8', errors='replace') as f:
              raw = f.read()
          print(f'size: {len(raw)} bytes')

          # 1. flow-end-msg-send button(s)
          btn_re = re.compile(
              r"<(?:button|div|span|a)[^>]*\bid=['\"]flow-end-msg-send['\"][^>]*>",
              re.IGNORECASE,
          )
          btn_matches = btn_re.findall(raw)
          print(f"--- #flow-end-msg-send opening tags: {len(btn_matches)} ---")
          for i, m in enumerate(btn_matches[:5]):
              print(f"MATCH {i}: {m[:1200]}")

          # send-btn-wrapper / send-msg-btn enclosures
          wrapper_re = re.compile(r"<[^>]+class=['\"][^'\"]*\bsend-btn-wrapper\b[^'\"]*['\"][^>]*>", re.IGNORECASE)
          wraps = wrapper_re.findall(raw)
          print(f"--- send-btn-wrapper opening tags: {len(wraps)} (sample) ---")
          for i, m in enumerate(wraps[:3]):
              print(f"WRAP {i}: {m[:600]}")
          smb_re = re.compile(r"<[^>]+class=['\"][^'\"]*\bsend-msg-btn\b[^'\"]*['\"][^>]*>", re.IGNORECASE)
          smb = smb_re.findall(raw)
          print(f"--- send-msg-btn opening tags: {len(smb)} (sample) ---")
          for i, m in enumerate(smb[:5]):
              print(f"SMB {i}: {m[:600]}")

          # 2. 2KB context around the FIRST flow-end-msg-send occurrence
          for m in re.finditer(r"flow-end-msg-send", raw, re.IGNORECASE):
              s = max(0, m.start() - 800)
              e = min(len(raw), m.end() + 1200)
              print("--- 2KB context around flow-end-msg-send ---")
              print(raw[s:e])
              print("--- END CONTEXT ---")
              break

          # 3. Disabled / aria-disabled / data-disabled near send-msg-btn classes
          dis_re = re.compile(r"send-msg-btn[^\"']*-disabled-bg|send-msg-btn[^\"']*disabled", re.IGNORECASE)
          dis_hits = dis_re.findall(raw)
          print(f"--- send-msg-btn*-disabled* hits: {len(dis_hits)} (sample) ---")
          for d in dis_hits[:10]:
              print(f"  {d}")

          # 4. Textarea state — is the user's prompt still inside?
          ta_re = re.compile(r"<textarea[^>]*>([\s\S]{0,5000}?)</textarea>", re.IGNORECASE)
          tas = ta_re.findall(raw)
          print(f"--- textarea count: {len(tas)} (showing first 3) ---")
          for i, body in enumerate(tas[:3]):
              decoded = htmllib.unescape(body or "").strip()
              print(f"TEXTAREA {i}: len={len(decoded)} content={decoded[:400]!r}")

          # Also dump opening tag for context (semi-input-textarea / aria-hidden)
          ta_open_re = re.compile(r"<textarea[^>]*>", re.IGNORECASE)
          for i, m in enumerate(ta_open_re.findall(raw)[:5]):
              print(f"TEXTAREA-TAG {i}: {m[:400]}")

          # textarea value attr (controlled component case)
          ta_attr_re = re.compile(r"<textarea[^>]*\bvalue=['\"]([^'\"]{0,5000})['\"][^>]*", re.IGNORECASE)
          ta_attrs = ta_attr_re.findall(raw)
          for i, v in enumerate(ta_attrs[:3]):
              print(f"TEXTAREA-VALUE-ATTR {i}: len={len(v)} value={v[:400]!r}")

          # 5. send-msg-bubble-bg presence (user bubble actually rendered?)
          bub = re.findall(r"send-msg-bubble-bg", raw, re.IGNORECASE)
          print(f"--- send-msg-bubble-bg occurrences: {len(bub)} ---")

          # 6. CAPTCHA / overlay / error overlay markers
          overlay_markers = (
              "captcha", "verify-slider", "slider-captcha", "cf-challenge",
              "验证码", "请稍候", "Cloudflare", "challenge", "行为验证",
              "点击验证", "拖动验证", "该页面暂时不可用",
              "semi-modal", "semi-overlay", "fixed inset-0",
          )
          for marker in overlay_markers:
              cnt = raw.lower().count(marker.lower())
              if cnt:
                  print(f"OVERLAY-MARKER {marker!r}: {cnt}")

          # 7. dialog / modal / login chrome
          dlg = re.findall(r"role=['\"]dialog['\"]", raw, re.IGNORECASE)
          print(f"--- role=\"dialog\" matches: {len(dlg)} ---")
          for needle in ("login-btn-header", "login-dialog", "passport", "扫码登录", "手机号登录"):
              c = raw.lower().count(needle.lower())
              if c:
                  print(f"LOGIN-MARKER {needle!r}: {c}")

          # 8. <form> elements (rare for SPA, but check)
          forms = re.findall(r"<form[^>]*>", raw, re.IGNORECASE)
          print(f"--- <form> opening tags: {len(forms)} ---")
          for i, fm in enumerate(forms[:3]):
              print(f"FORM {i}: {fm[:300]}")

          # 9. data-testid on/near send buttons
          testids = re.findall(r"data-testid=['\"]([^'\"]+)['\"]", raw)
          send_testids = [t for t in testids if "send" in t.lower() or "submit" in t.lower()]
          print(f"--- send/submit data-testid: {len(send_testids)} (unique sample 10) ---")
          for t in sorted(set(send_testids))[:10]:
              print(f"  {t}")

          # 10. Body text snippet — chat page or generic landing?
          txt = re.sub(r"<script[\s\S]*?</script>", " ", raw, flags=re.IGNORECASE)
          txt = re.sub(r"<style[\s\S]*?</style>", " ", txt, flags=re.IGNORECASE)
          txt = re.sub(r"<[^>]+>", " ", txt)
          txt = re.sub(r"\s+", " ", txt).strip()
          print("--- visible text (first 600 chars) ---")
          print(txt[:600])
          PYEND

          echo ""
          echo "=== Submit-failed runtime snapshot (no_response counterpart for Q-184971) ==="
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, json, os
          preferred = sorted(
              glob.glob('/data/screenshots/query_184971_doubao_no_response_*.json'),
              key=os.path.getmtime, reverse=True,
          )
          files = preferred or sorted(
              glob.glob('/data/screenshots/query_*_doubao_no_response_*.json'),
              key=os.path.getmtime, reverse=True,
          )
          if not files:
              print('(no doubao_no_response runtime snapshots)')
              raise SystemExit(0)
          path = files[0]
          print(f'FILE: {path}')
          with open(path) as f:
              d = json.load(f)
          page = d.get("page", {}) or {}
          fp = page.get("fingerprint", {}) or {}
          print("suffix          :", d.get("suffix"))
          print("queryId         :", d.get("queryId"))
          print("savedAt         :", d.get("savedAt"))
          print("url             :", page.get("url"))
          print("title           :", (page.get("title") or "")[:120])
          print("readyState      :", page.get("readyState"))
          print("doubaoAuthReason:", d.get("doubaoAuthStateReason"))
          print("onChatPage      :", fp.get("onChatPage"))
          print("userMessageBubbleCount:", fp.get("userMessageBubbleCount"))
          print("--- inputSelectors ---")
          for s in (page.get("inputSelectors") or []):
              print(json.dumps(s, ensure_ascii=False))
          print("--- responseSelectors ---")
          for s in (page.get("responseSelectors") or []):
              print(json.dumps(s, ensure_ascii=False))
          print("--- bodyText (first 1200 chars) ---")
          print((page.get("bodyText") or "")[:1200])
          PYEND

          echo ""
          echo "=== Mode B: account lookup for phone 16267976942 ==="
          # Refs #963 user comment: "我在 16267976942 看到了正确的回答，但是系统里还没看到成功的".
          # Phone 16267976942 corresponds to a specific llm_accounts.id; print
          # all doubao rows containing that phone so we know which account_id
          # to filter the rest of the Mode B queries by. Mode B = our system
          # marked the query failed/no_response while Doubao actually
          # produced a real answer that is visible in the chat history of
          # that account.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT id, llm_name, phone_number, status, query_count_today,
                   daily_limit, cookies_updated_at, last_used_at,
                   expired_transition_count, consecutive_fails
            FROM llm_accounts
            WHERE llm_name='doubao'
              AND phone_number = '16267976942'
            ORDER BY id;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Mode B candidates: doubao queries past 24h on phone 16267976942 with failure-without-real-answer ==="
          # Mode B "looks like": status=failed AND retry_reason in the set of
          # 'doubao got an answer but our scraper didn't capture/persist it'
          # signatures: no_response, doubao_homepage_content,
          # doubao_auth_state_missing, doubao_not_logged_in,
          # doubao_browser_timeout:%, page_unavailable, soft_time_limit.
          # Include resp_count so we can immediately see the (failed,
          # resp_count>0) rows that are the cleanest Mode B evidence
          # (worker DID persist a response row, yet still marked the query
          # failed).
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT
              q.id AS query_id,
              q.status,
              q.retry_reason,
              q.retry_count,
              q.account_id,
              a.phone_number,
              q.queued_at,
              q.finished_at,
              EXTRACT(EPOCH FROM (q.finished_at - q.queued_at))::int AS seconds_elapsed,
              (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id = q.id) AS resp_count,
              (SELECT length(coalesce(r.raw_text,'')) FROM llm_responses r WHERE r.query_id = q.id LIMIT 1) AS raw_text_len,
              (SELECT length(coalesce(r.response_html,'')) FROM llm_responses r WHERE r.query_id = q.id LIMIT 1) AS resp_html_len
            FROM queries q
            JOIN llm_accounts a ON a.id = q.account_id
            WHERE q.target_llm = 'doubao'
              AND a.phone_number = '16267976942'
              AND q.finished_at IS NOT NULL
              AND q.finished_at > NOW() - INTERVAL '24 hours'
              AND (
                q.status = 'failed'
                OR q.retry_reason IN (
                  'no_response',
                  'doubao_homepage_content',
                  'doubao_auth_state_missing',
                  'doubao_not_logged_in',
                  'page_unavailable',
                  'soft_time_limit'
                )
                OR q.retry_reason LIKE 'doubao_browser_timeout:%'
              )
            ORDER BY q.finished_at DESC
            LIMIT 30;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Mode B: ALL doubao failed/no_response in past 24h regardless of account (broader candidate set) ==="
          # Fallback in case the phone-number lookup misses (phone may be
          # stored under a different account row). Useful so the same dump
          # can list e.g. account 42 queries even if the phone column is
          # NULL/different.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT
              q.id, q.status, q.retry_reason, q.account_id, a.phone_number,
              q.queued_at, q.finished_at,
              (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id = q.id) AS resp_count,
              (SELECT length(coalesce(r.raw_text,''))
                  FROM llm_responses r WHERE r.query_id = q.id LIMIT 1) AS raw_text_len
            FROM queries q
            LEFT JOIN llm_accounts a ON a.id = q.account_id
            WHERE q.target_llm = 'doubao'
              AND q.finished_at IS NOT NULL
              AND q.finished_at > NOW() - INTERVAL '24 hours'
              AND (
                q.retry_reason IN (
                  'no_response',
                  'doubao_homepage_content',
                  'doubao_auth_state_missing',
                  'doubao_not_logged_in'
                )
                OR q.retry_reason LIKE 'doubao_browser_timeout:%'
              )
            ORDER BY q.finished_at DESC
            LIMIT 40;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Mode B: list all screenshot/snapshot artifacts for top-3 candidate IDs ==="
          # Print the saved-HTML and runtime-snapshot files attached to each
          # candidate ID, with sizes. Largest "final state" suffix is what
          # we want to inspect for an actual rendered Doubao answer.
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, os
          # Refs #963 Mode B: the parallel investigation flagged Q-185637
          # (account 42) as the active stuck-loop case; Q-184971 (account
          # 47) is the historical case where the saved HTML already showed
          # 1 flow-markdown-body match (86 chars stripped). Pull the union.
          candidate_ids = ["185637", "184971", "184988", "184968", "185657"]
          for qid in candidate_ids:
              print(f"--- Q-{qid} artifacts ---")
              for pattern in (
                  f"/data/screenshots/query_{qid}_doubao_*.json",
                  f"/data/screenshots/query_{qid}_doubao_*.html",
              ):
                  files = sorted(glob.glob(pattern), key=os.path.getmtime, reverse=True)
                  if not files:
                      print(f"  (no files matching {pattern})")
                      continue
                  for f in files[:15]:
                      try:
                          st = os.stat(f)
                          print(f"  {st.st_size:9d} bytes  {f}")
                      except Exception as e:
                          print(f"  ERR  {f}: {e}")
          PYEND

          echo ""
          echo "=== Mode B: inspect largest saved HTML per candidate for actual response selectors ==="
          # For each candidate Q ID, pick the largest saved HTML (any
          # suffix) and run the response-selector audit:
          # - count of .flow-markdown-body matches (worker-configured selector)
          # - count of receive_message / message-content / semi-typography
          # - dump first 300 chars of stripped flow-markdown-body body
          # If Doubao rendered the answer somewhere other than
          # .flow-markdown-body, this is where it shows up.
          docker compose exec -T worker python3 - <<'PYEND'
          import glob, os, re
          candidate_ids = ["185637", "184971", "184988", "184968", "185657"]
          # The worker config (geo_tracker/agent/executor.py:111) sets
          # response_selector to ".flow-markdown-body, [class*='receive-message']
          # [class*='content'], .bot-message .content, [class*='message-content']"
          # — audit each independently.
          selectors_regex = [
              ("flow-markdown-body",
               r"class=['\"][^'\"]*\bflow-markdown-body\b[^'\"]*['\"]"),
              ("receive_message-testid",
               r"data-testid=['\"]receive_message['\"]"),
              ("message_text_content-testid",
               r"data-testid=['\"]message_text_content['\"]"),
              ("class-message-content",
               r"class=['\"][^'\"]*\bmessage-content\b[^'\"]*['\"]"),
              ("class-receive-message",
               r"class=['\"][^'\"]*\breceive-message\b[^'\"]*['\"]"),
              ("semi-typography",
               r"class=['\"][^'\"]*\bsemi-typography\b[^'\"]*['\"]"),
              ("message-list-S2Fv2S",
               r"class=['\"][^'\"]*\bmessage-list-S2Fv2S\b[^'\"]*['\"]"),
              ("send-msg-bubble-bg",
               r"\bsend-msg-bubble-bg\b"),
          ]
          for qid in candidate_ids:
              files = sorted(
                  glob.glob(f"/data/screenshots/query_{qid}_doubao_*.html"),
                  key=lambda p: os.path.getsize(p),
                  reverse=True,
              )
              if not files:
                  print(f"=== Q-{qid}: no HTML artifacts ===")
                  continue
              path = files[0]
              size = os.path.getsize(path)
              print(f"=== Q-{qid}: largest HTML {path} ({size} bytes) ===")
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  html = f.read()
              for name, pat in selectors_regex:
                  n = len(re.findall(pat, html, re.IGNORECASE))
                  print(f"  {name:32s} count={n}")
              # Extract the first .flow-markdown-body body content if present
              fmb = list(re.finditer(
                  r"<div\b[^>]*class=['\"][^'\"]*\bflow-markdown-body\b[^'\"]*['\"][^>]*>(?P<body>[\s\S]{0,5000}?)</div>",
                  html, re.IGNORECASE))
              print(f"  flow-markdown-body body matches: {len(fmb)}")
              for i, m in enumerate(fmb[:2]):
                  body = m.group("body")
                  stripped = re.sub(r"<[^>]+>", " ", body).strip()
                  stripped = re.sub(r"\s+", " ", stripped)
                  print(f"    body {i}: raw_len={len(body)} stripped_len={len(stripped)}")
                  print(f"    first 300 stripped: {stripped[:300]!r}")
              # Also try semi-typography (Doubao 2026 may put assistant
              # answer in a semi-typography wrapper)
              sty = list(re.finditer(
                  r"<[^>]+class=['\"][^'\"]*\bsemi-typography\b[^'\"]*['\"][^>]*>([\s\S]{0,3000}?)</",
                  html, re.IGNORECASE))
              if sty:
                  print(f"  semi-typography body matches: {len(sty)}")
                  for i, m in enumerate(sty[:1]):
                      stripped = re.sub(r"<[^>]+>", " ", m.group(1)).strip()
                      stripped = re.sub(r"\s+", " ", stripped)
                      print(f"    semi-typography body {i}: stripped_len={len(stripped)} first 200: {stripped[:200]!r}")
              # List the file-suffix string for context (no_response,
              # not_logged_in, homepage_content, submit_failed, etc.)
              suffix = os.path.basename(path).replace(f"query_{qid}_doubao_", "").rsplit("_", 1)[0]
              print(f"  suffix: {suffix}")
          PYEND

          echo ""
          echo "=== Mode B: worker log slice for each candidate Q-ID ==="
          # Pull broader log volume so we can correlate per-ID submit /
          # extension / failure events. The previous dump used --tail 500;
          # bump to 4000 because Q-185637 alone produced ~30+ extension
          # lines after submit fired.
          for qid in 185637 184971 184988 184968 185657; do
            echo "--- worker log slice for Q-${qid} ---"
            docker compose logs --tail 4000 worker 2>&1 \
              | grep -E "(Query ${qid}|query_${qid}|^[^|]+\| .*${qid})" \
              | tail -120 || true
            echo ""
          done

          echo ""
          echo "=== Mode B: response_selector config in deployed code ==="
          # AGENTS.md Evidence-First step 3: confirm what the live worker
          # is actually configured to scrape Doubao with. The selector
          # string is part of LLM_CONFIG in executor.py and propagates
          # into guest_executor's response_wait loop. If this string no
          # longer matches the live Doubao DOM, the worker can stream a
          # real answer into the HTML save buffer (which DOES capture all
          # the markup) but the scraper sees nothing.
          docker compose exec -T worker python3 - <<'PYEND'
          try:
              from geo_tracker.agent.executor import LLM_CONFIG
              cfg = LLM_CONFIG.get("doubao", {})
              for key in ("url", "input_selector", "submit_selector",
                          "response_selector", "wait_for_done",
                          "response_timeout"):
                  print(f"{key:20s} = {cfg.get(key)!r}")
          except Exception as e:
              print(f"could not import LLM_CONFIG: {e}")
          PYEND

          echo ""
          echo "=== Mode-classification: most recent ~12 doubao failed queries in past 2 hours ==="
          # User reported "同时我还跑了几个query，全部失败" — classify each row
          # by mode (A=submit never confirmed, B=submit fired but no
          # response render, C=real answer captured but validator rejected).
          # Decision tree applied to this output:
          #   resp_row_count>0 AND max_raw_text_len>=100 -> Mode C
          #   resp_row_count=0 + retry_reason='no_response'/'doubao_input_lost_before_submit' -> Mode A or B (need log)
          #   otherwise -> other:<reason>
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT q.id, q.account_id, q.status, q.retry_reason,
                   q.queued_at, q.finished_at,
                   (SELECT COUNT(*) FROM llm_responses r WHERE r.query_id=q.id) AS resp_row_count,
                   (SELECT MAX(CHAR_LENGTH(raw_text)) FROM llm_responses r WHERE r.query_id=q.id) AS max_raw_text_len,
                   (SELECT MAX(CHAR_LENGTH(raw_html)) FROM llm_responses r WHERE r.query_id=q.id) AS max_raw_html_len
            FROM queries q
            WHERE q.target_llm='doubao'
              AND q.finished_at > NOW() - INTERVAL '2 hours'
              AND q.status='failed'
            ORDER BY q.finished_at DESC
            LIMIT 12;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Mode C raw_text dump: first 200 chars per row (failed-with-response in past 2h) ==="
          # For any row that classified as Mode C in the table above, dump
          # the first 200 chars of llm_responses.raw_text so we can SEE
          # whether the captured response is a real Doubao answer (proving
          # validator false-positive) or noise. Quote the actual text in
          # the report so the user can verify.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT q.id AS query_id,
                   q.retry_reason,
                   LENGTH(r.raw_text) AS raw_text_len,
                   SUBSTRING(r.raw_text, 1, 200) AS raw_text_preview
            FROM queries q
            JOIN llm_responses r ON r.query_id = q.id
            WHERE q.target_llm='doubao'
              AND q.finished_at > NOW() - INTERVAL '2 hours'
              AND q.status='failed'
              AND LENGTH(COALESCE(r.raw_text,'')) >= 100
            ORDER BY q.finished_at DESC
            LIMIT 12;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Worker log slice for top-3 recent failed doubao queries (past 2h) ==="
          # AGENTS.md Evidence-First step 1: capture the broken-surface
          # output. For the 3 most recent failed rows, pull the worker
          # log slice so we can verify the Mode A/B classification by
          # looking for "重试后仍未检测到发送的消息" (A) vs "通过按钮提交"
          # + "awaiting_answer" (B).
          for qid in $(docker compose exec -T postgres psql -X -At -U genpano -d genpano -P pager=off -c "
            SELECT q.id FROM queries q
            WHERE q.target_llm='doubao'
              AND q.finished_at > NOW() - INTERVAL '2 hours'
              AND q.status='failed'
            ORDER BY q.finished_at DESC
            LIMIT 3;
          " </dev/null 2>&1); do
            qid_clean=$(echo "$qid" | tr -d '[:space:]')
            if [ -z "$qid_clean" ]; then continue; fi
            echo "--- worker log slice for query_id=$qid_clean ---"
            docker compose logs --tail 4000 worker 2>&1 | grep -E "query_${qid_clean}\b|\b${qid_clean}\b" | head -60 || true
            echo ""
          done

          echo ""
          echo "=== Active doubao account count (cookies_updated_at within 24h) ==="
          # Quota check: if this is small (<3), we may be running out of
          # usable accounts independent of mode classification, which can
          # cause user-visible 'all failed' even when the scraper code is
          # healthy.
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT COUNT(*) AS active_with_fresh_cookies
            FROM llm_accounts
            WHERE llm_name='doubao'
              AND status='active'
              AND cookies_updated_at > NOW() - INTERVAL '24 hours';
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Active doubao account detail (top 10 by cookies_updated_at) ==="
          docker compose exec -T postgres psql -X -U genpano -d genpano -P pager=off -c "
            SELECT id, phone_number, status, query_count_today, daily_limit,
                   cookies_updated_at, last_used_at, consecutive_fails
            FROM llm_accounts
            WHERE llm_name='doubao'
              AND status='active'
            ORDER BY cookies_updated_at DESC NULLS LAST
            LIMIT 10;
          " </dev/null 2>&1 || true

          echo ""
          echo "=== Doubao worker log tail (last 50 lines mentioning doubao) ==="
          docker compose logs --tail 500 worker 2>&1 | grep -iE "doubao|qg|timezone" | tail -50 || true
          REMOTE
          )

          # Save raw output to file for the next step
          {
            echo "$output"
          } > /tmp/doubao-verify-output.txt

          # Also push to step summary
          {
            echo "## Doubao verify (read-only)"
            echo ""
            echo '```'
            head -2000 /tmp/doubao-verify-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post output as PR comment (when a PR context exists)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Doubao verify (read-only)\n\n';
            try {
              const out = fs.readFileSync('/tmp/doubao-verify-output.txt', 'utf-8');
              // Truncate so we don't blow past comment size limit (65536 chars).
              const max = 50000;
              const trimmed = out.length > max ? out.slice(0, max) + '\n…[truncated]' : out;
              body += '```\n' + trimmed + '\n```';
            } catch (e) {
              body += '⚠️ failed to read output: ' + String(e);
            }
            // Refs Codex P2 on PR #1073: the workflow now also runs on
            // ``workflow_dispatch`` and ``push`` to a Claude-owned branch.
            // Neither context carries a PR number directly. Pick the
            // comment target in this priority order:
            //   1. The current pull_request payload, when this is a PR event.
            //   2. An open PR whose head SHA matches the trigger commit.
            //   3. Issue #963 — the canonical Doubao anti-scraping
            //      tracking issue — so ad-hoc verify dumps always have
            //      a home rather than only living in the step summary.
            let issueNumber = null;
            if (context.payload.pull_request) {
              issueNumber = context.payload.pull_request.number;
            } else {
              const sha = context.sha;
              try {
                const prs = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open ${sha}`,
                });
                if (prs.data.items.length > 0) {
                  issueNumber = prs.data.items[0].number;
                }
              } catch (e) {
                core.warning('PR search failed: ' + String(e));
              }
              if (!issueNumber) {
                issueNumber = 963;
              }
            }
            try {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
              core.notice(`Posted verify dump to #${issueNumber}`);
            } catch (e) {
              core.warning('createComment failed: ' + String(e));
              core.notice('Dump available in step summary.');
            }
