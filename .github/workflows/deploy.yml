name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-vklfeye8td1r1mei.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend
        run: |
          docker build \
            --build-arg VITE_BASE_PATH=/ \
            --build-arg VITE_API_BASE=/api \
            -t ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }} \
            ./frontend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }}

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }} ./backend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }}

      - name: Build & push worker
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }} ./geo_tracker
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }}

      - name: Build & push query-tool
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-${{ env.IMAGE_TAG }} ./query_tool
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-${{ env.IMAGE_TAG }}


  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,clash/,frontend/nginx.conf"
          target: /opt/genpano

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_COOKIES_JSON: ${{ secrets.GEMINI_COOKIES_JSON }}
          DOUBAO_COOKIES_JSON: ${{ secrets.DOUBAO_COOKIES_JSON }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GEMINI_COOKIES_JSON,DOUBAO_COOKIES_JSON
          script: |
            cd /opt/genpano

            # 创建完整的 .env 文件
            # 使用 quoted heredoc 防止 shell 展开密码中的 $
            # heredoc 内容必须缩进（YAML block scalar 要求），写入后用 sed 去除前导空格
            cat > .env <<'ENVEOF'
            ACR_REGISTRY=${{ secrets.ACR_REGISTRY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL=postgresql+asyncpg://genpano:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/genpano
            REDIS_URL=redis://redis:6379/0
            GENPANO_ENVIRONMENT=production
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET || secrets.JWT_SECRET }}
            ADMIN_BASE_URL=${{ secrets.ADMIN_BASE_URL }}
            ADMIN_EMAIL_FROM=${{ secrets.ADMIN_EMAIL_FROM }}
            USER_JWT_SECRET=${{ secrets.USER_JWT_SECRET || secrets.JWT_SECRET || secrets.ADMIN_JWT_SECRET }}
            USER_BASE_URL=${{ secrets.USER_BASE_URL || secrets.FRONTEND_URL || format('http://{0}', secrets.SERVER_HOST) }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL || secrets.USER_BASE_URL || format('http://{0}', secrets.SERVER_HOST) }}
            USER_EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'aliyun_dm' }}
            EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'aliyun_dm' }}
            USER_EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || secrets.EMAIL_FROM }}
            EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || secrets.EMAIL_FROM }}
            USER_EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO }}
            EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            ALIYUN_DM_SMTP_USER=${{ secrets.ALIYUN_DM_SMTP_USER }}
            ALIYUN_DM_SMTP_PASSWORD=${{ secrets.ALIYUN_DM_SMTP_PASSWORD }}
            ALIYUN_DM_SMTP_HOST=${{ secrets.ALIYUN_DM_SMTP_HOST || 'smtpdm.aliyun.com' }}
            ALIYUN_DM_SMTP_PORT=${{ secrets.ALIYUN_DM_SMTP_PORT || '465' }}
            ALIYUN_DM_SMTP_SSL=${{ secrets.ALIYUN_DM_SMTP_SSL || 'true' }}
            ALIYUN_DM_SMTP_STARTTLS=${{ secrets.ALIYUN_DM_SMTP_STARTTLS || 'false' }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            PROXY_PROVIDER=clash
            CLASH_PROXY_URL=http://host.docker.internal:6789
            CLASH_API_URL=http://host.docker.internal:9098
            CLASH_PROXY_GROUP=💬 Ai平台
            PORT=4000
            ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}
            GLM_MODEL=glm-4
            CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
            LUBANSMS_TOKEN=${{ secrets.LUBANSMS_TOKEN }}
            LUBANSMS_PROJECT_DOUBAO=${{ secrets.LUBANSMS_PROJECT_DOUBAO }}
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            ARK_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
            ARK_MODEL=doubao-seed-2-0-pro-260215
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            # 单独写入 cookies JSON，用 Python 压缩为单行 JSON 再写入
            # 转义 $ 为 $$ 防止 docker compose 将 cookie 值中的 $xx 当作变量
            printf '%s' "${GEMINI_COOKIES_JSON}" | python3 -c \
              "import json,sys; s=json.dumps(json.loads(sys.stdin.read())).replace('\$','\$\$'); print('GEMINI_COOKIES_JSON=' + s)" \
              >> .env

            if [ -n "${DOUBAO_COOKIES_JSON}" ]; then
              printf '%s' "${DOUBAO_COOKIES_JSON}" | python3 -c \
                "import json,sys; s=json.dumps(json.loads(sys.stdin.read())).replace('\$','\$\$'); print('DOUBAO_COOKIES_JSON=' + s)" \
                >> .env
            fi

            # 确保 V-Ninja 代理服务正在运行（宿主机 systemd 服务）
            # 更新 allow-lan 脚本和 systemd 服务文件
            cp /opt/genpano/clash/vninja-allow-lan.sh /usr/local/bin/vninja-allow-lan.sh
            chmod +x /usr/local/bin/vninja-allow-lan.sh
            cp /opt/genpano/clash/vninja.service /etc/systemd/system/vninja.service
            systemctl daemon-reload

            # 确保 socat 已安装（API 端口转发需要）
            which socat >/dev/null 2>&1 || apt-get install -y -qq socat

            if systemctl is-active --quiet vninja; then
              echo "✓ V-Ninja 代理服务正在运行"
              # 确保 allow-lan 和 API 转发
              curl -s -X PATCH http://127.0.0.1:9097/configs \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer set-your-secret" \
                -d '{"allow-lan": true}' || true
              # 确保 socat API 转发在运行
              if ! pgrep -f "socat.*TCP-LISTEN:9098" >/dev/null; then
                socat TCP-LISTEN:9098,bind=0.0.0.0,fork,reuseaddr TCP:127.0.0.1:9097 &
              fi
            else
              echo "⚠ V-Ninja 未运行，尝试启动..."
              systemctl start vninja || echo "✗ V-Ninja 启动失败，海外 LLM 将无法使用代理"
            fi

            docker compose pull
            docker compose up -d postgres redis
            docker compose run --rm backend alembic upgrade head
            docker compose up -d --remove-orphans --force-recreate

            # 清理 Docker 垃圾释放磁盘空间
            # 1. 删除所有未被使用的镜像（不只是 dangling）
            docker image prune -af --filter "until=72h"
            # 2. 清理构建缓存
            docker builder prune -af --keep-storage=2GB
            # 3. 清理无主的 volume（排除正在使用的）
            docker volume prune -f
            # 4. 显示清理后的磁盘使用情况
            df -h / && docker system df
