name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login $(echo ${{ secrets.ACR_REGISTRY }} | cut -d'/' -f1) -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & push frontend
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }}

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }} ./backend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }}

      - name: Build & push worker
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }} ./geo_tracker
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/genpano

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/genpano
            echo "ACR_REGISTRY=${{ secrets.ACR_REGISTRY }}" >> .env
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
