name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-vklfeye8td1r1mei.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:frontend-${{ env.IMAGE_TAG }}

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }} ./backend
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:backend-${{ env.IMAGE_TAG }}

      - name: Build & push worker
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }} ./geo_tracker
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:worker-${{ env.IMAGE_TAG }}

      - name: Build & push query-tool
        run: |
          docker build -t ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-${{ env.IMAGE_TAG }} ./query_tool
          docker push ${{ secrets.ACR_REGISTRY }}/genpano:query-tool-${{ env.IMAGE_TAG }}


  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,clash/,frontend/nginx.conf"
          target: /opt/genpano

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_COOKIES_JSON: ${{ secrets.GEMINI_COOKIES_JSON }}
          DOUBAO_COOKIES_JSON: ${{ secrets.DOUBAO_COOKIES_JSON }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GEMINI_COOKIES_JSON,DOUBAO_COOKIES_JSON
          script: |
            cd /opt/genpano

            # 创建完整的 .env 文件
            cat > .env << ENVEOF
            ACR_REGISTRY=${{ secrets.ACR_REGISTRY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL=postgresql+asyncpg://genpano:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/genpano
            REDIS_URL=redis://redis:6379/0
            PROXY_PROVIDER=clash
            CLASH_PROXY_URL=http://host.docker.internal:6789
            CLASH_API_URL=http://host.docker.internal:9097
            PORT=4000
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}
            GLM_MODEL=glm-4
            CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
            LUBANSMS_TOKEN=${{ secrets.LUBANSMS_TOKEN }}
            LUBANSMS_PROJECT_DOUBAO=${{ secrets.LUBANSMS_PROJECT_DOUBAO }}
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            ARK_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
            ARK_MODEL=doubao-seed-2-0-pro-260215
            ENVEOF

            # 单独写入 cookies JSON，用 Python 压缩为单行 JSON 再写入
            # 避免多行 JSON 导致 docker compose 解析 .env 失败
            printf '%s' "${GEMINI_COOKIES_JSON}" | python3 -c \
              "import json,sys; print('GEMINI_COOKIES_JSON=' + json.dumps(json.loads(sys.stdin.read())))" \
              >> .env

            if [ -n "${DOUBAO_COOKIES_JSON}" ]; then
              printf '%s' "${DOUBAO_COOKIES_JSON}" | python3 -c \
                "import json,sys; print('DOUBAO_COOKIES_JSON=' + json.dumps(json.loads(sys.stdin.read())))" \
                >> .env
            fi

            # 确保 V-Ninja 代理服务正在运行（宿主机 systemd 服务）
            if systemctl is-active --quiet vninja; then
              echo "✓ V-Ninja 代理服务正在运行"
            else
              echo "⚠ V-Ninja 未运行，尝试启动..."
              systemctl start vninja || echo "✗ V-Ninja 启动失败，海外 LLM 将无法使用代理"
            fi

            docker compose pull
            docker compose up -d --remove-orphans --force-recreate

            # 清理 Docker 垃圾释放磁盘空间
            # 1. 删除所有未被使用的镜像（不只是 dangling）
            docker image prune -af --filter "until=72h"
            # 2. 清理构建缓存
            docker builder prune -af --keep-storage=2GB
            # 3. 清理无主的 volume（排除正在使用的）
            docker volume prune -f
            # 4. 显示清理后的磁盘使用情况
            df -h / && docker system df
