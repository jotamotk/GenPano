name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"

concurrency:
  group: live-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  latest-main:
    name: Confirm Latest Main
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.guard.outputs.should_deploy }}
      latest_sha: ${{ steps.guard.outputs.latest_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare run SHA with main
        id: guard
        shell: bash
        run: |
          set -Eeuo pipefail

          is_ignored_deploy_path() {
            local path="$1"
            case "$path" in
              .github/PULL_REQUEST_TEMPLATE.md|.github/ISSUE_TEMPLATE/*|docs/*|*.md)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          commit_is_deploy_eligible() {
            local commit="$1"
            local file
            local diff_args=()

            if git rev-parse --verify -q "${commit}^1" >/dev/null; then
              diff_args=("${commit}^1" "$commit")
            else
              diff_args=(--root "$commit")
            fi

            while IFS= read -r file; do
              if [ -n "$file" ] && ! is_ignored_deploy_path "$file"; then
                return 0
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "${diff_args[@]}")

            return 1
          }

          latest_deploy_eligible_main_sha() {
            local commit

            git fetch --prune origin +refs/heads/main:refs/remotes/origin/main

            for commit in $(git rev-list --first-parent origin/main); do
              if commit_is_deploy_eligible "$commit"; then
                echo "$commit"
                return 0
              fi
            done

            echo "No deploy-eligible commit found on origin/main" >&2
            return 1
          }

          run_contains_latest_deploy_eligible() {
            local latest_sha="$1"
            git merge-base --is-ancestor "$latest_sha" "$GITHUB_SHA"
          }

          latest_sha="$(latest_deploy_eligible_main_sha)"

          echo "latest_sha=${latest_sha}" >> "$GITHUB_OUTPUT"

          if ! run_contains_latest_deploy_eligible "$latest_sha"; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Build & Deploy skipped"
              echo ""
              echo "- Result: stale main run skipped before build."
              echo "- Run SHA: \`${GITHUB_SHA}\`"
              echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
              echo "- Reason: the run SHA does not contain the latest deploy-eligible product state."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Build & Deploy latest-main guard"
            echo ""
            echo "- Result: run contains the latest deploy-eligible product state; build may continue."
            echo "- Run SHA: \`${GITHUB_SHA}\`"
            echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build & Push ${{ matrix.service }} Image
    runs-on: ubuntu-latest
    needs: latest-main
    if: needs.latest-main.outputs.should_deploy == 'true'
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            tag_prefix: frontend
            cache_scope: genpano-frontend
            build_args: |
              VITE_BASE_PATH=/
              VITE_API_BASE=/api
          - service: backend
            context: ./backend
            tag_prefix: backend
            cache_scope: genpano-backend
            build_args: ""
          - service: worker
            context: ./geo_tracker
            tag_prefix: worker
            cache_scope: genpano-worker
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ACR login registry
        id: acr
        shell: bash
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          registry="${ACR_REGISTRY#http://}"
          registry="${registry#https://}"
          registry="${registry%/}"
          if [ -z "$registry" ]; then
            echo "ACR_REGISTRY secret is empty" >&2
            exit 1
          fi
          echo "login_registry=${registry%%/*}" >> "$GITHUB_OUTPUT"

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.login_registry }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Summarize image build
        shell: bash
        run: |
          {
            echo "## Build & Push ${{ matrix.service }} image"
            echo ""
            echo "- Service: \`${{ matrix.service }}\`"
            echo "- Context: \`${{ matrix.context }}\`"
            echo "- Image: \`${{ secrets.ACR_REGISTRY }}/genpano:${{ matrix.tag_prefix }}-${{ env.IMAGE_TAG }}\`"
            echo "- Cache: GitHub Actions cache scope \`${{ matrix.cache_scope }}\` with cache-from and cache-to enabled."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/genpano:${{ matrix.tag_prefix }}-${{ env.IMAGE_TAG }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max

  pre-deploy-guard:
    name: Confirm Latest Main Before Deploy
    runs-on: ubuntu-latest
    needs: [latest-main, build-and-push]
    if: needs.latest-main.outputs.should_deploy == 'true'
    outputs:
      should_deploy: ${{ steps.guard.outputs.should_deploy }}
      latest_sha: ${{ steps.guard.outputs.latest_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Re-check run SHA with main
        id: guard
        shell: bash
        run: |
          set -Eeuo pipefail

          is_ignored_deploy_path() {
            local path="$1"
            case "$path" in
              .github/PULL_REQUEST_TEMPLATE.md|.github/ISSUE_TEMPLATE/*|docs/*|*.md)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          commit_is_deploy_eligible() {
            local commit="$1"
            local file
            local diff_args=()

            if git rev-parse --verify -q "${commit}^1" >/dev/null; then
              diff_args=("${commit}^1" "$commit")
            else
              diff_args=(--root "$commit")
            fi

            while IFS= read -r file; do
              if [ -n "$file" ] && ! is_ignored_deploy_path "$file"; then
                return 0
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "${diff_args[@]}")

            return 1
          }

          latest_deploy_eligible_main_sha() {
            local commit

            git fetch --prune origin +refs/heads/main:refs/remotes/origin/main

            for commit in $(git rev-list --first-parent origin/main); do
              if commit_is_deploy_eligible "$commit"; then
                echo "$commit"
                return 0
              fi
            done

            echo "No deploy-eligible commit found on origin/main" >&2
            return 1
          }

          run_contains_latest_deploy_eligible() {
            local latest_sha="$1"
            git merge-base --is-ancestor "$latest_sha" "$GITHUB_SHA"
          }

          latest_sha="$(latest_deploy_eligible_main_sha)"

          echo "latest_sha=${latest_sha}" >> "$GITHUB_OUTPUT"

          if ! run_contains_latest_deploy_eligible "$latest_sha"; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Build & Deploy skipped"
              echo ""
              echo "- Result: stale main run skipped before live deploy."
              echo "- Run SHA: \`${GITHUB_SHA}\`"
              echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
              echo "- Reason: the run SHA does not contain the latest deploy-eligible product state."
              echo "- Images for the stale SHA may have been built, but deployment was not attempted."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Build & Deploy pre-deploy guard"
            echo ""
            echo "- Result: run still contains the latest deploy-eligible product state; live deploy may continue."
            echo "- Run SHA: \`${GITHUB_SHA}\`"
            echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: pre-deploy-guard
    if: needs.pre-deploy-guard.outputs.should_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,clash/,frontend/nginx.conf"
          target: /opt/genpano

      - name: Deploy
        id: deploy_to_server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_COOKIES_JSON: ${{ secrets.GEMINI_COOKIES_JSON }}
          DOUBAO_COOKIES_JSON: ${{ secrets.DOUBAO_COOKIES_JSON }}
          ACR_REGISTRY_SECRET: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          CLASH_API_SECRET: ${{ secrets.CLASH_API_SECRET || vars.CLASH_API_SECRET }}
          HERO_SMS_API_KEY: ${{ secrets.HERO_SMS_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GEMINI_COOKIES_JSON,DOUBAO_COOKIES_JSON,ACR_REGISTRY_SECRET,ACR_USERNAME,ACR_PASSWORD,CLASH_API_SECRET,HERO_SMS_API_KEY
          script_stop: false
          command_timeout: 45m
          script: |
            set -Ee -o pipefail
            cd /opt/genpano

            cat > .env <<'ENVEOF'
            ACR_REGISTRY=${{ secrets.ACR_REGISTRY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL=postgresql+asyncpg://genpano:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/genpano
            REDIS_URL=redis://redis:6379/0
            # GENPANO_ENVIRONMENT value is preserved as `production` because it
            # controls runtime mode (caching, log level, debug flags), not which
            # environment is deployed. The repo currently has only a test
            # deploy at http://116.62.36.173/.
            GENPANO_ENVIRONMENT=production
            # Admin cookie Secure flag — explicit. Default 0 because the
            # current deployment serves the admin SPA over plain HTTP
            # (http://<SERVER_HOST>); browsers silently drop Secure cookies
            # over HTTP, which manifested as every /api/admin/* request
            # 401-ing with admin_session_required even after a successful
            # login (see PR #358). Flip to 1 once the server is fronted by
            # TLS, by setting either the ADMIN_COOKIE_SECURE secret or
            # variable in this repo's GitHub settings.
            ADMIN_COOKIE_SECURE=${{ secrets.ADMIN_COOKIE_SECURE || vars.ADMIN_COOKIE_SECURE || '0' }}
            ADMIN_SESSION_SECRET=${{ secrets.ADMIN_SESSION_SECRET || secrets.JWT_SECRET }}
            ADMIN_BASE_URL=${{ secrets.ADMIN_BASE_URL }}
            ADMIN_EMAIL_FROM=${{ secrets.ADMIN_EMAIL_FROM }}
            USER_JWT_SECRET=${{ secrets.USER_JWT_SECRET || secrets.JWT_SECRET }}
            USER_BASE_URL=${{ secrets.USER_BASE_URL || vars.USER_BASE_URL || secrets.FRONTEND_URL || vars.FRONTEND_URL || format('http://{0}', secrets.SERVER_HOST) }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL || vars.FRONTEND_URL || secrets.USER_BASE_URL || vars.USER_BASE_URL || format('http://{0}', secrets.SERVER_HOST) }}
            USER_EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || vars.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || vars.EMAIL_PROVIDER || 'aliyun_dm' }}
            EMAIL_PROVIDER=${{ secrets.USER_EMAIL_PROVIDER || vars.USER_EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || vars.EMAIL_PROVIDER || 'aliyun_dm' }}
            USER_EMAIL_PREVIEW_DIR=/data/email-previews
            USER_EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || vars.USER_EMAIL_FROM || secrets.EMAIL_FROM || vars.EMAIL_FROM || 'GenPano <noreply@genpano.top>' }}
            EMAIL_FROM=${{ secrets.USER_EMAIL_FROM || vars.USER_EMAIL_FROM || secrets.EMAIL_FROM || vars.EMAIL_FROM || 'GenPano <noreply@genpano.top>' }}
            USER_EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || vars.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO || vars.EMAIL_REPLY_TO }}
            EMAIL_REPLY_TO=${{ secrets.USER_EMAIL_REPLY_TO || vars.USER_EMAIL_REPLY_TO || secrets.EMAIL_REPLY_TO || vars.EMAIL_REPLY_TO }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            ALIYUN_DM_SMTP_USER=${{ secrets.ALIYUN_DM_SMTP_USER || vars.ALIYUN_DM_SMTP_USER || 'noreply@genpano.top' }}
            ALIYUN_DM_SMTP_PASSWORD=${{ secrets.ALIYUN_DM_SMTP_PASSWORD }}
            ALIYUN_DM_SMTP_HOST=${{ secrets.ALIYUN_DM_SMTP_HOST || vars.ALIYUN_DM_SMTP_HOST || 'smtpdm.aliyun.com' }}
            ALIYUN_DM_SMTP_PORT=${{ secrets.ALIYUN_DM_SMTP_PORT || vars.ALIYUN_DM_SMTP_PORT || '465' }}
            ALIYUN_DM_SMTP_SSL=${{ secrets.ALIYUN_DM_SMTP_SSL || vars.ALIYUN_DM_SMTP_SSL || 'true' }}
            ALIYUN_DM_SMTP_STARTTLS=${{ secrets.ALIYUN_DM_SMTP_STARTTLS || vars.ALIYUN_DM_SMTP_STARTTLS || 'false' }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL || vars.GOOGLE_CALLBACK_URL }}
            PROXY_PROVIDER=clash
            CLASH_PROXY_URL=http://host.docker.internal:6789
            CLASH_API_URL=http://host.docker.internal:9098
            CLASH_PROXY_GROUP=💬 Ai平台
            CLASH_API_SECRET=${{ secrets.CLASH_API_SECRET || vars.CLASH_API_SECRET }}
            CLASH_GLOBAL_PROXY_GROUP=${{ vars.CLASH_GLOBAL_PROXY_GROUP || 'GLOBAL' }}
            CLASH_FORCE_GLOBAL_PROXY_ROUTE=${{ vars.CLASH_FORCE_GLOBAL_PROXY_ROUTE || '1' }}
            DOUBAO_USE_PROXY=${{ vars.DOUBAO_USE_PROXY || '0' }}
            LUBANSMS_DOUBAO_SERVICE_ID=${{ secrets.LUBANSMS_DOUBAO_SERVICE_ID || vars.LUBANSMS_DOUBAO_SERVICE_ID }}
            QG_PROXY_EXTRACT_URL=${{ secrets.QG_PROXY_EXTRACT_URL }}
            QG_PROXY_AUTH_KEY=${{ secrets.QG_PROXY_AUTH_KEY }}
            QG_PROXY_AUTH_PASSWORD=${{ secrets.QG_PROXY_AUTH_PASSWORD }}
            PORT=4000
            ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}
            GLM_MODEL=glm-4
            CAPSOLVER_API_KEY=${{ secrets.CAPSOLVER_API_KEY }}
            LUBANSMS_TOKEN=${{ secrets.LUBANSMS_TOKEN }}
            LUBANSMS_PROJECT_DOUBAO=${{ secrets.LUBANSMS_PROJECT_DOUBAO }}
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            ARK_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
            ARK_MODEL=doubao-seed-2-0-pro-260215
            TOPIC_PLAN_WEB_RESEARCH_TIMEOUT_SECONDS=180
            TOPIC_PLAN_LLM_TIMEOUT_SECONDS=600
            TOPIC_PLAN_LLM_TOPICS_PER_REQUEST=20
            TOPIC_PLAN_RUN_TIMEOUT_SECONDS=86400
            PROMPT_MATRIX_LLM_TIMEOUT_SECONDS=600
            PROMPT_MATRIX_RUN_TIMEOUT_SECONDS=86400
            QUERY_POOL_LLM_TIMEOUT_SECONDS=600
            QUERY_POOL_RUN_TIMEOUT_SECONDS=86400
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env

            printf '%s' "${GEMINI_COOKIES_JSON}" | python3 -c \
              "import json,sys; s=json.dumps(json.loads(sys.stdin.read())).replace('\$','\$\$'); print('GEMINI_COOKIES_JSON=' + s)" \
              >> .env

            if [ -n "${DOUBAO_COOKIES_JSON}" ]; then
              printf '%s' "${DOUBAO_COOKIES_JSON}" | python3 -c \
                "import json,sys; s=json.dumps(json.loads(sys.stdin.read())).replace('\$','\$\$'); print('DOUBAO_COOKIES_JSON=' + s)" \
                >> .env
            fi

            python3 - <<'PY' >> .env
            import os

            value = os.getenv("HERO_SMS_API_KEY", "")
            print('HERO_SMS_API_KEY=' + value.replace('$', '$$'))
            PY

            cp /opt/genpano/clash/vninja-allow-lan.sh /usr/local/bin/vninja-allow-lan.sh
            chmod +x /usr/local/bin/vninja-allow-lan.sh
            cp /opt/genpano/clash/vninja.service /etc/systemd/system/vninja.service
            systemctl daemon-reload

            which socat >/dev/null 2>&1 || apt-get install -y -qq socat

            if systemctl is-active --quiet vninja; then
              echo "V-Ninja proxy service is running"
              vninja_config_headers=(-H "Content-Type: application/json")
              if [ -n "${CLASH_API_SECRET:-}" ]; then
                vninja_config_headers+=(-H "Authorization: Bearer ${CLASH_API_SECRET}")
              fi
              curl -s -X PATCH http://127.0.0.1:9097/configs \
                "${vninja_config_headers[@]}" \
                -d '{"allow-lan": true}' || true
              if ! pgrep -f "socat.*TCP-LISTEN:9098" >/dev/null; then
                socat TCP-LISTEN:9098,bind=0.0.0.0,fork,reuseaddr TCP:127.0.0.1:9097 &
              fi
            else
              echo "V-Ninja is not running; attempting to start it"
              systemctl start vninja || echo "V-Ninja start failed; overseas LLM proxy may be unavailable"
            fi

            login_registry="${ACR_REGISTRY_SECRET#http://}"
            login_registry="${login_registry#https://}"
            login_registry="${login_registry%/}"
            login_registry="${login_registry%%/*}"
            printf '%s' "$ACR_PASSWORD" | docker login "$login_registry" -u "$ACR_USERNAME" --password-stdin

            echo "Pre-deploy relief: stop old app containers before pulling images"
            timeout 90s docker compose stop -t 10 worker worker-analysis beat backend frontend || true
            timeout 60s docker compose kill worker worker-analysis beat backend frontend || true
            timeout 60s docker compose rm -f worker worker-analysis beat backend frontend || true
            for proc_name in camoufox camoufox-bin firefox firefox-bin firefox-esr chrome chromium chromium-browser chrome_crashpad_handler "Web Content" WebExtensions; do pkill -9 -x "$proc_name" || true; done
            free -h || true
            ps -eo pid,ppid,pcpu,pmem,rss,comm,args --sort=-pcpu | head -30 || true
            df -h / || true
            df -ih / || true
            docker system df || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af --keep-storage=2GB || true
            docker system df || true
            df -h / || true
            df -ih / || true
            docker compose version || true

            # Pull only unique application images from ACR. Base services use
            # stable public images and can hang on Docker Hub when the server
            # network is degraded; existing postgres/redis containers are reused.
            pull_registry="${ACR_REGISTRY_SECRET#http://}"
            pull_registry="${pull_registry#https://}"
            pull_registry="${pull_registry%/}"
            image_tag="${{ env.IMAGE_TAG }}"
            echo "Pulling backend image"
            timeout 900s docker pull "$pull_registry/genpano:backend-$image_tag"
            echo "Pulling worker image"
            timeout 1200s docker pull "$pull_registry/genpano:worker-$image_tag"
            echo "Pulling frontend image"
            timeout 900s docker pull "$pull_registry/genpano:frontend-$image_tag"
            docker compose up -d postgres redis
            cat > /tmp/genpano_detect_existing_revision.py <<'PY'
            import sys

            from sqlalchemy import create_engine, inspect

            from app.core.config import get_settings

            url = get_settings().database_url
            if url.startswith("postgresql+asyncpg://"):
                url = "postgresql+psycopg://" + url[len("postgresql+asyncpg://"):]
            if url.startswith("sqlite+aiosqlite://"):
                url = "sqlite://" + url[len("sqlite+aiosqlite://"):]

            engine = create_engine(url)
            with engine.connect() as connection:
                tables = set(inspect(connection).get_table_names())

            if "alembic_version" in tables:
                sys.exit(0)
            if {"users", "user_auth_tokens"}.issubset(tables):
                print("20260429_user_auth")
            elif {"admin_users", "admin_sessions", "admin_password_resets", "admin_login_attempts"}.issubset(tables):
                print("cdfdaab4088e")
            elif "industry_benchmark_daily" in tables:
                print("cdfdaab4088e")
            PY
            existing_revision="$(docker compose run --rm -T -v /tmp/genpano_detect_existing_revision.py:/app/genpano_detect_existing_revision.py:ro backend python /app/genpano_detect_existing_revision.py)"
            if [ -n "$existing_revision" ]; then
              echo "Stamping existing database schema as Alembic revision $existing_revision"
              docker compose run --rm backend alembic stamp "$existing_revision"
            fi
            docker compose run --rm backend alembic upgrade head
            docker compose up -d --remove-orphans --force-recreate
            docker compose ps

            echo "=== Worker runtime secret presence diagnostic ==="
            docker compose exec -T worker python - <<'PY'
            import json
            import os

            print(json.dumps({
                "HERO_SMS_API_KEY_present": bool(os.getenv("HERO_SMS_API_KEY")),
                "service": "worker",
            }, sort_keys=True))
            PY

            check_url() {
              local label="$1"
              local url="$2"
              local attempts=30
              local delay=2

              for i in $(seq 1 "$attempts"); do
                if curl -fsS "$url" >/dev/null; then
                  echo "OK: ${label}"
                  return 0
                fi
                sleep "$delay"
              done

              echo "FAILED: ${label} (${url})" >&2
              docker compose ps >&2
              docker compose logs --tail=80 nginx backend >&2
              return 1
            }

            check_url "backend health" "http://127.0.0.1/health"
            check_url "frontend login route" "http://127.0.0.1/login"
            check_url "admin route" "http://127.0.0.1/admin"

            docker image prune -af --filter "until=72h"
            docker builder prune -af --keep-storage=2GB
            docker volume prune -f
            df -h / && docker system df

      - name: Summarize deployed run
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail

          is_ignored_deploy_path() {
            local path="$1"
            case "$path" in
              .github/PULL_REQUEST_TEMPLATE.md|.github/ISSUE_TEMPLATE/*|docs/*|*.md)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          commit_is_deploy_eligible() {
            local commit="$1"
            local file
            local diff_args=()

            if git rev-parse --verify -q "${commit}^1" >/dev/null; then
              diff_args=("${commit}^1" "$commit")
            else
              diff_args=(--root "$commit")
            fi

            while IFS= read -r file; do
              if [ -n "$file" ] && ! is_ignored_deploy_path "$file"; then
                return 0
              fi
            done < <(git diff-tree --no-commit-id --name-only -r "${diff_args[@]}")

            return 1
          }

          latest_deploy_eligible_main_sha() {
            local commit

            git fetch --prune origin +refs/heads/main:refs/remotes/origin/main

            for commit in $(git rev-list --first-parent origin/main); do
              if commit_is_deploy_eligible "$commit"; then
                echo "$commit"
                return 0
              fi
            done

            echo "No deploy-eligible commit found on origin/main" >&2
            return 1
          }

          run_contains_latest_deploy_eligible() {
            local latest_sha="$1"
            git merge-base --is-ancestor "$latest_sha" "$GITHUB_SHA"
          }

          if [ "${{ steps.deploy_to_server.outcome }}" != "success" ]; then
            {
              echo "## Build & Deploy failed"
              echo ""
              echo "- Result: live deploy step did not complete successfully."
              echo "- Attempted SHA: \`${GITHUB_SHA}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          latest_sha="$(latest_deploy_eligible_main_sha)"

          if ! run_contains_latest_deploy_eligible "$latest_sha"; then
            {
              echo "## Build & Deploy superseded"
              echo ""
              echo "- Result: deployed SHA completed, but it no longer contains the latest deploy-eligible product state."
              echo "- Deployed SHA: \`${GITHUB_SHA}\`"
              echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
              echo "- A newer queued run should deploy the latest deploy-eligible SHA."
              echo "- Test environment URL: http://116.62.36.173/"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## Build & Deploy authoritative latest deploy"
            echo ""
            echo "- Result: deployed SHA still contains the latest deploy-eligible product state after deployment."
            echo "- Deployed SHA: \`${GITHUB_SHA}\`"
            echo "- Latest deploy-eligible main SHA: \`${latest_sha}\`"
            echo "- Test environment URL: http://116.62.36.173/"
          } >> "$GITHUB_STEP_SUMMARY"
