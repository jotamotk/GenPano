name: Human Input Channel
description: Create or maintain the permanent product-owner inbox issue
title: "[Human Input] "
labels:
  - type:human-input
body:
  - type: markdown
    attributes:
      value: |
        Use this for the permanent Human Input Channel. It is an inbox ledger, not an executable task, PRD, branch, or PR.
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: State the channel purpose so future agents do not treat it as a task.
      value: |
        This issue is the product-owner inbox for raw observations, ideas, bugs, feature changes, and new requirements. It stays open permanently. Each entry needs a triage receipt before it becomes executable work.
    validations:
      required: true
  - type: textarea
    id: current-state
    attributes:
      label: Current State
      description: Keep a compact ledger of open raw inputs and their disposition.
      value: |
        | Item | Raw Input | Classification | Disposition | Target | Last Updated |
        | --- | --- | --- | --- | --- | --- |
        |  |  |  |  |  |  |
    validations:
      required: true
  - type: textarea
    id: triage-rules
    attributes:
      label: Triage Rules
      description: Rules Codex must follow when reading this channel.
      value: |
        - Do not implement directly from a vague raw note.
        - Classify each item as bug, feature change, new requirement, question/idea, or needs clarification.
        - Convert actionable work into a scoped Task or Full Path Coordination issue.
        - Use PRD-CHANGE when the item changes product behavior or contract.
        - Leave a triage receipt for every item.
        - Keep this issue open permanently.
    validations:
      required: true
  - type: textarea
    id: triage-receipt-template
    attributes:
      label: Triage Receipt Template
      description: Copy this shape into comments or the ledger for each raw input item.
      value: |
        TRIAGE: <item id or short quote> classified as <bug | feature change | new requirement | question/idea | needs clarification>.

        Disposition:
        - Converted to:
        - PRD decision requested in:
        - Waiting for clarification from:
        - No action because:

        Receipt:
        - Original note:
        - Last updated:
    validations:
      required: true
