name: Human Input
description: Capture a human problem, goal, bug, or request for AI Lead triage
title: "[Human] "
labels:
  - type:human
body:
  - type: markdown
    attributes:
      value: |
        Use this for raw human intake. State the problem, goal, bug, or request and choose a priority. The AI Lead owns triage, decomposition, child issues, PRD mapping, verification planning, and acceptance handoff after submission.
  - type: textarea
    id: raw-input
    attributes:
      label: Problem / Goal / Bug
      description: Describe what you need or what is wrong. Include exact URLs, issue ids, screenshots, row ids, error text, or expected outcomes when available.
      placeholder: "I need... / The bug is... / The goal is..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Choose the urgency. The AI Lead will confirm or adjust routing during triage.
      options:
        - "P0 - Critical: live test-environment outage, data loss, security risk, or release blocker"
        - "P1 - High: user-visible regression, committed delivery blocker, or urgent operator workflow"
        - "P2 - Medium: planned deliverable or important improvement that does not block the current release"
        - "P3 - Low: polish, cleanup, docs, or backlog work with no immediate delivery pressure"
    validations:
      required: true
