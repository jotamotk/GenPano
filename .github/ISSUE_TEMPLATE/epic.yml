name: Full Path Coordination
description: Coordinate a Full Path request that needs PRD, visualization, or multiple deliverables
title: "[Full Path] "
labels:
  - type:epic
  - status:briefing
body:
  - type: markdown
    attributes:
      value: |
        Use this template only when Fast Path is not enough. Split child issues by deliverable, not by agent role.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the shared Genpano issue priority. Apply the matching priority:p* label during triage.
      options:
        - "P0 - Critical: live test-environment outage, data loss, security risk, or release blocker"
        - "P1 - High: user-visible regression, committed delivery blocker, or urgent operator workflow"
        - "P2 - Medium: planned deliverable or important improvement that does not block the current release"
        - "P3 - Low: polish, cleanup, docs, or backlog work with no immediate delivery pressure"
    validations:
      required: true
  - type: textarea
    id: priority-rationale
    attributes:
      label: Priority Rationale
      description: Explain the impact, deadline, blocked work, or why this can safely wait.
      placeholder: "This is P1 because..."
    validations:
      required: true
  - type: textarea
    id: user-need
    attributes:
      label: User Need
      description: Capture the user's goal in their terms, including exact routes, symptoms, payloads, or screenshots when available.
      placeholder: "The user needs..."
    validations:
      required: true
  - type: textarea
    id: current-state
    attributes:
      label: Current State
      description: What is true today in product, code, deployment, or CI/CD? Keep this current.
      value: |
        - Path: full
        - Current judgment:
        - Active deliverable:
        - Blocker:
        - Next:
    validations:
      required: true
  - type: textarea
    id: decisions
    attributes:
      label: Decisions
      description: Record settled decisions only. Copy DECISION comments here.
      value: |
        - Pending.
    validations:
      required: true
  - type: textarea
    id: prd-source
    attributes:
      label: PRD Source
      description: Link PRD docs and stable requirement IDs. Product behavior is not final until the product owner accepts the PRD change.
      value: |
        - PRD:
        - Requirement IDs:
          - PRD-AREA-FEATURE-001
        - Open PRD-CHANGE requests:
          -
    validations:
      required: true
  - type: textarea
    id: acceptance-translation
    attributes:
      label: Acceptance Translation
      description: Lead translates PRD/user decisions into acceptance before implementation. Do not let child tasks invent acceptance after coding.
      value: |
        | Requirement/User Decision | Acceptance Row(s) | Coverage Gap | Decision Needed |
        | --- | --- | --- | --- |
        |  |  |  |  |

        Open QUESTION items:
        -
    validations:
      required: true
  - type: textarea
    id: visualization
    attributes:
      label: Frontend Visualization
      description: Required for material user-facing experience changes. Use "not needed" with reason when skipped.
      value: |
        - Visualization issue:
        - Page/route:
        - Confirmation needed:
        - Skip reason:
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverable Issues
      description: Link child issues by deliverable, not by hat.
      value: |
        | Issue | Path | Owner Hat | Deliverable | Current State |
        | --- | --- | --- | --- | --- |
        |  |  |  |  |  |
    validations:
      required: false
  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: What must be true before merge or closeout?
      value: |
        - [ ] PRD decisions accepted or explicitly not needed
        - [ ] Visualization confirmed or explicitly not needed
        - [ ] Acceptance Translation complete before implementation
        - [ ] Coverage gaps accepted or converted to questions
        - [ ] Deliverable issues complete
        - [ ] Required PRs reviewed
        - [ ] Verification Evidence Ledgers complete on child PRs
        - [ ] Test Integrity Statements complete on child PRs
        - [ ] CI/CD tied to current head SHA and understood
        - [ ] Tiered E2E planned or completed if live-facing
    validations:
      required: true
  - type: textarea
    id: merge-plan
    attributes:
      label: Merge And Release Plan
      description: Lead updates this when PRs are ready.
      value: |
        | PR | Depends On | CI | Risk | Merge Order |
        | --- | --- | --- | --- | --- |
        |  |  |  |  |  |

        - Rollback:
        - CD/deploy plan:
    validations:
      required: false
  - type: textarea
    id: live-verification
    attributes:
      label: Live Verification
      description: Required live-facing validation after merge.
      value: |
        - Target (test environment): http://116.62.36.173/
        - E2E tier: Tier 0 | Tier 1 | Tier 2 | Tier 3
        - User-Symptom Replay scenario:
        - Playwright scenario:
        - Evidence:
    validations:
      required: true
  - type: textarea
    id: closure
    attributes:
      label: Closure
      description: Complete before closing. Use Completed, Won't Do, Split/Superseded, or Duplicate.
      value: |
        - Type:
        - Reason:
        - Linked PR/commit or replacement/canonical issue:
        - Verification evidence:
    validations:
      required: false
