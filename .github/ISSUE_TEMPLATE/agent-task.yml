name: Agent Task
description: Assign a scoped task to one Codex Agent
title: "[Agent Task] "
labels:
  - status:ready
body:
  - type: markdown
    attributes:
      value: |
        Use this template for child issues assigned to one Agent. One Agent task issue should map to one branch and one PR.
  - type: dropdown
    id: owner-agent
    attributes:
      label: Owner Agent
      description: Select the single Agent role responsible for this issue.
      options:
        - frontend-visualization-agent
        - frontend-integration-agent
        - backend-api-agent
        - pipeline-data-agent
        - qa-e2e-agent
        - release-ci-agent
        - review-agent
        - ai-lead-agent
    validations:
      required: true
  - type: input
    id: epic
    attributes:
      label: Epic Issue
      description: Link the parent Epic issue.
      placeholder: "#120"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user-visible or engineering outcome should this issue deliver?
      placeholder: "Deliver the frontend visualization for..."
    validations:
      required: true
  - type: textarea
    id: prd-source
    attributes:
      label: PRD Source
      description: Link the PRD file and stable requirement IDs. Do not paste long PRD sections.
      value: |
        - PRD:
        - Requirement IDs:
          - PRD-AREA-FEATURE-001
    validations:
      required: true
  - type: textarea
    id: prd-slice
    attributes:
      label: PRD Slice
      description: State which part of the PRD this issue covers and which parts are assigned elsewhere.
      value: |
        Included:
        -

        Excluded:
        -
    validations:
      required: true
  - type: textarea
    id: acceptance-mapping
    attributes:
      label: Acceptance Criteria Mapping
      description: Map PRD criteria to this issue so the Agent does not overbuild.
      value: |
        | PRD Criteria | This Issue |
        | --- | --- |
        |  |  |
    validations:
      required: true
  - type: textarea
    id: allowed-scope
    attributes:
      label: Allowed Scope
      description: Files, modules, routes, or behavior this Agent may change.
      placeholder: "- frontend/src/..."
    validations:
      required: true
  - type: textarea
    id: forbidden-scope
    attributes:
      label: Forbidden Scope
      description: Files, modules, routes, or behavior this Agent must not change.
      placeholder: "- backend migrations\n- scheduler dispatch logic"
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Required local tests, CI checks, screenshots, Playwright traces, or live checks.
      value: |
        - [ ] Local:
        - [ ] Screenshot/video:
        - [ ] Playwright:
        - [ ] CI/CD:
        - [ ] Live `http://116.62.36.173/` check if production-facing:
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Issues, PRs, PRD decisions, or deployments that must happen first.
      placeholder: "- Depends on #..."
    validations:
      required: false
  - type: textarea
    id: context-links
    attributes:
      label: Context Links
      description: Link docs, code paths, screenshots, traces, failing requests, prior issues, or prior PRs.
      placeholder: "- docs/...\n- backend/static/admin.html\n- PR #..."
    validations:
      required: false
  - type: textarea
    id: handoff
    attributes:
      label: Handoff
      description: What should the PR pass to the next Agent or to AI Lead review?
      placeholder: "Return screenshot, changed routes, test command output, and known risks."
    validations:
      required: true
