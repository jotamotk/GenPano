name: Deliverable Task
description: Track one fast-path or full-path deliverable with a clear execution contract
title: "[Task] "
labels:
  - status:ready
body:
  - type: markdown
    attributes:
      value: |
        Use this template for one deliverable, not one agent role. A task should normally map to one branch and one PR.

        ## 验收原则 / Acceptance Principle

        **只有业务目标达成才能请求人类验收。**

        代码 merge / 部署 / CI 绿 / 单元测试通过 / API 字段非空 / 后端 readback 正常 — **都只是过程指标，不构成验收依据**。验收依据是用户在 live 环境上能肉眼看到业务结果。

        Lead hat 在过程指标全绿后**才能**请求人类验收，且验收成立必须由人类视觉确认；视觉确认前 acceptance matrix 的业务目标层任何一行都不能打勾。
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the shared Genpano issue priority. Apply the matching priority:p* label during triage.
      options:
        - "P0 - Critical: live test-environment outage, data loss, security risk, or release blocker"
        - "P1 - High: user-visible regression, committed delivery blocker, or urgent operator workflow"
        - "P2 - Medium: planned deliverable or important improvement that does not block the current release"
        - "P3 - Low: polish, cleanup, docs, or backlog work with no immediate delivery pressure"
    validations:
      required: true
  - type: textarea
    id: priority-rationale
    attributes:
      label: Priority Rationale
      description: Explain the impact, deadline, blocked work, or why this can safely wait.
      placeholder: "This is P1 because..."
    validations:
      required: true
  - type: textarea
    id: business-goal
    attributes:
      label: 业务目标 / Business Goal
      description: |
        State the user-visible outcome that must be true on the live environment for this issue to be considered done.
        Write it as: "用户在 <URL/route> 做 <action> 后，<visible result>"。
        This is NOT "API returns X", "tests pass", or "code merged" — those go in the Acceptance Matrix as process indicators.

        Restate the verification principle inline so anyone opening this issue sees it first:

        > 只有业务目标达成才能请求人类验收。代码 merge / 部署 / CI 绿 / API 字段非空，都只是过程指标，不构成验收依据。
      placeholder: |
        用户在 `http://116.62.36.173/<route>` <某个动作>后，<肉眼可见的结果>。

        > 验收原则: 只有业务目标达成才能请求人类验收。代码 merge / 部署 / CI 绿 / 单元测试通过 / API 字段非空，都只是过程指标，不构成验收依据。验收依据是用户 hard refresh 那个 URL 后能<具体看到什么>。
    validations:
      required: true
  - type: dropdown
    id: path
    attributes:
      label: Path
      description: Select the workflow path for this deliverable.
      options:
        - fast
        - full
    validations:
      required: true
  - type: dropdown
    id: owner-hat
    attributes:
      label: Owner Hat
      description: Select the responsibility hat currently owning execution.
      options:
        - lead
        - frontend-visualization
        - frontend-integration
        - backend-api
        - pipeline-data
        - qa-e2e
        - release-ci
        - review
        - pruning
    validations:
      required: true
  - type: input
    id: coordination-issue
    attributes:
      label: Coordination Issue
      description: Link the Epic/coordination issue if this is Full Path. Use "none" for standalone Fast Path work.
      placeholder: "#120 or none"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Technical Deliverable
      description: State the engineering output in one or two sentences. This should be a means to the Business Goal above, not a substitute for it.
      placeholder: "Add /v1/projects/{id}/citations/top-pages endpoint and wire frontend to it, so that..."
    validations:
      required: true
  - type: textarea
    id: parent-business-goal
    attributes:
      label: Parent Business Goal
      description: Link this deliverable to the parent business outcome. Use "standalone" only for standalone Fast Path tasks.
      value: |
        - Parent issue:
        - Parent Business Goal:
        - This deliverable proves or enables:
        - What does NOT count as done:
    validations:
      required: true
  - type: textarea
    id: current-state
    attributes:
      label: Current State
      description: State what is true now. Keep this current as status changes.
      value: |
        - Path:
        - Current judgment:
        - Branch:
        - PR:
        - Blocker:
        - Next:
    validations:
      required: true
  - type: textarea
    id: decisions
    attributes:
      label: Decisions
      description: Record settled decisions only. Copy DECISION comments here when they change execution.
      value: |
        - Pending.
    validations:
      required: true
  - type: textarea
    id: execution-contract
    attributes:
      label: Execution Contract
      description: Inline the contract. Do not rely on unresolved "depends on #..." pointers as the only source of scope.
      value: |
        - Branch:
        - Allowed Scope:
          -
        - Forbidden Scope:
          -
        - Contract Snapshot:
          -
        - Dependencies:
          -
    validations:
      required: true
  - type: textarea
    id: prd-source
    attributes:
      label: PRD Source
      description: Required for product behavior. Use "none - fast path bugfix" only when no PRD or product contract changes.
      value: |
        - PRD:
        - Requirement IDs:
          - PRD-AREA-FEATURE-001
        - PRD status: approved | PRD-CHANGE needed | none
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Matrix
      description: |
        Split rows into two layers. The Business Goal layer rows are the only ones that, when ticked, justify "Business success proven". The Process Indicator rows are necessary but not sufficient.
      value: |
        ### 业务目标层 / Business Goal Layer (必须达成才能验收)
        Each row here must trace to the Business Goal field above. A row in this section ticks ONLY after a human visually confirms the result on the live environment.

        | AC | User-Visible Result | Live URL/Route | User Action | Evidence (screenshot/Playwright) | Status |
        | --- | --- | --- | --- | --- | --- |
        | BG-1 |  |  |  |  | pending |

        ### 过程指标层 / Process Indicator Layer (必要但不充分)
        These rows prove the engineering plumbing is in place. They do NOT, by themselves, justify human acceptance — only the Business Goal Layer does.

        | AC | Source | Machine Check | Evidence Required | Status |
        | --- | --- | --- | --- | --- |
        | P-1 |  |  |  | pending |

        Coverage Gaps:
        | Source Requirement | Missing Coverage | Decision Needed |
        | --- | --- | --- |
        |  |  |  |

        Business Result Gate:
        - Exact business object/path:
        - Required final state:
        - Required artifact/readback:
        - Evidence source:
    validations:
      required: true
  - type: textarea
    id: root-cause-gate
    attributes:
      label: Root Cause Gate
      description: Required for incident fixes. Use "not an incident - reason" only when this task is not fixing a reported failure.
      value: |
        - Direct trigger:
        - Underlying product/system root cause:
        - Evidence proving it:
        - Alternatives ruled out:
        - Unknowns that remain:
        - Why this fix should produce the final business outcome, not only remove the current error:
        - Classification: incident fix | diagnostics/instrumentation only | not an incident
    validations:
      required: true
  - type: textarea
    id: failure-chain-review
    attributes:
      label: Failure Chain Review
      description: Identify the next likely failure before marking a PR ready or spending live retry/account budget.
      value: |
        - Current failure layer:
        - Next likely failure mode:
        - Guard or evidence for the next layer:
        - Live retry/account/session preflight needed? yes/no:
        - If yes, current row status / retry_count / account-session state / post-retry consequence:
        - Expected final success evidence:
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Evidence Ledger
      description: |
        Every checked Process Indicator row needs command/run, exit/conclusion, key output, scope covered, artifact/link when available, and commit SHA.
        The User-Symptom Replay section records the human verification that justifies ticking the Business Goal Layer.
      value: |
        | Check | Command/Run | Exit/Conclusion | Key Output | Scope Covered | Artifact/Link | Commit |
        | --- | --- | --- | --- | --- | --- | --- |
        | Local |  |  |  |  |  |  |
        | CI/CD |  |  |  |  |  |  |
        | Playwright/E2E |  |  |  |  |  |  |
        | Live API readback |  |  |  |  |  |  |

        User-Symptom Replay (required to tick any Business Goal Layer row):
        - Exact route/row/brand/query/request/action:
        - Expected visible result:
        - Human verifier (who confirmed visually):
        - Verification timestamp:
        - Screenshot/Playwright trace link:
        - E2E tier used: Tier 0 | Tier 1 | Tier 2 | Tier 3
        - Completion state: Business success proven | Diagnostic progress only | Blocked / decision needed
    validations:
      required: true
  - type: textarea
    id: test-integrity
    attributes:
      label: Test Integrity
      description: Disclose test changes so "green tests" cannot hide weakened acceptance.
      value: |
        - Test files added/modified/deleted:
        - Assertions removed or relaxed:
        - Skips/xfails added:
        - Exceptions swallowed or converted to success:
        - Acceptance rows not verified:
    validations:
      required: true
  - type: textarea
    id: context-links
    attributes:
      label: Context Links
      description: Link docs, code paths, screenshots, traces, failing requests, prior issues, or prior PRs.
      placeholder: "- docs/...\n- backend/static/admin.html\n- PR #..."
    validations:
      required: false
  - type: textarea
    id: handoff
    attributes:
      label: Handoff
      description: |
        What should this deliverable pass to review, QA, release, or the next task?
        Lead hat: after process indicators are green, request user visual verification BEFORE declaring "Business success proven".
      placeholder: "Return changed routes, test command output, evidence links, and known risks. Note when user visual verification is requested vs confirmed."
    validations:
      required: true
  - type: textarea
    id: closure
    attributes:
      label: Closure
      description: Complete this before closing. Use Completed, Won't Do, Split/Superseded, or Duplicate.
      value: |
        - Type:
        - Reason:
        - Linked PR/commit or replacement/canonical issue:
        - Verification evidence:
        - User visual confirmation: yes (link) | no — explain why closure is OK without it
    validations:
      required: false
