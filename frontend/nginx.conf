server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;


    # SPA 路由：所有未匹配的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Main API reverse proxy to the FastAPI backend.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Formal Admin console, currently backed by the admin-console admin surface.
    # /query/admin remains available as the temporary/test mount below.
    location = /admin {
        proxy_pass http://admin-console:5000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    location = /admin/ {
        proxy_pass http://admin-console:5000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # Admin API endpoints that have been migrated from admin_console (Flask)
    # to backend (FastAPI). admin.html still calls them under /admin/api/*
    # because API_BASE = '/admin/api', so we strip the /admin prefix and
    # forward to the FastAPI backend instead of the Flask service. Without
    # this, every migrated route 404s in Flask (Phase 5/6/7/8 deletions).
    # Order matters — these regex blocks must come before the /admin/api/
    # catch-all so they win over the prefix match.
    location ~ ^/admin/api/(accounts|segments)(/.*)?$ {
        rewrite ^/admin(/api/.*)$ $1 break;
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    location ~ ^/admin/api/admin/(products|brand-management|hot-topics|brands|query-pool)(/.*)?$ {
        rewrite ^/admin(/api/.*)$ $1 break;
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # Admin API endpoints consumed by admin_console/templates/admin.html.
    # Fallback for everything still served by the Flask admin_console
    # (analyzer, scheduler, queries, profiles, prompts, sms_register, etc.).
    location /admin/api/ {
        proxy_pass http://admin-console:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # Retire stale React-admin subpaths gracefully.
    location /admin/ {
        return 302 /admin;
    }

    # Backend health check.
    location /health {
        proxy_pass http://backend:4000/health;
    }

    # Admin Console 路由
    location /query/ {
        proxy_pass http://admin-console:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
