server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由：所有未匹配的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Main API reverse proxy to the FastAPI backend.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA shell (admin.html) — Phase X-2 moved this from the Flask
    # admin-console service into backend/static/admin.html, served by
    # FastAPI. Both /admin and /admin/<path> hit the same SPA HTML.
    location = /admin {
        proxy_pass http://backend:4000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    location = /admin/ {
        proxy_pass http://backend:4000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # admin.html uses ``API_BASE = '/admin/api'`` for every fetch. Strip
    # the ``/admin`` prefix and forward to FastAPI. Phase X-2 routes ALL
    # /admin/api/* here — admin_console is gone, the Flask catch-all
    # that used to live below was the only thing keeping the SPA alive
    # during the migration.
    location /admin/api/ {
        rewrite ^/admin(/api/.*)$ $1 break;
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # Admin SPA sub-paths — admin.html's client-side router handles them.
    # Each /admin/<path> request gets the same SPA HTML from FastAPI.
    location /admin/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;
    }

    # Backend health check.
    location /health {
        proxy_pass http://backend:4000/health;
    }
}
