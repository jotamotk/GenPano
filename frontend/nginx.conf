server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;


    # SPA 路由：所有未匹配的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Main API reverse proxy to the FastAPI backend.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin Console API: HttpOnly cookies with Path=/admin scope.
    location /admin/api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_request_headers on;
    }

    # Backend health check.
    location /health {
        proxy_pass http://backend:4000/health;
    }

    # Query Tool 路由
    location /query/ {
        proxy_pass http://query-tool:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Preview environment overlay (no-op when dir is empty — prod is unaffected)
    include /etc/nginx/preview/*.conf;
}
