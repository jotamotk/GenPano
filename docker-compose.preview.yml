# Preview environment overlay — runs alongside prod on the same host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.preview.yml up -d
#
# Adds two services (query-tool-preview, frontend-preview) and overlays a
# routes file into the prod nginx container. Prod services are untouched.
# Shares the existing postgres + redis.

services:

  # Overlay an extra include dir into the existing nginx so it routes /preview/*
  nginx:
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-preview.conf:/etc/nginx/preview/routes.conf:ro
    depends_on:
      - backend
      - query-tool
      - query-tool-preview
      - frontend-preview

  query-tool-preview:
    image: ${ACR_REGISTRY}/genpano:query-tool-preview-${PREVIEW_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://genpano:${POSTGRES_PASSWORD}@postgres:5432/genpano
      - SCREENSHOT_DIR=/data/screenshots
      - PREVIEW_MODE=1
    volumes:
      - screenshots_data:/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy

  frontend-preview:
    image: ${ACR_REGISTRY}/genpano:frontend-preview-${PREVIEW_IMAGE_TAG:-latest}
    restart: unless-stopped
    # No ports published — reachable only via the outer nginx on /preview/
